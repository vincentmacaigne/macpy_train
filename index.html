<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes pensées du jour</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #191c24;
    --card-2: #21252f;
    --text: #e8eaf0;
    --muted: #9aa3b2;
    --accent: #7c9cff;
    --accent-soft: #2a3350;
    --green: #58c98a;
    --green-soft: #1e3a2c;
    --red: #ec7a7a;
    --red-soft: #3a2222;
    --border: #2a2f3a;
    --radius: 18px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(1200px 600px at 70% -10%, #1a2140 0%, var(--bg) 55%);
    color: var(--text);
    line-height: 1.65;
    min-height: 100vh;
  }
  .wrap { max-width: 780px; margin: 0 auto; padding: 40px 22px 80px; }

  header.top { text-align: center; margin-bottom: 26px; }
  header.top h1 { font-size: 1.5rem; font-weight: 700; margin: 0 0 6px; letter-spacing: -0.02em; }
  header.top p { color: var(--muted); margin: 0; font-size: 0.95rem; }

  /* Bouton Parent / Enfants (en haut) */
  .mode-switch { display: flex; justify-content: center; margin-bottom: 8px; }
  .mode {
    background: var(--card); border: 1px solid var(--border); color: var(--muted);
    padding: 8px 15px; cursor: pointer; font-size: 0.85rem; font-weight: 700; transition: all .15s ease;
  }
  .mode:first-child { border-radius: 999px 0 0 999px; }
  .mode:last-child { border-radius: 0 999px 999px 0; }
  .mode + .mode { border-left: none; }
  .mode.active { background: var(--accent); color: #0f1115; border-color: var(--accent); }

  /* Thème « Enfants » : couleurs plus chaleureuses */
  body.kids { --accent: #ffb454; --accent-soft: #4a3618; }
  body.kids { background: radial-gradient(1200px 600px at 70% -10%, #3a2a12 0%, var(--bg) 55%); }

  .tabs { display: flex; gap: 8px; justify-content: center; margin: 24px 0 26px; }
  .tab {
    background: var(--card); color: var(--muted); border: 1px solid var(--border);
    padding: 9px 18px; border-radius: 999px; cursor: pointer; font-size: 0.9rem; transition: all .15s ease;
  }
  .tab:hover { color: var(--text); }
  .tab.active { background: var(--accent); color: #0f1115; border-color: var(--accent); font-weight: 600; }

  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; margin-bottom: 8px; flex-wrap: wrap;
  }
  .toolbar .date { color: var(--muted); font-size: 0.9rem; }
  .prefs-hint { color: var(--muted); font-size: 0.85rem; margin: 2px 0 20px; }
  .prefs-hint b { color: var(--accent); }

  .btn {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 16px; border-radius: 12px; cursor: pointer; font-size: 0.9rem; transition: all .15s ease;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: #0f1115; border-color: var(--accent); font-weight: 600; }
  .btn.primary:hover { color: #0f1115; opacity: .9; }

  .chip {
    display: inline-block; font-size: 0.68rem; text-transform: uppercase;
    letter-spacing: 0.07em; color: var(--accent); background: var(--accent-soft);
    padding: 4px 11px; border-radius: 999px; font-weight: 700;
  }

  .list-item {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 16px 18px; margin-bottom: 12px; cursor: pointer; transition: all .15s ease;
    position: relative;
  }
  .list-item:hover { border-color: var(--accent); transform: translateY(-2px); }
  .list-item h3 { margin: 10px 0 6px; font-size: 1.12rem; letter-spacing: -0.01em; }
  .list-item p { margin: 0; color: var(--muted); font-size: 0.9rem; }
  .badge {
    position: absolute; top: 16px; right: 16px; font-size: 0.75rem; font-weight: 700;
    padding: 3px 10px; border-radius: 999px;
  }
  .badge.like { background: var(--green-soft); color: var(--green); }
  .badge.dislike { background: var(--red-soft); color: var(--red); }

  /* Vue détail (lecture) */
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 28px 30px 32px; box-shadow: 0 20px 60px rgba(0,0,0,.35);
  }
  .card h2 { font-size: 1.7rem; line-height: 1.25; margin: 14px 0 18px; letter-spacing: -0.02em; }
  .body p { margin: 0 0 15px; }
  .body strong { color: #fff; }
  .why { margin-top: 22px; padding: 16px 18px; background: var(--card-2); border-left: 3px solid var(--accent); border-radius: 10px; }
  .why .lbl { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); font-weight: 700; }
  .why p { margin: 6px 0 0; }
  .read-time { color: var(--muted); font-size: 0.82rem; margin-top: 18px; text-align: right; }

  .rate-row { display: flex; gap: 12px; margin-top: 24px; }
  .rate {
    flex: 1; padding: 14px; border-radius: 12px; cursor: pointer; font-size: 0.95rem;
    font-weight: 600; border: 1px solid var(--border); background: var(--card-2); color: var(--text);
    transition: all .15s ease;
  }
  .rate.like:hover, .rate.like.on { background: var(--green-soft); border-color: var(--green); color: var(--green); }
  .rate.dislike:hover, .rate.dislike.on { background: var(--red-soft); border-color: var(--red); color: var(--red); }

  /* Cartes dépliables (accordéon) */
  .card-item {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 16px 18px; margin-bottom: 12px; transition: border-color .15s ease;
  }
  .card-item:hover { border-color: var(--accent); }
  .card-item.open { border-color: var(--accent); }
  .card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 14px; cursor: pointer; }
  .card-head h3 { margin: 8px 0 6px; font-size: 1.12rem; letter-spacing: -0.01em; }
  .teaser { margin: 0; color: var(--muted); font-size: 0.9rem; }
  .lire { color: var(--accent); font-size: 0.82rem; font-weight: 700; white-space: nowrap; align-self: center; }
  .badge.inline { position: static; margin-left: 8px; display: inline-block; }
  .card-body { display: none; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
  .card-item.open .card-body { display: block; }
  .card-item.open .teaser { display: none; }
  .card-item.open .lire { color: var(--muted); }
  .more-btn {
    margin-top: 16px; background: transparent; border: 1px dashed var(--border);
    color: var(--accent); padding: 9px 14px; border-radius: 10px; cursor: pointer;
    font-size: 0.85rem; font-weight: 600; transition: border-color .15s ease;
  }
  .more-btn:hover { border-color: var(--accent); }
  .plus { display: none; margin-top: 14px; padding: 16px 18px; background: var(--card-2); border-radius: 10px; }
  .plus.open { display: block; }
  .plus p { margin: 0 0 12px; }
  .plus p:last-child { margin-bottom: 0; }
  .plus strong { color: #fff; }

  /* Feed façon Tinder : une carte à la fois, qu'on swipe */
  #swipe-area { position: relative; }
  .swipe-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 26px 28px 30px; box-shadow: 0 20px 60px rgba(0,0,0,.35);
    touch-action: pan-y; user-select: none; position: relative;
  }
  .swipe-card h2 { font-size: 1.6rem; line-height: 1.25; margin: 14px 0 18px; letter-spacing: -0.02em; }
  .swipe-card.hint-like { border-color: var(--green); box-shadow: 0 0 0 2px var(--green-soft), 0 20px 60px rgba(0,0,0,.35); }
  .swipe-card.hint-nope { border-color: var(--red);  box-shadow: 0 0 0 2px var(--red-soft),  0 20px 60px rgba(0,0,0,.35); }
  .stamp {
    position: absolute; top: 20px; font-size: 1.05rem; font-weight: 800; padding: 6px 14px;
    border-radius: 10px; text-transform: uppercase; letter-spacing: .05em;
    opacity: 0; transition: opacity .1s; pointer-events: none; z-index: 2;
  }
  .stamp.like { right: 22px; color: var(--green); border: 2px solid var(--green); transform: rotate(12deg); }
  .stamp.nope { left: 22px;  color: var(--red);   border: 2px solid var(--red);   transform: rotate(-12deg); }
  .swipe-card.hint-like .stamp.like { opacity: 1; }
  .swipe-card.hint-nope .stamp.nope { opacity: 1; }

  .actions { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 24px; }
  .act {
    width: 64px; height: 64px; border-radius: 50%; font-size: 1.6rem; cursor: pointer;
    border: 1px solid var(--border); background: var(--card); transition: all .15s ease;
    display: flex; align-items: center; justify-content: center;
  }
  .act:hover { transform: translateY(-3px); }
  .act.like:hover    { border-color: var(--green); background: var(--green-soft); }
  .act.dislike:hover { border-color: var(--red);   background: var(--red-soft); }
  .act.skip { width: 52px; height: 52px; font-size: 1.2rem; }
  .act.skip:hover { border-color: var(--accent); }
  .swipe-hint { text-align: center; color: var(--muted); font-size: 0.8rem; margin-top: 18px; }

  .empty { color: var(--muted); text-align: center; padding: 40px 0; }
  .hidden { display: none; }
  footer { text-align: center; color: var(--muted); font-size: 0.8rem; margin-top: 40px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="mode-switch">
    <button class="mode active" data-mode="vincent">⚓ Vincent</button>
    <button class="mode" data-mode="cecile">🎨 Cécile</button>
    <button class="mode" data-mode="charlie">🌸 Charlie</button>
    <button class="mode" data-mode="emilie">🦄 Émilie</button>
  </div>

  <header class="top">
    <h1>💭 Mes pensées</h1>
    <p>Fais défiler les idées, une par une. À toi de zapper ou de garder.</p>
  </header>

  <div class="tabs">
    <button class="tab active" data-view="feed">Découvrir</button>
    <button class="tab" data-view="favs">★ Favoris</button>
  </div>

  <!-- Vue feed : une carte à la fois, type Tinder -->
  <section id="view-feed">
    <div class="prefs-hint" id="prefs-hint"></div>
    <div id="swipe-area">
      <div class="swipe-card" id="swipe-card"></div>
    </div>
    <div class="actions">
      <button class="act dislike" id="act-dislike" title="Pas pour moi">👎</button>
      <button class="act skip" id="act-skip" title="Passer sans noter">⏭️</button>
      <button class="act like" id="act-like" title="J'aime">👍</button>
    </div>
    <p class="swipe-hint">👈 glisse à gauche pour passer &nbsp;·&nbsp; glisse à droite pour aimer 👉</p>
  </section>

  <!-- Vue favoris -->
  <section id="view-favs" class="hidden">
    <div id="favs-list"></div>
  </section>

  <footer>Codé avec Claude — tout est enregistré dans ton navigateur ✨</footer>
</div>

<script>
/* ============================================================
   1) LA BIBLIOTHÈQUE DE CONTENUS
   Pour en ajouter un : copie un bloc { cat, titre, corps, why }
   et remplis-le. "corps" accepte du HTML simple (<p>, <strong>).
   ============================================================ */
const PENSEES = [
  // ---------- SUJETS INTÉRESSANTS ----------
  { cat:"Sujets intéressants", titre:"Le bateau de Thésée",
    corps:`<p>Un bateau en bois : on remplace une planche abîmée, puis une autre, jusqu'à ce qu'<strong>aucune planche d'origine ne reste</strong>. Est-ce toujours le même bateau ?</p>
    <p>Et si on reconstruisait un bateau avec toutes les vieilles planches — lequel est le « vrai » ?</p>
    <p>L'identité d'une chose n'est peut-être pas dans sa matière, mais dans sa continuité.</p>`,
    why:"Tes cellules se renouvellent presque toutes en quelques années. Qu'est-ce qui fait que tu restes « toi » ?" },

  { cat:"Sujets intéressants", titre:"L'effet papillon",
    corps:`<p>Certains systèmes sont si sensibles qu'une <strong>différence minuscule au départ</strong> change tout à l'arrivée.</p>
    <p>D'où l'image : un battement d'ailes de papillon pourrait, en théorie, déclencher une tornade à l'autre bout du monde.</p>
    <p>Ce n'est pas magique, c'est mathématique : les petites erreurs s'amplifient à chaque étape. D'où l'impossibilité de prévoir la météo au-delà de ~10 jours.</p>`,
    why:"Certaines choses sont imprévisibles non par ignorance, mais par nature." },

  { cat:"Sujets intéressants", titre:"La caverne de Platon",
    corps:`<p>Des prisonniers enchaînés face à un mur voient seulement des ombres projetées par un feu derrière eux. Pour eux, <strong>ces ombres SONT la réalité</strong>.</p>
    <p>Si l'un s'échappe et découvre le vrai monde, puis revient l'expliquer, les autres ne le croiront pas — et se moqueront de lui.</p>
    <p>Et si ce qu'on prend pour la réalité n'était que des ombres ?</p>`,
    why:"2400 ans plus tard, une métaphore parfaite de l'esprit critique et de la difficulté à faire voir aux autres ce qu'on a compris." },

  { cat:"Sujets intéressants", titre:"Le paradoxe de l'anniversaire",
    corps:`<p>Dans un groupe de 23 personnes, la probabilité que deux partagent le même anniversaire dépasse <strong>50 %</strong>. Contre-intuitif !</p>
    <p>Le piège : on pense « moi vs les autres ». Mais il faut compter toutes les paires : 23 personnes = 253 paires possibles.</p>
    <p>Chaque paire a une petite chance de coïncider ; avec autant de paires, ça devient probable.</p>`,
    why:"Notre cerveau est mauvais avec les combinaisons. Ce paradoxe est au cœur de la sécurité informatique." },

  { cat:"Sujets intéressants", titre:"L'entropie",
    corps:`<p>Il y a une seule façon d'avoir une chambre rangée, mais des <strong>millions</strong> de façons de l'avoir en désordre.</p>
    <p>Donc au hasard, les choses glissent presque toujours vers le désordre : il y a beaucoup plus d'états désordonnés.</p>
    <p>C'est une loi de l'univers, et elle donne une « flèche » au temps : on se souvient du passé, pas du futur.</p>`,
    why:"Ranger, construire, maintenir la vie : lutter localement contre une pente universelle. Ça demande toujours de l'énergie." },

  // ---------- DÉVELOPPEMENT PERSONNEL ----------
  { cat:"Développement personnel", titre:"La règle des 2 minutes",
    corps:`<p>Deux usages puissants. 1) Si une tâche prend <strong>moins de 2 minutes, fais-la tout de suite</strong> plutôt que de la reporter.</p>
    <p>2) Pour créer une habitude, rends-la si petite qu'elle prend moins de 2 minutes : « lire une page », « une pompe ». Le but est d'abord de <em>commencer</em>.</p>`,
    why:"L'inertie est le vrai ennemi : commencer est bien plus dur que continuer. Baisse la barrière du départ." },

  { cat:"Développement personnel", titre:"1 % meilleur chaque jour",
    corps:`<p>S'améliorer de 1 % par jour paraît dérisoire. Mais 1,01 puissance 365 ≈ <strong>37</strong>. En un an, tu es 37 fois « meilleur ».</p>
    <p>À l'inverse, 1 % de moins chaque jour te ramène presque à zéro.</p>
    <p>On surestime les grands changements ponctuels et on sous-estime les petits gestes répétés.</p>`,
    why:"Vise le système (la routine), pas seulement l'objectif. Les petits gains composés font tout." },

  { cat:"Développement personnel", titre:"La zone d'apprentissage",
    corps:`<p>Trois zones : le <strong>confort</strong> (rien de neuf), l'<strong>apprentissage</strong> (un défi juste au-dessus de ton niveau), la <strong>panique</strong> (trop dur, tu bloques).</p>
    <p>On ne progresse que dans la zone d'apprentissage : assez inconfortable pour stimuler, pas assez pour décourager.</p>`,
    why:"Si c'est trop facile tu stagnes, trop dur tu abandonnes. Cherche le « juste assez difficile »." },

  { cat:"Développement personnel", titre:"Se parler comme à un ami",
    corps:`<p>La critique intérieure dure (« je suis nul ») ne motive pas : elle paralyse.</p>
    <p>L'auto-compassion, c'est se parler comme on parlerait à un ami qui échoue : avec bienveillance et lucidité.</p>
    <p>La recherche montre que ça améliore la résilience et la persévérance plus que l'autoflagellation.</p>`,
    why:"Tu es la voix que tu entends le plus souvent. Autant qu'elle soit un allié." },

  { cat:"Développement personnel", titre:"Mettre des mots sur ses émotions",
    corps:`<p>Écrire ses pensées 10 minutes, ou simplement nommer ce qu'on ressent, <strong>réduit l'intensité de l'émotion</strong> (les chercheurs parlent d'« affect labeling »).</p>
    <p>Le cerveau traite mieux ce qui est nommé : un flou anxieux devient un problème identifié, donc gérable.</p>`,
    why:"« Je suis débordé » vague fait plus mal que « j'ai 3 tâches en retard » précis. Nommer, c'est déjà agir." },

  // ---------- PRO / TRAVAIL ----------
  { cat:"Pro", titre:"La matrice d'Eisenhower",
    corps:`<p>Classe chaque tâche selon deux axes : urgent ? important ?</p>
    <p><strong>Important + urgent</strong> → fais. <strong>Important, pas urgent</strong> → planifie. <strong>Urgent, pas important</strong> → délègue. <strong>Ni l'un ni l'autre</strong> → supprime.</p>
    <p>Le quadrant le plus négligé — et le plus payant — est « important mais pas urgent » (santé, formation, relations).</p>`,
    why:"On confond urgent et important. Le vrai levier est ce qui compte sans crier." },

  { cat:"Pro", titre:"La loi de Parkinson",
    corps:`<p>« Le travail s'étale jusqu'à occuper tout le temps disponible. »</p>
    <p>Donne-toi 2 semaines pour une tâche, elle prendra 2 semaines. Donne-toi 2 jours, souvent 2 jours suffisent.</p>`,
    why:"Fixer des délais courts et volontairement serrés booste l'efficacité et coupe la procrastination." },

  { cat:"Pro", titre:"Le principe de Pareto (80/20)",
    corps:`<p>Environ <strong>80 % des résultats viennent de 20 % des causes</strong>. 20 % des clients font 80 % du chiffre, 20 % des efforts donnent 80 % des effets.</p>
    <p>Ce n'est pas une loi exacte, mais un réflexe : tout n'a pas le même poids.</p>`,
    why:"Identifie les 20 % qui comptent vraiment, et concentre-toi dessus au lieu de tout traiter à égalité." },

  { cat:"Pro", titre:"Assertif, ni passif ni agressif",
    corps:`<p>Trois façons de réagir : <strong>passif</strong> (je me tais, je subis), <strong>agressif</strong> (j'impose, j'écrase), <strong>assertif</strong> (j'exprime clairement mon besoin en respectant l'autre).</p>
    <p>Astuce : parler en « je » (« j'ai besoin de… ») plutôt qu'en « tu » accusateur (« tu ne fais jamais… »).</p>`,
    why:"L'assertivité préserve la relation ET fait passer le message. Les deux, pas l'un contre l'autre." },

  { cat:"Pro", titre:"Donner un feedback qui passe (SBI)",
    corps:`<p>Pour un retour efficace, décris trois choses : la <strong>Situation</strong>, le <strong>Comportement</strong> observé (factuel), et son <strong>Impact</strong>.</p>
    <p>« En réunion hier (S), tu as coupé la parole à Marie (C), du coup elle n'a pas pu finir son idée (I). »</p>
    <p>Pas de jugement (« tu es irrespectueux »), juste des faits et leurs effets.</p>`,
    why:"Un feedback factuel est mieux reçu qu'un jugement — et donne une piste claire pour changer." },

  // ---------- SPORT ----------
  { cat:"Sport", titre:"On progresse pendant le repos",
    corps:`<p>L'entraînement <strong>abîme</strong> un peu les muscles. C'est ensuite, au repos, que le corps les reconstruit un peu plus forts : c'est la surcompensation.</p>
    <p>Trop d'entraînement sans récupération = on stagne, voire on régresse.</p>`,
    why:"Le progrès se fait au repos autant qu'à l'effort. Dormir et récupérer font partie de l'entraînement." },

  { cat:"Sport", titre:"Le cardio « zone 2 »",
    corps:`<p>Un effort <strong>modéré où tu peux encore tenir une conversation</strong>. Ça développe l'endurance de fond, la santé du cœur, et brûle les graisses — sans t'épuiser.</p>
    <p>La plupart des athlètes d'endurance passent l'essentiel de leur temps à cette intensité facile.</p>`,
    why:"Tout ne doit pas être « à fond ». Le facile bien dosé construit une base solide." },

  { cat:"Sport", titre:"La surcharge progressive",
    corps:`<p>Le corps s'adapte à ce qu'on lui demande de façon répétée. Pour continuer à progresser, il faut <strong>augmenter graduellement</strong> la difficulté : plus de poids, de répétitions, de distance.</p>
    <p>Refaire toujours exactement la même séance = plateau.</p>`,
    why:"Sans stimulus croissant, pas de progrès. Ajoute un petit peu, régulièrement." },

  { cat:"Sport", titre:"La force part du centre",
    corps:`<p>Le « core » (abdominaux profonds, dos, bassin) stabilise tout le corps. Un centre solide protège le dos et améliore <strong>toutes</strong> les autres performances.</p>
    <p>Le gainage (planche) travaille cette stabilité mieux que les abdos « à la mode ».</p>`,
    why:"Un tronc faible limite tout le reste. Renforce le centre avant les extrémités." },

  { cat:"Sport", titre:"Le sommeil, meilleur « supplément »",
    corps:`<p>C'est pendant le sommeil que le corps répare les tissus, consolide les apprentissages moteurs et régule les hormones.</p>
    <p>Manquer de sommeil réduit la force, la récupération et… la motivation à s'entraîner.</p>`,
    why:"Mieux vaut bien dormir que s'entraîner épuisé. Aucun complément ne remplace le sommeil." },

  // ---------- NUTRITION ----------
  { cat:"Nutrition", titre:"L'index glycémique",
    corps:`<p>C'est la vitesse à laquelle un aliment fait monter le sucre dans le sang. <strong>IG élevé</strong> (sucre, pain blanc) = pic puis chute = faim et coup de barre.</p>
    <p><strong>IG bas</strong> (légumineuses, flocons d'avoine, légumes) = énergie plus stable et durable.</p>`,
    why:"Privilégier les IG bas stabilise ton énergie et ton appétit sur la journée." },

  { cat:"Nutrition", titre:"Les protéines rassasient",
    corps:`<p>Parmi les nutriments, les <strong>protéines</strong> (œufs, poisson, légumineuses, viande) coupent la faim le plus longtemps et servent à réparer et construire les muscles.</p>
    <p>Un repas riche en protéines évite mieux le grignotage qu'un repas gras ou sucré.</p>`,
    why:"Pour tenir sans fringale, charge d'abord en protéines." },

  { cat:"Nutrition", titre:"Soif ou faim ?",
    corps:`<p>On confond souvent les deux : une petite envie de grignoter est parfois une <strong>légère déshydratation</strong>.</p>
    <p>Or même une déshydratation modérée baisse la concentration et l'énergie.</p>`,
    why:"Un verre d'eau avant de céder à une fringale règle souvent le « problème » — et améliore le focus." },

  { cat:"Nutrition", titre:"Les fibres nourrissent ton microbiote",
    corps:`<p>Les fibres (légumes, fruits, céréales complètes) ne sont pas digérées par toi, mais par les <strong>bonnes bactéries de ton intestin</strong>.</p>
    <p>Ce microbiote influence la digestion, l'immunité, et même l'humeur.</p>`,
    why:"Manger des fibres, c'est soigner bien plus que sa digestion. C'est nourrir un écosystème entier." },

  { cat:"Nutrition", titre:"Le déficit calorique",
    corps:`<p>On perd du poids quand on <strong>dépense plus de calories qu'on en consomme</strong> — quel que soit le régime à la mode.</p>
    <p>Les régimes « miracles » fonctionnent surtout parce qu'ils créent ce déficit d'une manière ou d'une autre.</p>`,
    why:"Comprendre ce principe simple te libère des régimes miracles et des culpabilités inutiles." },

  // ---------- GÉOPOLITIQUE ----------
  { cat:"Géopolitique", titre:"Les points d'étranglement maritimes",
    corps:`<p>Quelques passages étroits — détroit d'Ormuz, canal de Suez, détroit de Malacca — voient transiter une <strong>énorme part</strong> du pétrole et du commerce mondial.</p>
    <p>Les bloquer, même quelques jours, peut paralyser des pans entiers de l'économie mondiale.</p>`,
    why:"Quelques points minuscules sur la carte concentrent un pouvoir géopolitique immense." },

  { cat:"Géopolitique", titre:"La malédiction des ressources",
    corps:`<p>Paradoxe : beaucoup de pays très riches en pétrole ou en minerais sont plus <strong>pauvres et instables</strong> que des pays sans ressources.</p>
    <p>La rente facile attise la corruption, finance les conflits et étouffe le reste de l'économie.</p>`,
    why:"La richesse du sous-sol ne garantit pas la prospérité — parfois c'est même l'inverse." },

  { cat:"Géopolitique", titre:"Le soft power",
    corps:`<p>Le pouvoir d'un pays ne vient pas que des armes. Le <strong>soft power</strong>, c'est influencer par sa culture, ses valeurs, son attractivité : films, musique, universités, mode.</p>
    <p>Quand le monde regarde tes séries et rêve de tes universités, tu gagnes sans tirer un coup de feu.</p>`,
    why:"Séduire coûte moins cher et dure plus longtemps que contraindre." },

  { cat:"Géopolitique", titre:"Les terres rares",
    corps:`<p>Ce sont des métaux essentiels à l'électronique, aux batteries, aux éoliennes, aux moteurs. Sans eux, pas de smartphone ni de voiture électrique.</p>
    <p>Leur extraction et leur raffinage sont très <strong>concentrés dans quelques pays</strong> — ce qui en fait un puissant levier stratégique.</p>`,
    why:"Qui contrôle ces métaux pèse sur toute la technologie mondiale." },

  { cat:"Géopolitique", titre:"Le dilemme de sécurité",
    corps:`<p>Un pays s'arme pour se défendre. Ses voisins le voient, se sentent menacés, et s'arment à leur tour.</p>
    <p>Résultat : tout le monde finit <strong>moins</strong> en sécurité qu'au départ — alors que personne ne voulait la guerre.</p>`,
    why:"Explique bien des courses aux armements : de bonnes intentions individuelles, un résultat collectif dangereux." },

  // ---------- TECHNIQUES ----------
  { cat:"Techniques", titre:"La technique Pomodoro",
    corps:`<p>Travaille <strong>25 minutes concentré</strong>, sans distraction, puis prends 5 minutes de pause. Répète. Toutes les 4 sessions, une pause plus longue.</p>
    <p>Le minuteur crée une petite urgence et rend les grosses tâches moins intimidantes : tu ne t'engages que pour 25 minutes.</p>`,
    why:"Découper le temps en petits blocs bat la procrastination et protège ta concentration." },

  { cat:"Techniques", titre:"La répétition espacée",
    corps:`<p>Pour mémoriser durablement, révise à <strong>intervalles croissants</strong> (1 jour, 3 jours, 1 semaine, 1 mois…) plutôt que tout d'un coup.</p>
    <p>On retient beaucoup mieux quand on révise juste avant d'oublier.</p>`,
    why:"Réviser peu mais au bon moment bat le bachotage de dernière minute — pour un effort total bien moindre." },

  { cat:"Techniques", titre:"La méthode Feynman",
    corps:`<p>Pour vraiment comprendre un sujet, <strong>explique-le simplement</strong>, comme à un enfant de 10 ans.</p>
    <p>Là où tu bafouilles ou emploies du jargon, c'est que tu n'as pas encore compris. Retourne au point flou, puis réessaie.</p>`,
    why:"Enseigner révèle impitoyablement les trous de ta compréhension. C'est le meilleur test." },

  { cat:"Techniques", titre:"Expliquer à voix haute (rubber duck)",
    corps:`<p>Bloqué sur un problème ? Explique-le <strong>à voix haute</strong>, dans le détail — même à un canard en plastique posé sur ton bureau.</p>
    <p>Très souvent, la solution apparaît d'elle-même au moment où tu la formules.</p>`,
    why:"Verbaliser force ton cerveau à structurer le problème. C'est un débogueur gratuit." },

  { cat:"Techniques", titre:"Le time-blocking",
    corps:`<p>Au lieu d'une to-do list qui flotte, <strong>réserve des créneaux précis</strong> dans ton agenda pour chaque type de tâche : « 9h-10h : e-mails », « 14h-16h : projet ».</p>
    <p>Une tâche sans moment assigné a tendance à ne jamais se faire.</p>`,
    why:"Donner une heure à une intention, c'est la transformer en rendez-vous que tu tiens." },

  // ---------- INGÉNIERIE & MER ----------
  { cat:"Ingénierie & Mer", titre:"Le positionnement RTK",
    corps:`<p>Un GPS classique donne une précision de l'ordre du mètre. Le <strong>RTK</strong> (Real-Time Kinematic) utilise une station de référence fixe qui mesure l'erreur commune aux satellites et la corrige en temps réel — précision <strong>centimétrique</strong>.</p>
    <p>C'est ce qui permet de poser un pieu, une caisson ou un tronçon de digue exactement là où le plan l'exige.</p>`,
    why:"La précision ne vient pas d'un meilleur satellite, mais de la correction différentielle : isoler l'erreur commune et la soustraire." },

  { cat:"Ingénierie & Mer", titre:"Le sondeur multifaisceaux",
    corps:`<p>Un sondeur monofaisceau mesure la profondeur point par point, sous le bateau. Le <strong>multifaisceaux</strong> émet un éventail de faisceaux et cartographie une bande entière du fond en un seul passage — des dizaines de milliers de points par seconde.</p>
    <p>C'est le passage du crayon au scanner : on ne sonde plus une ligne, on numérise une surface.</p>`,
    why:"La donnée n'a de valeur que géoréférencée : chaque point doit intégrer position, attitude (roulis, tangage, houle) et célérité du son." },

  { cat:"Ingénierie & Mer", titre:"La vitesse du son dans l'eau",
    corps:`<p>Un sondeur ne mesure pas une distance, mais un <strong>temps de trajet</strong> aller-retour. Pour le convertir en profondeur, il faut connaître la vitesse du son — qui varie de ~1450 à 1550 m/s selon température, salinité et pression.</p>
    <p>Une erreur de célérité courbe littéralement le fond mesuré : des artefacts en « sourire » ou « fronce » trahissent un mauvais profil de son.</p>`,
    why:"Le capteur ne « voit » pas la profondeur, il la calcule via un modèle du milieu. Maîtriser le milieu, c'est maîtriser la mesure." },

  // ---------- INVESTISSEMENT ----------
  { cat:"Investissement", titre:"Le cycle de la dette",
    corps:`<p>Ray Dalio distingue deux cycles : un cycle de dette <strong>court</strong> (~5-8 ans, la récession classique) et un cycle <strong>long</strong> (~50-75 ans) qui se solde par un désendettement massif.</p>
    <p>Savoir où l'on se situe dans ces cycles éclaire les taux, l'inflation et la valorisation des actifs bien mieux que l'actualité du jour.</p>`,
    why:"La macro n'est pas du bruit : c'est la marée qui soulève ou abaisse tous les bateaux. Sélectionner des titres sans vue macro, c'est ramer à contre-courant." },

  { cat:"Investissement", titre:"La J-curve du private equity",
    corps:`<p>Un fonds de PE perd d'abord de l'argent — frais de gestion, participations pas encore revalorisées — avant de générer ses retours : la courbe des rendements dessine un <strong>« J »</strong>.</p>
    <p>Les premières années sont négatives par construction, pas par échec.</p>`,
    why:"Juger un fonds sur ses 2-3 premières années n'a pas de sens. L'illiquidité est le prix — et parfois la source — de la prime de rendement." },

  { cat:"Investissement", titre:"Les taux, gravité des actifs",
    corps:`<p>La valeur de tout actif se lit par rapport au <strong>taux sans risque</strong> (obligations d'État). Quand les taux montent, le coût de l'argent monte, et les actifs à cash-flows lointains (tech, PE, immobilier) sont mécaniquement dévalorisés.</p>`,
    why:"Buffett : « les taux d'intérêt sont à la valeur des actifs ce que la gravité est à la matière. » Tout se mesure par rapport à eux." },

  // ---------- STRATÉGIE & PI ----------
  { cat:"Stratégie & PI", titre:"Le brevet : divulguer pour protéger",
    corps:`<p>Un brevet est un marché avec l'État : un monopole temporaire (20 ans) <strong>en échange de la divulgation publique</strong> de l'invention. Le secret, lui, protège indéfiniment mais s'effondre à la première fuite (la recette du Coca n'est pas brevetée).</p>`,
    why:"Breveter, c'est enseigner à ses concurrents. Le vrai choix : monopole limité mais public, ou secret illimité mais fragile." },

  { cat:"Stratégie & PI", titre:"Les douves économiques (moat)",
    corps:`<p>Un avantage concurrentiel durable vient de peu de sources : <strong>effets de réseau</strong>, coûts de transfert, avantage de coût structurel, actifs intangibles (marque, brevets), économies d'échelle. Le reste s'érode vite.</p>`,
    why:"Une bonne marge attire les prédateurs. La question n'est pas « es-tu rentable ? » mais « qu'est-ce qui empêche un concurrent de copier ta rentabilité ? »" },

  // ---------- ENDURANCE ----------
  { cat:"Endurance", titre:"Le seuil lactique",
    corps:`<p>À basse intensité, le corps recycle le lactate au fur et à mesure. Au-delà d'un <strong>seuil</strong>, la production dépasse l'élimination : le lactate s'accumule et l'effort devient rapidement intenable.</p>
    <p>Repousser ce seuil est le cœur de l'entraînement d'endurance.</p>`,
    why:"En half-Ironman, ce qui compte n'est pas ta VO2max maximale, mais la fraction que tu peux tenir des heures — ton seuil." },

  { cat:"Endurance", titre:"VO2max contre économie",
    corps:`<p>Deux athlètes de même VO2max ne vont pas à la même vitesse : celui qui a la meilleure <strong>économie</strong> (moins d'énergie dépensée à allure donnée) gagne. Ça se travaille par la technique, la force et le volume.</p>`,
    why:"Passé un certain niveau, on ne progresse plus en poussant le moteur (VO2max) mais en réduisant les frottements (économie). Rendement > puissance brute." },

  // ---------- MOTO ----------
  { cat:"Moto", titre:"Le contre-braquage",
    corps:`<p>À vitesse, pour tourner à droite en moto, on <strong>pousse le guidon vers la gauche</strong>. Ce contre-braquage fait pencher la machine dans le virage. Contre-intuitif — et pourtant tous les motards le font, souvent sans le savoir.</p>`,
    why:"L'effet gyroscopique des roues renverse l'intuition. Un système rapide n'obéit pas aux mêmes règles qu'un système lent." },

  // ---------- HISTOIRE MILITAIRE ----------
  { cat:"Histoire militaire", titre:"La stratégie indirecte",
    corps:`<p>Plutôt que d'attaquer l'ennemi de front (coûteux), Liddell Hart prône l'<strong>approche indirecte</strong> : le déséquilibrer, couper ses lignes, frapper où il ne défend pas, viser le moral avant les forces.</p>`,
    why:"Sun Tzu déjà : « l'excellence suprême est de soumettre l'ennemi sans combattre. » Directement transposable en négociation et en business." },

  { cat:"Histoire militaire", titre:"La boucle OODA (Boyd)",
    corps:`<p>Le pilote de chasse John Boyd a formalisé la boucle <strong>Observer – Orienter – Décider – Agir</strong>. Celui qui la boucle plus vite que l'adversaire lui impose le tempo, jusqu'à la paralysie décisionnelle.</p>`,
    why:"Née en combat aérien, reprise par les startups : en environnement incertain, la vitesse de décision bat la planification lente et parfaite." },

  // ---------- ENTREPRENEURIAT ----------
  { cat:"Entrepreneuriat", titre:"Marge n'est pas trésorerie",
    corps:`<p>Une entreprise rentable peut mourir faute de <strong>cash</strong> : une croissance qui dévore le besoin en fonds de roulement, des clients qui paient à 90 jours. Le profit est une opinion comptable ; la trésorerie est un fait.</p>`,
    why:"« Revenue is vanity, profit is sanity, cash is king. » On ne fait pas faillite parce qu'on perd de l'argent, mais parce qu'on n'a plus de quoi payer." },

  // ===== LOT 2 : PARENT =====
  // ---------- SUJETS INTÉRESSANTS ----------
  { cat:"Sujets intéressants", titre:"Le paradoxe de Fermi",
    corps:`<p>L'univers est immense et très vieux : il devrait grouiller de civilisations. Alors « <strong>où est tout le monde</strong> ? »</p>
    <p>Le silence radio est troublant. Trois pistes : la vie intelligente est rarissime, elle s'autodétruit vite, ou elle nous évite.</p>`,
    why:"Chaque explication a des implications vertigineuses pour notre propre avenir." },
  { cat:"Sujets intéressants", titre:"Le rasoir de Hanlon",
    corps:`<p>« Ne jamais attribuer à la malveillance ce que la <strong>bêtise, la fatigue ou l'incompétence</strong> suffisent à expliquer. »</p>`,
    why:"La plupart des « attaques » perçues sont des maladresses. Économise ton énergie de conflit." },
  { cat:"Sujets intéressants", titre:"L'effet Streisand",
    corps:`<p>Vouloir censurer une information la rend souvent virale. En 2003, Barbra Streisand a voulu faire retirer une photo de sa villa — résultat : des millions de vues.</p>`,
    why:"L'attention se nourrit de la répression. Parfois, le silence est la meilleure défense." },
  { cat:"Sujets intéressants", titre:"Le paradoxe de Simpson",
    corps:`<p>Une tendance visible dans plusieurs groupes peut <strong>s'inverser</strong> quand on les additionne. Un traitement peut sembler meilleur globalement, et pire dans chaque sous-groupe.</p>`,
    why:"Les moyennes mentent. Toujours demander : « agrégé sur quoi ? »" },
  { cat:"Sujets intéressants", titre:"La loi de Goodhart",
    corps:`<p>« Quand une mesure devient un objectif, elle cesse d'être une bonne mesure. » Vise le nombre d'appels, tes commerciaux appelleront pour rien.</p>`,
    why:"Piloter par des indicateurs déforme le comportement. Mesure des résultats, pas des proxys." },
  { cat:"Sujets intéressants", titre:"Le dilemme agent-principal",
    corps:`<p>Dès que quelqu'un agit pour toi — employé, gérant, courtier — ses intérêts diffèrent des tiens.</p>`,
    why:"Presque tout conflit d'organisation se lit comme un problème d'alignement d'intérêts." },

  // ---------- DÉVELOPPEMENT PERSONNEL ----------
  { cat:"Développement personnel", titre:"Procrastiner n'est pas de la paresse",
    corps:`<p>On ne repousse pas par flemme, mais pour <strong>fuir une émotion désagréable</strong> : peur d'échouer, ennui, confusion.</p>`,
    why:"Traite l'émotion (« qu'est-ce qui me rebute exactement ? »), pas la to-do list." },
  { cat:"Développement personnel", titre:"Le biais du présent",
    corps:`<p>On surestime le plaisir immédiat face au bénéfice futur. D'où la difficulté à épargner ou à s'entraîner.</p>`,
    why:"Rends la bonne action facile maintenant, la mauvaise coûteuse maintenant. Conçois ton environnement." },
  { cat:"Développement personnel", titre:"La fatigue décisionnelle",
    corps:`<p>Chaque micro-décision use ton énergie mentale. Certains automatisent le trivial (même tenue, mêmes repas) pour la garder aux vraies décisions.</p>`,
    why:"La discipline est une ressource limitée : épargne-la pour ce qui compte." },
  { cat:"Développement personnel", titre:"Habitudes : viser l'identité",
    corps:`<p>« Je ne fume pas » tient mieux que « j'essaie d'arrêter ». Les habitudes durables découlent de <strong>qui l'on croit être</strong>.</p>`,
    why:"Vise l'identité (« je suis quelqu'un qui s'entraîne »), les actes suivent." },
  { cat:"Développement personnel", titre:"Jamais deux fois de suite",
    corps:`<p>Rater un jour arrive. Rater <strong>deux</strong> fois de suite, c'est le début d'une nouvelle (mauvaise) habitude.</p>`,
    why:"La perfection est impossible ; la reprise immédiate, non." },
  { cat:"Développement personnel", titre:"L'attention se dresse",
    corps:`<p>Le cerveau est biaisé vers les menaces. Noter chaque jour quelques faits positifs réoriente activement l'attention.</p>`,
    why:"Ce n'est pas de la niaiserie : c'est un entraînement mesurable de l'attention." },

  // ---------- PRO ----------
  { cat:"Pro", titre:"La loi de Brooks",
    corps:`<p>« Ajouter des gens à un projet en retard le retarde davantage » : coûts de coordination et mise à niveau des nouveaux.</p>`,
    why:"Neuf femmes ne font pas un bébé en un mois. La main-d'œuvre n'est pas toujours divisible." },
  { cat:"Pro", titre:"Le coût irrécupérable",
    corps:`<p>L'argent déjà dépensé ne devrait pas influencer la suite — pourtant on « continue pour ne pas gâcher ».</p>`,
    why:"Seule question valable : au vu d'aujourd'hui, est-ce le meilleur usage de mes ressources ?" },
  { cat:"Pro", titre:"Déléguer, c'est fixer un niveau",
    corps:`<p>Déléguer n'est pas « fais ça » : c'est préciser le niveau d'autonomie — <strong>informe-moi</strong>, <strong>propose</strong>, ou <strong>décide et agis</strong>.</p>`,
    why:"La plupart des ratés de délégation sont un malentendu sur le niveau d'autonomie." },
  { cat:"Pro", titre:"Le principe de Peter",
    corps:`<p>Dans une hiérarchie, on est promu jusqu'à son <strong>niveau d'incompétence</strong>, puis on y reste.</p>`,
    why:"Le meilleur ingénieur fait rarement le meilleur manager : ce sont deux métiers." },
  { cat:"Pro", titre:"Le vrai coût d'une réunion",
    corps:`<p>Une heure de réunion à 8 personnes coûte <strong>8 heures</strong> de travail.</p>`,
    why:"Traite le temps collectif comme un budget. Pas d'ordre du jour ni de décision → pas de réunion." },
  { cat:"Pro", titre:"Urgent contre important",
    corps:`<p>L'urgent crie et capte ; l'important, silencieux, est ce qui construit vraiment. On sacrifie sans cesse le second au premier.</p>`,
    why:"Protéger du temps pour l'important non urgent est le geste de management le plus rentable." },

  // ---------- SPORT ----------
  { cat:"Sport", titre:"Le point de côté",
    corps:`<p>Cette douleur au flanc est souvent liée au diaphragme et à une respiration désordonnée à l'effort.</p>`,
    why:"Respire par le ventre et expire quand le pied opposé touche le sol : ça passe souvent." },
  { cat:"Sport", titre:"Le HIIT, à petite dose",
    corps:`<p>Des intervalles très intenses, entrecoupés de récup, améliorent vite la VO2max — mais coûtent cher à récupérer.</p>`,
    why:"C'est l'assaisonnement, pas le plat. En abuser mène tout droit au surentraînement." },
  { cat:"Sport", titre:"Les courbatures ne notent rien",
    corps:`<p>Les courbatures (24-72h après) viennent de micro-lésions, surtout lors des phases de freinage du muscle.</p>`,
    why:"Elles ne mesurent pas la qualité d'une séance. Pas de courbatures ≠ séance inutile." },
  { cat:"Sport", titre:"Mobilité n'est pas souplesse",
    corps:`<p>La souplesse est une amplitude passive ; la <strong>mobilité</strong> est une amplitude que tu contrôles activement. C'est elle qui protège et performe.</p>`,
    why:"Être souple sans force dans l'amplitude, c'est surtout être fragile." },
  { cat:"Sport", titre:"Échauffe-toi en mouvement",
    corps:`<p>Avant l'effort, des mouvements dynamiques préparent mieux que les étirements immobiles — qui peuvent même réduire la puissance juste avant.</p>`,
    why:"S'étirer à froid avant une perf est souvent contre-productif." },

  // ---------- NUTRITION ----------
  { cat:"Nutrition", titre:"Le petit-déjeuner n'est pas sacré",
    corps:`<p>Le sauter n'est ni bon ni mauvais en soi : ce qui compte, c'est le <strong>total et la qualité</strong> sur la journée.</p>`,
    why:"Beaucoup de « règles » nutritionnelles sont des habitudes culturelles déguisées en science." },
  { cat:"Nutrition", titre:"Les calories liquides",
    corps:`<p>Sodas, jus, alcool : avalés sans rassasier, ils s'ajoutent presque « gratuitement » au compteur.</p>`,
    why:"Le levier le plus simple pour beaucoup : arrêter de boire ses calories." },
  { cat:"Nutrition", titre:"Se rassasier par le volume",
    corps:`<p>On se sent plein par le <strong>volume</strong> de l'estomac et les protéines, pas par les calories. Légumes + protéines = beaucoup de satiété, peu de calories.</p>`,
    why:"Pour un déficit tenable, joue sur la densité des aliments, pas sur la privation." },
  { cat:"Nutrition", titre:"L'alcool vole ton sommeil",
    corps:`<p>L'alcool endort plus vite, mais dégrade le sommeil profond et paradoxal, ceux qui réparent.</p>`,
    why:"Un « verre pour dormir » te prive en réalité de ta récupération." },
  { cat:"Nutrition", titre:"« Zéro calorie » ≠ zéro effet",
    corps:`<p>Certains édulcorants sans calorie perturbent tout de même le microbiote et l'appétit chez une partie des gens.</p>`,
    why:"Le corps n'est pas une calculette : la qualité compte autant que le chiffre." },

  // ---------- GÉOPOLITIQUE ----------
  { cat:"Géopolitique", titre:"Le piège de Thucydide",
    corps:`<p>Quand une puissance montante menace une puissance établie, la guerre devient probable (Athènes contre Sparte… et aujourd'hui ?).</p>`,
    why:"Une grille de lecture des grandes rivalités — un risque à gérer, pas une fatalité." },
  { cat:"Géopolitique", titre:"Le heartland de Mackinder",
    corps:`<p>« Qui tient l'Europe de l'Est tient le cœur du continent ; qui tient ce cœur tient le monde. » La théorie de la puissance terrestre.</p>`,
    why:"Vieille d'un siècle, elle éclaire encore les stratégies eurasiennes." },
  { cat:"Géopolitique", titre:"Le dollar comme arme",
    corps:`<p>La domination du dollar permet des sanctions financières mondiales, via le contrôle des circuits de paiement.</p>`,
    why:"Une monnaie de réserve n'est pas qu'un moyen de paiement : c'est un instrument de puissance." },
  { cat:"Géopolitique", titre:"La démographie, destin lent",
    corps:`<p>Les pyramides des âges prédisent, des décennies à l'avance, la croissance, les retraites et la puissance d'un pays.</p>`,
    why:"La démographie change lentement mais massivement : un des rares futurs lisibles." },
  { cat:"Géopolitique", titre:"Mer contre terre",
    corps:`<p>Les puissances maritimes pensent commerce et flexibilité ; les puissances terrestres, masse et profondeur. Deux visions du monde.</p>`,
    why:"Savoir si un État « pense mer » ou « pense terre » explique beaucoup de ses choix." },
  { cat:"Géopolitique", titre:"Résilience contre efficacité",
    corps:`<p>Semi-conducteurs, engrais, médicaments : quelques usines concentrent des maillons vitaux. La crise a rappelé leur fragilité.</p>`,
    why:"On a optimisé pour l'efficacité ; la résilience est redevenue stratégique." },

  // ---------- TECHNIQUES ----------
  { cat:"Techniques", titre:"Limiter le travail en cours",
    corps:`<p>Trop de tâches en parallèle ralentit tout, à cause des changements de contexte. Limiter le nombre de choses « en cours » accélère le flux.</p>`,
    why:"Finir bat commencer. Une file courte livre plus vite qu'une file pleine." },
  { cat:"Techniques", titre:"Le pré-mortem",
    corps:`<p>Avant de lancer un projet, imagine qu'il a <strong>déjà échoué</strong> et demande « pourquoi ? ».</p>`,
    why:"On repère les risques bien mieux au passé imaginé qu'au futur conditionnel." },
  { cat:"Techniques", titre:"Réversible ou pas ?",
    corps:`<p>Bezos : les décisions réversibles se prennent vite ; les irréversibles méritent qu'on prenne son temps.</p>`,
    why:"On tue sa vitesse en traitant toutes les décisions comme irréversibles." },
  { cat:"Techniques", titre:"La règle 10/10/10",
    corps:`<p>Face à un choix : comment je le vivrai dans <strong>10 minutes, 10 mois, 10 ans</strong> ?</p>`,
    why:"Étaler l'émotion sur trois horizons dégonfle l'impulsivité." },
  { cat:"Techniques", titre:"Grouper les interruptions",
    corps:`<p>Rassembler mails et notifications en 2-3 plages fixes protège les blocs de concentration.</p>`,
    why:"Chaque interruption coûte ~20 min de re-concentration : le vrai coût est invisible." },
  { cat:"Techniques", titre:"La to-do en calendrier",
    corps:`<p>Une tâche sans créneau assigné entre en compétition avec tout le reste, et se fait repousser sans fin.</p>`,
    why:"Donner une heure à une intention, c'est la transformer en rendez-vous." },

  // ---------- INGÉNIERIE & MER ----------
  { cat:"Ingénierie & Mer", titre:"Le zéro hydrographique",
    corps:`<p>Une profondeur n'a de sens que par rapport à une référence (marée, géoïde) : le « zéro ». Mauvais zéro = erreurs partout.</p>`,
    why:"En hydro comme en business : définir le zéro avant de mesurer quoi que ce soit." },
  { cat:"Ingénierie & Mer", titre:"La centrale inertielle (IMU)",
    corps:`<p>Accéléromètres et gyroscopes mesurent roulis, tangage et cap pour « redresser » les données malgré la houle.</p>`,
    why:"Sans correction d'attitude, un fond plat paraît chaotique : le mouvement du porteur pollue tout." },
  { cat:"Ingénierie & Mer", titre:"La fusion de capteurs",
    corps:`<p>Combiner GNSS, IMU, sondeur et célérimètre donne une mesure plus fiable que chacun pris seul.</p>`,
    why:"La robustesse vient de la redondance et du recoupement, pas d'un capteur parfait." },
  { cat:"Ingénierie & Mer", titre:"La marée est prévisible",
    corps:`<p>La marée est une somme d'ondes (lune, soleil, géographie) qu'on décompose et qu'on rejoue des années à l'avance.</p>`,
    why:"Un phénomène complexe peut être parfaitement modélisé comme une somme de cycles simples." },
  { cat:"Ingénierie & Mer", titre:"Le LiDAR bathymétrique",
    corps:`<p>Un laser vert pénètre l'eau claire et cartographie les fonds côtiers depuis un avion, là où les bateaux ne passent pas.</p>`,
    why:"Le bon capteur dépend du milieu : turbidité, profondeur, urgence. Aucun n'est universel." },
  { cat:"Ingénierie & Mer", titre:"La couche SIG",
    corps:`<p>Superposer des couches — bathymétrie, courants, trafic, réglementation — transforme des données brutes en décisions.</p>`,
    why:"La donnée isolée ne vaut rien ; c'est la mise en relation qui crée l'information." },

  // ---------- INVESTISSEMENT ----------
  { cat:"Investissement", titre:"Les intérêts composés",
    corps:`<p>Le rendement génère du rendement : la courbe est <strong>exponentielle</strong>, pas linéaire. Le temps est le facteur dominant.</p>`,
    why:"Commencer tôt bat épargner beaucoup. C'est le moteur silencieux de la richesse." },
  { cat:"Investissement", titre:"Le risque n'est pas la volatilité",
    corps:`<p>La volatilité est le bruit des prix au jour le jour. Le vrai risque, c'est la <strong>perte permanente</strong> de capital.</p>`,
    why:"Confondre les deux fait vendre au pire moment, en bas." },
  { cat:"Investissement", titre:"La marge de sécurité",
    corps:`<p>Graham : n'achète que bien en dessous de ta valeur estimée. Le coussin absorbe tes erreurs d'analyse.</p>`,
    why:"On se trompe toujours un peu ; la marge de sécurité rend l'erreur survivable." },
  { cat:"Investissement", titre:"Le lissage (DCA)",
    corps:`<p>Investir un montant fixe à intervalle régulier lisse le prix d'entrée et neutralise le besoin de « timer » le marché.</p>`,
    why:"On ne bat pas le marché au timing ; on l'apprivoise par la régularité." },
  { cat:"Investissement", titre:"La diversification",
    corps:`<p>Des actifs peu corrélés réduisent le risque global sans forcément réduire le rendement.</p>`,
    why:"Le seul « repas gratuit » de la finance. Ne jamais tout miser sur une seule corrélation." },
  { cat:"Investissement", titre:"Le biais de survie des palmarès",
    corps:`<p>Indices et classements ne montrent que les survivants : les fonds et actions morts disparaissent des statistiques.</p>`,
    why:"Les performances passées affichées sont systématiquement embellies." },
  { cat:"Investissement", titre:"Value ou growth ?",
    corps:`<p>Acheter bon marché (value) ou payer cher une forte croissance (growth) : deux philosophies, sensibles différemment aux taux.</p>`,
    why:"Aucune n'est « la bonne » : elles brillent à des moments différents du cycle." },

  // ---------- STRATÉGIE & PI ----------
  { cat:"Stratégie & PI", titre:"Les 5 forces de Porter",
    corps:`<p>L'attractivité d'un marché dépend de 5 pressions : concurrents, entrants, substituts, pouvoir des clients, pouvoir des fournisseurs.</p>`,
    why:"La rentabilité est d'abord structurelle. Choisir son terrain bat bien jouer sur un mauvais terrain." },
  { cat:"Stratégie & PI", titre:"L'océan bleu",
    corps:`<p>Plutôt que se battre sur un marché saturé (océan rouge), créer un espace nouveau où la concurrence n'existe pas encore.</p>`,
    why:"La meilleure façon de gagner une bataille : ne pas la livrer là où tout le monde se bat." },
  { cat:"Stratégie & PI", titre:"La liberté d'exploitation (FTO)",
    corps:`<p>Avoir un brevet ne donne pas le droit d'exploiter : on peut malgré tout empiéter sur le brevet d'un autre.</p>`,
    why:"Breveter protège ; encore faut-il vérifier qu'on ne marche pas sur les brevets d'autrui." },
  { cat:"Stratégie & PI", titre:"Le secret d'affaires",
    corps:`<p>Protégé tant qu'il reste secret et gardé activement ; sans limite de durée, mais sans défense contre la rétro-ingénierie.</p>`,
    why:"Complément ou alternative au brevet : le bon choix dépend de la « copiabilité »." },
  { cat:"Stratégie & PI", titre:"La licence croisée",
    corps:`<p>Deux détenteurs de brevets s'autorisent mutuellement l'usage, évitant procès et blocages réciproques.</p>`,
    why:"La propriété intellectuelle n'est pas qu'une arme : c'est aussi une monnaie d'échange." },

  // ---------- ENDURANCE ----------
  { cat:"Endurance", titre:"Le mur du marathon",
    corps:`<p>Vers 30-35 km, les réserves de glycogène s'épuisent : le corps bascule sur les graisses, plus lentes. C'est le « mur ».</p>`,
    why:"Nutrition et allure se préparent pour repousser le mur, jamais s'improvisent le jour J." },
  { cat:"Endurance", titre:"L'affûtage (tapering)",
    corps:`<p>Réduire le volume dans les jours précédant une course laisse le corps se régénérer sans perdre la forme acquise.</p>`,
    why:"Contre-intuitif : moins s'entraîner juste avant améliore la performance." },
  { cat:"Endurance", titre:"Le pacing négatif",
    corps:`<p>Partir trop vite ruine la fin. Courir la seconde moitié plus vite que la première (négative split) est souvent optimal.</p>`,
    why:"Sur longue distance, gérer l'effort bat la puissance brute. La patience est une compétence." },
  { cat:"Endurance", titre:"Les transitions comptent",
    corps:`<p>En triathlon, les passages natation-vélo-course (T1/T2) sont des disciplines à part entière : on y gagne ou perd des minutes.</p>`,
    why:"La performance ne se joue pas qu'à l'effort, mais dans les interfaces — comme partout." },
  { cat:"Endurance", titre:"La périodisation",
    corps:`<p>Alterner phases de volume, d'intensité et d'affûtage structure la saison pour arriver au pic le jour J.</p>`,
    why:"On ne peut pas être au top toute l'année : programmer le pic est un art." },

  // ---------- MOTO ----------
  { cat:"Moto", titre:"Le regard porte la moto",
    corps:`<p>« La moto va où regardent tes yeux. » Fixer un obstacle, c'est foncer dessus : c'est la fixation de la cible.</p>`,
    why:"Regarde la sortie du virage, pas le danger. Ton corps suit ton regard." },
  { cat:"Moto", titre:"Le point de corde",
    corps:`<p>La trajectoire idéale d'un virage : extérieur – intérieur – extérieur, pour ouvrir l'angle et la visibilité.</p>`,
    why:"Le bon tracé transforme un virage serré en courbe douce : de la géométrie appliquée." },
  { cat:"Moto", titre:"L'adhérence est un budget",
    corps:`<p>Le pneu a une réserve d'adhérence, partagée entre freiner, tourner et accélérer. Tout demander à la fois = chute.</p>`,

  { cat:"Moto", titre:"Le frein moteur",
    corps:`<p>Rétrograder ralentit via le moteur, ménage les freins et stabilise la machine à l'entrée du virage.</p>`,

  // ---------- HISTOIRE MILITAIRE ----------
  { cat:"Histoire militaire", titre:"La logistique gagne les guerres",
    corps:`<p>« Les amateurs parlent stratégie, les professionnels parlent logistique. » Ravitaillement, carburant et moral décident souvent plus que les batailles.</p>`,
    why:"L'intendance bat les beaux plans. Transposable à toute organisation." },
  { cat:"Histoire militaire", titre:"Le brouillard de la guerre",
    corps:`<p>Clausewitz : sur le terrain, l'information est incomplète, fausse ou en retard, et la « friction » dérègle chaque plan.</p>`,

  { cat:"Histoire militaire", titre:"La concentration des forces",
    corps:`<p>Rassembler ses moyens au point décisif plutôt que se disperser sur tout le front.</p>`,
    why:"L'éparpillement est une mort lente. Choisis ton point d'effort." },
  { cat:"Histoire militaire", titre:"La dissuasion",
    corps:`<p>La force qui agit sans être employée : convaincre l'adversaire que t'attaquer coûterait trop cher.</p>`,

  { cat:"Histoire militaire", titre:"Le renseignement renverse tout",
    corps:`<p>Savoir ce que l'adversaire ignore que tu sais (Enigma, interceptions) inverse des rapports de force entiers.</p>`,
    why:"L'information asymétrique est un multiplicateur de puissance colossal." },
  { cat:"Histoire militaire", titre:"Usure ou mouvement",
    corps:`<p>Écraser par la masse et le temps, ou vaincre par la vitesse et la manœuvre : deux doctrines opposées.</p>`,
    why:"Savoir quelle guerre on livre évite de jouer le mauvais jeu." },

  // ---------- ENTREPRENEURIAT ----------
  { cat:"Entrepreneuriat", titre:"Le product-market fit",
    corps:`<p>Le moment où le marché « tire » le produit hors de tes mains. Avant lui, presque rien d'autre ne compte.</p>`,
    why:"Ne scale pas, n'embauche pas, ne lève pas avant. Le fit d'abord." },
  { cat:"Entrepreneuriat", titre:"CAC contre LTV",

  { cat:"Entrepreneuriat", titre:"Le runway",

  { cat:"Entrepreneuriat", titre:"Parler aux clients d'abord",

    why:"Le contact précoce évite de construire à la perfection ce que personne ne veut." },
  { cat:"Entrepreneuriat", titre:"Qui tranche ?",

    why:"Une décision claire mais imparfaite bat une indécision partagée." },
  { cat:"Entrepreneuriat", titre:"La dilution",
    corps:`<p>Lever des fonds échange du capital contre du cash : mieux vaut une petite part d'un grand gâteau que tout d'un petit.</p>`,
