    why:"Un poulpe peut changer de couleur en une seconde pour se cacher. C'est le champion du déguisement !" },

  { cat:"Animaux", titre:"Les manchots offrent des cailloux",
    corps:`<p>Les manchots sont des animaux très romantiques ! Quand un manchot veut se marier, il cherche le plus beau <strong>caillou</strong> ou le plus joli galet qu'il peut trouver sur les rochers. Puis il l'apporte à son amoureux comme cadeau spécial.</p>
    <p>C'est comme un bijou ! Si l'autre manchot le trouve beau et l'accepte, ils deviennent amoureux et construisent leur nid ensemble, souvent avec ce caillou dedans. Tous les manchots ne donnent pas les mêmes cailloux : chacun choisit son plus beau trésor !</p>`,
    why:"Le papa manchot garde l'œuf au chaud sur ses pieds pendant que la maman va manger. Quelle équipe !" },

  { cat:"Animaux", titre:"La fourmi super forte",
    corps:`<p>Une toute petite fourmi est <strong>extrêmement forte</strong>. Elle peut soulever et porter 50 fois son propre poids ! Pour toi, ce serait un peu comme si tu pouvais porter une voiture entière avec tes petits bras. C'est incroyable, non ?</p>
    <p>Mais ce n'est pas tout ! Les fourmis ne dorment presque pas comme nous. Au lieu d'un long sommeil, elles font plein de mini-siestes très courtes tout au long de la journée et de la nuit. Elles dorment quelques minutes, se réveillent, travaillent un peu, puis dorment encore. Elles ne s'arrêtent jamais vraiment !</p>`,
    why:"Dans une fourmilière, les fourmis sont toutes sœurs — et il peut y en avoir des millions !" },

  // ---------- ESPACE ----------
  { cat:"Espace", titre:"On ne peut pas crier dans l'espace",
    corps:`<p>Dans l'espace, il n'y a pas d'air du tout. Rien, rien, le vide complet ! Or le son a besoin d'air pour voyager jusqu'à nos oreilles.</p>
<p>Pense à tes chuchotements : ils se font entendre parce que l'air les porte. Sans air, même une explosion énorme, même une fusée qui décolle bruyamment, même quelque chose qui explose <strong>beaucoup beaucoup</strong> — tout ça serait <strong>totalement silencieux</strong> ! Les astronautes doivent utiliser des radios pour communiquer, sinon personne ne s'entendrait.</p>`,
    why:"C'est pour ça que les astronautes se parlent avec des radios, même quand ils sont juste à côté." },

  { cat:"Espace", titre:"La Lune s'en va tout doucement",
    corps:`<p>Chaque année, la Lune s'éloigne un tout petit peu de la Terre. Elle bouge d'environ <strong>4 centimètres</strong> — tu sais, la vitesse à laquelle poussent tes ongles ! C'est vraiment très très lent.</p>
<p>Mais attention : c'est vrai tous les ans, et ça n'arrête jamais. Dans millions d'années, la Lune sera beaucoup plus loin. Les anciens astronomes ne l'avaient pas remarqué parce que c'est trop lent, mais avec nos instruments modernes, on peut mesurer ce voyage minuscule et magnifique.</p>`,
    why:"Il y a très très longtemps, la Lune était beaucoup plus proche et paraissait géante dans le ciel." },

  { cat:"Espace", titre:"Un jour très très long sur Vénus",
    corps:`<p>Sur la planète Vénus, quelque chose d'étrange se passe : <strong>une seule journée dure plus longtemps qu'une année entière</strong> ! C'est fou, n'est-ce pas ? Vénus tourne sur elle-même super lentement, comme une toupie qui ne veut pas s'arrêter.</p>
<p>Imagine : tu te réveilles le matin sur Vénus, tu vas à l'école, tu joues... et tout ça dure des mois et des mois ! Pendant ce temps, Vénus aurait fait le tour du Soleil — donc tu aurais déjà eu ton anniversaire ! Drôle de calendrier.</p>`,
    why:"Sur Vénus, le Soleil se lève à l'ouest, parce qu'elle tourne à l'envers des autres planètes !" },

  // ---------- LE CORPS ----------
  { cat:"Le corps", titre:"Tes os plus solides que l'acier",
    corps:`<p>Pour leur poids, tes <strong>os</strong> sont plus résistants que l'acier des voitures ! Ton corps est fabriqué comme une forteresse super solide. C'est pour ça que tu peux sauter, courir, danser sans te casser en mille morceaux.</p>
<p>Tu as même un os minuscule dans l'oreille, plus petit qu'un grain de riz. Il s'appelle l'étrier et il t'aide à entendre. Incroyable, non ?</p>`,
    why:"Bébé, tu avais environ 300 os. En grandissant, certains se collent ensemble : il t'en reste 206 !" },

  { cat:"Le corps", titre:"Ton cerveau fait de l'électricité",
    corps:`<p>Ton cerveau fonctionne avec plein de tout petits signaux <strong>électriques</strong>. Il y en a assez pour allumer une petite ampoule ! C'est comme un ordinateur super puissant, caché dans ta tête, qui envoie des messages électriques partout.</p>
<p>Grâce à ces étincelles, tu peux penser, bouger, apprendre et rêver. Ton cerveau travaille même quand tu dors !</p>`,
    why:"Ton cerveau ne se repose jamais : même quand tu dors, il range tes souvenirs de la journée." },

  { cat:"Le corps", titre:"Pourquoi on a le hoquet",
    corps:`<p>Sous tes poumons, il y a un muscle qui t'aide à respirer : le diaphragme. Parfois il se contracte d'un coup, par surprise, et ça fait « <strong>HIC !</strong> ». C'est comme s'il sursautait.</p>
<p>Le hoquet arrive sans qu'on le commande. Personne ne sait bien pourquoi notre corps adore faire ça. Ça arrive souvent après manger trop vite ou quand on rit beaucoup !</p>`,
    why:"Personne n'a de truc magique prouvé contre le hoquet — mais boire de l'eau doucement aide souvent." },

  // ---------- NATURE ----------
  { cat:"Nature", titre:"Le miel ne s'abîme jamais",
    corps:`<p>Le <strong>miel</strong> peut se garder des milliers d'années sans pourrir ! On a retrouvé du miel dans des tombes très anciennes en Égypte, et il était encore bon à manger. Incroyable, non ?</p>
<p>C'est parce que le miel n'a pas d'eau où les microbes pourraient vivre. C'est comme un super-magicien qui empêche les choses de se gâter pour toujours !</p>`,
    why:"Une abeille doit visiter des milliers de fleurs pour fabriquer une seule petite cuillère de miel." },

  { cat:"Nature", titre:"Les arbres se parlent sous la terre",
    corps:`<p>Sous la terre, les racines des arbres sont reliées par des champignons, comme un <strong>réseau secret</strong> ! C'est magique : les arbres peuvent communiquer les uns avec les autres.</p>
<p>Un grand arbre fort peut même envoyer de la nourriture à un petit arbre malade à côté, comme s'il lui disait « courage, je suis là pour toi ! ». Les arbres sont solidaires !</p>`,
    why:"Les scientifiques appellent ça le « Wood Wide Web » : une sorte d'internet des forêts !" },

  // ---------- SCIENCES RIGOLOTES ----------
  { cat:"Sciences rigolotes", titre:"Pourquoi le ciel est bleu",
    corps:`<p>La lumière du soleil, c'est toutes les couleurs mélangées ensemble. En traversant l'air, c'est le <strong>bleu</strong> qui rebondit partout et partout dans le ciel, comme une balle invisible qui joue au rebond.</p>
<p>Le soir, le bleu s'en va au loin sur l'horizon, et il ne reste que le rouge et l'orange qui peintent le ciel comme un tableau magique. C'est pour ça que les couchers de soleil sont si beaux !</p>`,
    why:"C'est pour ça que les couchers de soleil sont tout roses et oranges !" },

  { cat:"Sciences rigolotes", titre:"L'arc-en-ciel est un rond",
    corps:`<p>Un <strong>arc-en-ciel</strong> est en vrai un cercle parfait et complet ! On n'en voit que la moitié, parce que le sol cache le reste de ce joli rond coloré.</p>
<p>Depuis un avion très haut dans le ciel, on peut parfois le voir en rond entier, avec toutes ses couleurs qui forment une belle bague dans les nuages.</p>`,
    why:"Pour en voir un : il faut le soleil dans ton dos et de la pluie devant toi." },

  // ---------- ÉMOTIONS ----------
  { cat:"Émotions", titre:"La colère est comme une vague",
    corps:`<p>Quand tu es très en colère, ton corps s'emballe et tu as l'impression que tout explose. Ton cœur s'accélère et tu respires plus vite. Mais la colère monte comme une <strong>vague</strong> à la plage… puis elle redescend toujours.</p>
<p>Si tu respires doucement en comptant jusqu'à 5, la vague passe plus vite. C'est comme si tu calmais l'orage dans ton ventre. Plus tu respires lentement, mieux ça va.</p>`,
    why:"Même les grands ont des colères. Dire « je suis fâché » aide déjà à se sentir mieux." },

  { cat:"Émotions", titre:"Le pouvoir de dire pardon",
    corps:`<p>Dire « <strong>pardon</strong> » quand on a fait de la peine, c'est très courageux. Ça ne veut pas dire qu'on est nul ou qu'on est un mauvais ami. Au contraire !</p>
<p>Ça veut dire qu'on est assez fort pour reconnaître qu'on s'est trompé et pour réparer. C'est comme un super pouvoir : tu peux rendre quelqu'un heureux juste en disant trois petits mots.</p>`,
    why:"Un « merci » et un « pardon » sincères rendent souvent les gens encore plus proches qu'avant." },

  // ===== LOT 2 : ENFANTS =====
  // ---------- ANIMAUX ----------
  { cat:"Animaux", titre:"Le caméléon aux yeux séparés",
    corps:`<p>Le caméléon a des super-pouvoirs avec ses yeux ! Il peut bouger ses <strong>deux yeux complètement séparément</strong> l'un de l'autre. Un œil peut regarder devant lui pendant que l'autre regarde derrière en même temps. Imagine avoir une caméra devant et une autre derrière !</p>
    <p>Grâce à ça, le caméléon voit presque tout autour de lui sans tourner la tête. C'est parfait pour repérer une mouche minuscule ou surveiller s'il y a un danger. Et il y a aussi un autre talent du caméléon : sa langue très longue qui sort super vite pour attraper ses proies. Quel animal spécial !</p>`,
    why:"Sa langue est plus longue que son corps et jaillit à toute vitesse pour attraper les insectes." },
  { cat:"Animaux", titre:"Le dauphin dort à moitié",
    corps:`<p>Le dauphin a trouvé un truc incroyable pour dormir. Il dort avec <strong>une seule moitié</strong> de son cerveau à la fois ! L'autre moitié reste éveillée et fait attention.</p>
    <p>Pourquoi ? Parce que le dauphin respire par un trou en haut de sa tête, et il doit se réveiller pour prendre de l'air. S'il dormait complètement, il oublierait de respirer ! Alors une moitié de son cerveau veille, surveille les dangers et n'oublie pas de respirer, tandis que l'autre se repose. C'est un sommeil malin et très intelligent !</p>`,
    why:"Il doit remonter respirer à la surface : il ne peut pas dormir profondément comme nous." },
  { cat:"Animaux", titre:"Le colibri fait du surplace",
    corps:`<p>Le colibri est un minuscule oiseau magique qui bat des ailes des dizaines de fois par seconde, tellement vite qu'on entend un drôle de bruit ! Ce super-pouvoir lui permet de faire du <strong>surplace</strong> dans l'air sans bouger du tout.</p>
    <p>Ce n'est pas tout : le colibri peut aussi voler à reculons, plonger vers le bas, et même voler sur le côté. C'est le seul oiseau qui peut faire ça ! Il utilise ce talent pour approcher des petites fleurs et boire le nectar sucré avec son long bec. C'est comme un petit hélicoptère très intelligent !</p>`,
    why:"Son petit cœur bat plus de 1000 fois par minute quand il vole." },
  { cat:"Animaux", titre:"Les abeilles voient l'invisible",
    corps:`<p>Les abeilles ont une super-vision ! Elles voient des couleurs que nous, les humains, on ne peut jamais voir. C'est un peu comme si elles voyaient des couleurs de rêve ou des couleurs magiques.</p>
    <p>Et tu sais quoi ? Ces couleurs invisibles dessinent des <strong>« pistes d'atterrissage » secrètes</strong> sur les fleurs ! C'est comme des routes colorées que seules les abeilles peuvent voir. Ces routes les guident jusqu'au cœur de la fleur pour boire le nectar. Donc quand une abeille vole vers une fleur, elle voit une carte spéciale que personne d'autre ne voit. Magique !</p>`,
    why:"Elles se repèrent grâce au soleil, comme avec une boussole dans la tête." },
  { cat:"Animaux", titre:"La girafe et ses 7 os",
    corps:`<p>La girafe a un cou gigantesque qui peut mesurer presque deux mètres ! On pourrait penser qu'il a plein d'os dedans, mais non. La girafe a le <strong>même nombre d'os</strong> dans le cou que toi : juste sept os ! Comment c'est possible ?</p>
    <p>Et bien, chaque os de la girafe est énorme, énorme, énorme. Ils sont juste beaucoup plus grands que les tiens. C'est pour ça qu'elle peut lever la tête si haut pour manger les feuilles tout en haut des arbres. Même si nous n'avons pas le même cou du tout, au dedans on est un peu pareils !</p>`,
    why:"Elle dort très peu, parfois moins de 2 heures par nuit, souvent debout." },
  { cat:"Animaux", titre:"La bestiole indestructible",
    corps:`<p>Il existe un petit animal qui paraît faible, mais qui est en réalité <strong>presque indestructible</strong>. C'est le tardigrade, aussi appelé l'ours d'eau. Il est si minuscule qu'on ne peut pas le voir sans microscope !</p>
    <p>Le tardigrade peut survivre au froid extrême qui gèle tout, à la chaleur torride qui brûle tout, et même dans l'espace sans air ! Il peut vivre sans eau pendant des années, puis revenir à la vie quand il trouve de l'eau. Aucun autre petit animal ne peut faire ça. C'est le champion invisible de la survie !</p>`,
    why:"On peut le sécher pendant des années : ajoute une goutte d'eau, et il se réveille." },

  // ---------- ESPACE ----------
  { cat:"Espace", titre:"Le Soleil est une étoile",
    corps:`<p>Notre Soleil est une <strong>étoile</strong>, exactement comme celles qu'on voit briller la nuit dans le ciel. C'est simple : une étoile, c'est juste une grosse boule très très chaude qui brûle et qui fait de la lumière.</p>
<p>Pourquoi le Soleil semble si différent des autres étoiles ? Parce qu'il est <strong>beaucoup plus proche</strong> de nous ! Les autres étoiles sont tellement loin, tellement loin loin qu'elles n'apparaissent que comme des petits points lumineux. Mais le Soleil ? Il est notre voisin cosmique !</p>`,
    why:"Il est si gros qu'on pourrait y ranger plus d'un million de planètes Terre." },
  { cat:"Espace", titre:"L'étoile filante n'en est pas une",
    corps:`<p>Quand tu vois une « étoile filante » qui traverse le ciel très vite, tu pourrais croire que c'est une étoile qui part en voyage. Mais en vrai, c'est un petit caillou — on l'appelle une <strong>météorite</strong> — qui voyage depuis l'espace.</p>
<p>Ce minuscule caillou rentre dans l'air autour de la Terre et, à cause du frottement, il <strong>brûle</strong> en descendant ! C'est comme un petit feu qui dure quelques secondes. Voilà pourquoi ça scintille et pourquoi ça disparaît super vite. Magique, non ?</p>`,
    why:"Fais un vœu quand même — mais c'est surtout un grain de poussière qui fait un mini feu d'artifice !" },
  { cat:"Espace", titre:"Mars, la planète rouillée",
    corps:`<p>La planète Mars est toute rouge, toute rouge, comme une vieille pièce de Monopoly rouille ! C'est parce que son sol contient beaucoup de fer <strong>rouillé</strong>. Tu sais, c'est pareil que quand tu laisses un vieux clou ou un vélo sous la pluie pendant des années.</p>
<p>Sur Mars, la rouille recouvre tout : la terre, les rochers, même le ciel a une teinte rougeâtre. C'est pour ça qu'on l'appelle la « Planète rouge » depuis très longtemps. Les anciens la regardaient du ciel et voyaient sa couleur bizarre. Maintenant, avec les rovers, on peut voir que c'est vraiment rouille partout !</p>`,
    why:"En ce moment, des petits robots s'y promènent pour l'explorer à notre place." },
  { cat:"Espace", titre:"Saturne pourrait flotter",
    corps:`<p>Saturne est une planète énorme, énorme, vraiment géante dans l'espace. Mais voici quelque chose de très bizarre : elle est <strong>très légère</strong> pour sa taille !</p>
<p>Si on imaginait une baignoire géante, assez grande pour Saturne, et si on la remplissait d'eau, devinez quoi ? Saturne <strong>flotterait</strong> sur l'eau comme un ballon de plage ! C'est parce que Saturne est faite surtout de gaz, pas de roche solide. Beaucoup moins lourd que tu ne l'imagines pour un truc aussi énorme !</p>`,
    why:"Ses magnifiques anneaux sont faits de milliards de morceaux de glace." },
  { cat:"Espace", titre:"On peut écouter l'espace",
    corps:`<p>L'espace, c'est silencieux, silencieux, complètement silencieux. Aucun son du tout ! Mais les scientifiques sont malins : ils ont créé des instruments qui captent des <strong>ondes invisibles</strong> qui viennent de l'espace.</p>
<p>Ces instruments transforment ces ondes en sons qu'on peut écouter — des bruits rigolos, des bips, des crépitements bizarres. C'est comme si on traduisait le langage secret de l'univers en musique ! Grâce à ça, on apprend plein de choses sur les trous noirs, les étoiles qui naissent, et d'autres merveilles.</p>`,
    why:"Chaque planète a un peu sa « chanson » quand on écoute ses ondes." },

  // ---------- LE CORPS ----------
  { cat:"Le corps", titre:"Ton cœur ne s'arrête jamais",
    corps:`<p>Ton cœur bat environ <strong>100 000 fois par jour</strong>, sans jamais faire de pause pour se reposer ! C'est ton muscle le plus courageux. Il travaille pendant que tu joues, que tu études et que tu dors.</p>
<p>À chaque battement, il envoie du sang partout dans ton corps. Sans lui, tu ne pourrais pas vivre. Mets ta main sur ta poitrine et tu le sentiras travailler pour toi !</p>`,
    why:"C'est un muscle qui pompe le sang dans tout ton corps, le jour comme la nuit." },
  { cat:"Le corps", titre:"Tu perds ta peau tout le temps",
    corps:`<p>Ta peau se renouvelle sans arrêt. Tu perds des millions de minuscules cellules chaque jour, et une peau neuve pousse en dessous. C'est comme si tu changeais de vêtement, sauf que c'est vraiment ta peau !</p>
<p>En un mois, tu perds assez de peau pour faire une fine poussière. C'est pour ça qu'il faut se laver : on enlève les vieilles cellules mortes.</p>`,
    why:"Une bonne partie de la poussière de la maison, c'est de la vieille peau ! Un peu dégoûtant, non ?" },
  { cat:"Le corps", titre:"Le ventre qui gargouille",
    corps:`<p>Quand ton ventre fait du bruit, c'est de l'air et du jus qui se promènent dans tes intestins. Ça arrive même sans avoir faim. Les intestins travaillent pour digérer ce que tu manges.</p>
<p>Les gargouillements sont tout à fait normaux. Ton ventre parle un drôle de langage ! C'est amusant d'écouter les bruits que fait notre corps quand il travaille.</p>`,
    why:"Ce petit concert porte un nom rigolo : les « borborygmes » ! Essaie de le dire vite." },
  { cat:"Le corps", titre:"Plus grand le matin",
    corps:`<p>En dormant allongé, ton dos se détend : tu es quelques millimètres <strong>plus grand</strong> au réveil qu'au coucher ! La journée, la gravité appuie sur ta colonne vertébrale, donc tu rapetisses un petit peu.</p>
<p>C'est pour ça que le matin tu es plus grand que le soir. Si tu te mesures à 7 heures et à 20 heures, tu verras une petite différence. Incroyable !</p>`,
    why:"Dans la journée, ton corps se tasse tout doucement à cause de ton poids." },
  { cat:"Le corps", titre:"Le rire te fait du bien",
    corps:`<p>Rire fait travailler plein de muscles de ton visage et de ton ventre. Ça envoie aussi des messages « je suis heureux » dans ton cerveau. Plus tu ris, plus tu te sens content.</p>
<p>Rire, c'est bon pour la santé ! Ça te rend joyeux, ça te détend et ça fait même baisser le stress. Alors ris fort, ris souvent, c'est un super médicament naturel !</p>`,
    why:"Les enfants rient beaucoup plus souvent dans une journée que les grandes personnes !" },

  // ---------- NATURE ----------
  { cat:"Nature", titre:"Le volcan, cheminée de la Terre",
    corps:`<p>Sous nos pieds, la Terre est brûlante. Un volcan, c'est comme une <strong>cheminée géante</strong> qui laisse sortir la roche fondue super chaude. Cette roche en fusion, on l'appelle la lave.</p>
<p>Quand un volcan entre en éruption, c'est impressionnant ! La lave coule comme une rivière de feu. Heureusement, la plupart des volcans ne s'éveillent que très rarement.</p>`,
    why:"Certaines îles, comme La Réunion, sont nées d'un volcan !" },
  { cat:"Nature", titre:"La foudre plus chaude que le Soleil",
    corps:`<p>Un éclair est si puissant que l'air qu'il traverse devient, un instant, <strong>plus chaud que la surface du Soleil</strong> ! C'est fou, non ? Tout cela en une fraction de seconde.</p>
<p>C'est pour ça que le tonnerre gronde : l'air chaud explose presque. Et c'est aussi pour ça qu'il faut se mettre à l'abri pendant un orage. Le respect pour la nature !</p>`,
    why:"Le tonnerre, c'est le bruit de l'air qui explose sur le passage de l'éclair." },
  { cat:"Nature", titre:"Chaque flocon est unique",
    corps:`<p>Chaque flocon de neige a six branches, et il n'y en a jamais deux exactement pareils au monde. Même les flocons qui naissent au même moment sont tous différents !</p>
<p>C'est comme si chaque flocon était un petit chef-d'œuvre dessiné par la nature. Et si tu en attrapes un sur ta main, il fond vite vite, comme par magie.</p>`,
    why:"Il se forme tout là-haut dans les nuages, en gelant autour d'un grain de poussière." },
  { cat:"Nature", titre:"Le sable, ce sont des mini-cailloux",
    corps:`<p>Le sable des plages, ce sont des roches et des coquillages cassés en tout petits morceaux par la mer. L'océan travaille jour après jour, vague après vague.</p>
<p>Chaque grain de sable que tu touches entre tes orteils à la plage a une histoire ! La mer a passé des années à transformer les roches massives en cette poudre douce et chaude.</p>`,
    why:"Il faut parfois des milliers d'années à la mer pour fabriquer une seule plage !" },
  { cat:"Nature", titre:"Les plantes mangent la lumière",
    corps:`<p>Les plantes fabriquent leur nourriture avec la lumière du soleil, l'eau et l'air. C'est un processus magique qu'on appelle la <strong>photosynthèse</strong>.</p>
<p>C'est comme si les plantes avaient des petits cuisiniers à l'intérieur qui transforment la lumière en nourriture délicieuse. Sans cela, les plantes ne pourraient pas pousser et devenir grandes et fortes !</p>`,
    why:"En même temps, elles fabriquent l'oxygène qu'on respire. Merci les plantes !" },

  // ---------- SCIENCES RIGOLOTES ----------
  { cat:"Sciences rigolotes", titre:"Pourquoi la glace flotte",
    corps:`<p>Quand l'eau gèle et devient de la glace, quelque chose de magique se passe : elle prend plus de place et devient plus légère que l'eau normale. C'est pour ça que les glaçons <strong>flottent</strong> à la surface de ton verre.</p>
<p>C'est très important pour les poissons ! Sans ça, la glace coulerait au fond et les rivières gèleraient complètement.</p>`,
    why:"Grâce à ça, les poissons peuvent continuer à vivre sous la glace des lacs en hiver." },
  { cat:"Sciences rigolotes", titre:"L'écho qui revient",
    corps:`<p>Quand tu cries face à une montagne ou un grand mur, le son de ta voix voyage très loin et rebondit dessus comme une balle : c'est l'<strong>écho</strong> ! Le son revient vers toi et tu l'entends qui crie avec toi.</p>
<p>Plus c'est loin, plus tu attends longtemps avant d'entendre ton écho revenir. C'est amusant de jouer avec les échos !</p>`,
    why:"Les chauves-souris s'en servent pour « voir » dans le noir avec leurs oreilles." },
  { cat:"Sciences rigolotes", titre:"Les aimants magiques",
    corps:`<p>Deux aimants peuvent se coller très fort l'un à l'autre… ou se repousser, sans même se toucher, comme si une force invisible jouait à les attraper ou les chasser.</p>
<p>Si tu retournes un aimant, il repoussera l'autre aimant. C'est comme si chaque aimant avait deux pôles : un qui attire et un qui repousse.</p>`,
    why:"La Terre est un immense aimant : c'est pour ça que l'aiguille de la boussole trouve le nord." },
  { cat:"Sciences rigolotes", titre:"Les bulles sont toujours rondes",
    corps:`<p>Une bulle de savon est toujours une <strong>boule</strong>, jamais un carré ou une autre forme bizarre : c'est la forme la plus simple et la plus solide pour enfermer de l'air à l'intérieur.</p>
<p>Si tu essaies de faire une bulle carrée, elle va toute seule redevenir ronde. C'est comme si les bulles n'aimaient que les formes rondes !</p>`,
    why:"La nature adore les formes économiques, celles qui demandent le moins d'effort." },
  { cat:"Sciences rigolotes", titre:"L'eau est bleue en grand",
    corps:`<p>Un verre d'eau est transparent et tu vois clair à travers, mais l'océan énorme est bleu : quand il y a beaucoup, beaucoup d'eau, elle garde et elle montre surtout la couleur bleue.</p>
<p>Plus il y a d'eau, plus ça devient bleu foncé. C'est comme si l'eau mélangeait ses petits bleus pour faire un gros bleu géant !</p>`,
    why:"Plus on descend profond dans la mer, plus il fait sombre : le rouge disparaît en premier." },

  // ---------- ÉMOTIONS ----------
  { cat:"Émotions", titre:"La peur est une alarme",
    corps:`<p>La peur n'est pas ton ennemie : c'est une <strong>alarme</strong> intelligente qui veut te protéger des vrais dangers. Quand tu as peur, c'est ton cerveau qui fait son travail. Il t'envoie un signal pour que tu sois prudent.</p>
<p>Parfois cette alarme se trompe et elle a peur de choses qui ne sont pas dangereuses du tout. Mais elle veut toujours t'aider, même quand elle se trompe.</p>`,
    why:"Respirer lentement dit à ton corps : « le danger est passé, on se calme »." },
  { cat:"Émotions", titre:"La jalousie, ça se parle",
    corps:`<p>Se sentir jaloux, ça arrive à tout le monde, même aux plus grands. Ce n'est pas être méchant ou être un mauvais copain : c'est juste normal. C'est le signe qu'on aimerait avoir quelque chose qu'un autre a, ou qu'on voudrait être ami avec quelqu'un d'autre aussi.</p>
<p>En parler à quelqu'un qu'on aime aide souvent. Et tu verras, bientôt tu te sentiras mieux.</p>`,
    why:"En parler à quelqu'un de confiance fait presque toujours du bien." },
  { cat:"Émotions", titre:"Dire ce qu'on ressent",
    corps:`<p>Dire « je suis triste » ou « je suis très content », c'est comme ouvrir une fenêtre : ça aère l'intérieur de toi et ça te soulage. Quand tu gardes tes sentiments tout seul au fond de toi, c'est plus lourd.</p>
<p>Mais quand tu les dis à quelqu'un, c'est moins difficile à porter. Et souvent, l'autre personne comprend et t'aide.</p>`,
    why:"Et les câlins font fabriquer une vraie « potion du bonheur » dans le cerveau !" },
  { cat:"Émotions", titre:"L'ennui sert à inventer",
    corps:`<p>S'ennuyer n'est pas grave du tout et ce n'est pas bête. C'est souvent quand on s'ennuie qu'on a les <strong>meilleures idées</strong> de jeux, de constructions ou de dessins ! Notre cerveau commence à imaginer des choses.</p>
<p>Alors la prochaine fois que tu t'ennuies, ne sois pas triste. Dis-toi que tu es en train de préparer quelque chose de génial.</p>`,
    why:"Ton cerveau adore inventer quand on lui laisse un peu de vide." },

  // ===== LOT 3 : ENFANTS =====
  // ---------- ANIMAUX ----------
  { cat:"Animaux", titre:"Le crocodile et sa langue collée",
    corps:`<p>Le crocodile a une langue très spéciale : elle est <strong>collée</strong> au fond de sa bouche et il ne peut pas la sortir du tout, même s'il essaie très fort ! C'est totalement différent de ta langue à toi, que tu peux tirer quand tu veux.</p>
    <p>Mais ne pense pas que le crocodile est triste pour ça. Il n'en a pas besoin ! Sa bouche est déjà très utile pour manger, avec plein de dents pointues. Et sa langue collée l'aide en fait à bien avaler sa nourriture. Le crocodile a juste une manière différente de fonctionner, et ça lui convient très bien !</p>`,
    why:"Et ses dents repoussent toute sa vie : il en use jusqu'à 3000 en tout !" },
  { cat:"Animaux", titre:"L'étoile de mer sans cerveau",
    corps:`<p>L'étoile de mer est un animal très bizarre. Elle n'a pas de cerveau, pas de cœur, et pas de sang ! Comment elle fait pour vivre sans tout ça ? C'est le grand mystère !</p>
    <p>Eh bien, l'étoile de mer se déplace grâce à de l'eau de mer qui circule dans des tiny petits tubes à l'intérieur de son corps. Cette eau la pousse doucement ici et là. Elle n'a pas besoin de cerveau pour chercher à manger parce que sa bouche est au milieu de son ventre, et elle peut manger les choses autour d'elle. C'est un animal très, très différent de nous !</p>`,
    why:"Si elle perd un bras, il repousse — et parfois le bras coupé fabrique une nouvelle étoile !" },
  { cat:"Animaux", titre:"Le kangourou ne recule pas",
    corps:`<p>Le kangourou est un animal qui saute vraiment très loin et très haut, mais il a un gros problème : il ne peut pas marcher en <strong>arrière</strong> ! Pourquoi ? Parce que ses pattes arrière sont énormes et puissantes, et sa grosse queue l'aide à garder l'équilibre en avant.</p>
    <p>Si le kangourou essayait de reculer, il tomberait ou se ferait mal. C'est pour ça que dans les monnaies australiennes, on voit des kangarous qui sautent toujours en avant, jamais en arrière. La nature a fait le kangourou pour aller vite en avant, pas pour reculer. C'est son point faible amusant !</p>`,
    why:"Il se sert de sa queue comme d'une troisième patte pour tenir en équilibre." },
  { cat:"Animaux", titre:"L'escargot aux milliers de dents",
    corps:`<p>L'escargot a une petite langue très spéciale qu'on appelle la « radula ». Cette langue n'est pas douce comme la tienne : elle est <strong>couverte de milliers de minuscules dents</strong> ! C'est comme une lime ou un outil râpeux.</p>
    <p>Avec cette drôle de langue râpeuse, l'escargot grignote les feuilles, l'écorce et les plantes. Les dents minuscules frottent et râpent la nourriture, comme si tu grattais du fromage avec une râpe à fromage. C'est un talent très utile quand on n'a pas de vraies dents comme les tiens ! Chaque escargot utilise sa radula tous les jours pour se nourrir.</p>`,
    why:"Il avance en glissant sur sa bave, qui l'empêche de se blesser sur le sol." },
  { cat:"Animaux", titre:"Le chat qui ronronne",
    corps:`<p>Quand un chat ronronne, c'est adorable ! Mais il fait beaucoup plus que juste faire du bruit. Le ronronnement est un moteur à <strong>petites vibrations</strong> qui aide le chat à se sentir bien et heureux.</p>
    <p>Les scientifiques ont découvert quelque chose de magique : ces vibrations aident le chat à guérir plus vite quand il est blessé ! C'est comme une machine de massage invisible dans son corps. En plus, quand tu caresses un chat et qu'il ronronne, les vibrations te font aussi du bien. Vous êtes heureux ensemble. C'est un beau cadeau que les chats nous font !</p>`,
    why:"Un chat dort environ 15 heures par jour : presque toute la journée !" },
  { cat:"Animaux", titre:"La grenouille boit par la peau",
    corps:`<p>La grenouille ne boit pas avec sa bouche comme toi. Elle ne met jamais d'eau dans sa bouche pour boire ! À la place, elle absorbe l'eau directement <strong>par sa peau</strong>, comme si sa peau était une paille magique.</p>
    <p>La peau de la grenouille est fine et mouillée, ce qui permet à l'eau de passer à travers. C'est pour ça que les grenouilles vivent près de l'eau ou dans des endroits très humides. Elles ont aussi besoin de garder leur peau bien mouillée, sinon l'eau s'évapore et elle ne peut plus boire. Incroyable, non ? Une peau qui boit !</p>`,
    why:"Elle peut aussi respirer un peu par la peau, en plus de ses poumons." },

  // ---------- ESPACE ----------
  { cat:"Espace", titre:"Il pleut des diamants",
    corps:`<p>Sur les planètes Neptune et Uranus, il se passe quelque chose d'incroyable. Les scientifiques pensent qu'il ne pleut pas de l'eau comme chez nous — il pleut des minuscules <strong>diamants</strong> !</p>
<p>Imagine un peu : des diamants qui tombent du ciel ! Pourquoi ? Parce que ces planètes sont faites de gaz où vivent du carbone. Quand ce carbone descend très profond, avec la chaleur et la pression énorme, il se transforme en diamant. C'est comme si la nature avait créé une fabrique de bijoux géante là-bas !</p>`,
    why:"C'est l'énorme pression qui transforme le carbone en diamant, comme une machine géante." },
  { cat:"Espace", titre:"Sauter comme un super-héros",
    corps:`<p>Sur la Lune, quelque chose de fantastique t'attend : tu pèses 6 fois moins que sur la Terre ! C'est comme si tu avais des pouvoirs de super-héros.</p>
<p>Tu pourrais sauter <strong>très très haut</strong>, bien plus haut que tu n'imagine ! Tes jambes te propulseraient vers le ciel lunaire. Les astronautes qui sont allés là-bas ont adoré ça — ils faisaient des bonds énormes en sautant comme des kangourous. C'est parce que la Lune est plus petite et moins lourde que la Terre, donc sa force d'attraction est plus faible.</p>`,
    why:"C'est parce que la Lune est plus petite et t'attire moins fort que la Terre." },
  { cat:"Espace", titre:"Le Soleil que tu vois est en retard",
    corps:`<p>Quand tu regardes le Soleil (attention : jamais directement dans les yeux, c'est dangereux !), tu vois la lumière qui a voyagé depuis le Soleil jusqu'à toi. Mais cette lumière met du temps pour faire ce voyage.</p>
<p>Elle met environ <strong>8 minutes</strong> ! Cela veut dire que le Soleil que tu vois en ce moment, c'est le Soleil d'il y a 8 minutes. Si le Soleil explosait maintenant, tu continuerais à le voir pendant 8 minutes encore ! C'est fou quand on y pense.</p>`,
    why:"Donc tu vois toujours le Soleil tel qu'il était il y a 8 minutes !" },
  { cat:"Espace", titre:"Plus d'étoiles que de sable",
    corps:`<p>Dans le ciel, il y a tellement, tellement, <strong>tellement</strong> d'étoiles qu'on ne peut même pas les compter. Vraiment trop pour ça ! Les astronomes ont essayé de les estimer avec des gros télescopes.</p>
<p>Et voici leur découverte incroyable : il y a <strong>plus d'étoiles</strong> dans tout le ciel que de grains de sable sur toutes les plages de la Terre réunies ! Imagine : tu prends chaque plage du monde, tu les ajoutes toutes ensemble... et il y a quand même plus d'étoiles ! C'est impressionnant, non ?</p>`,
    why:"Et notre Soleil n'est qu'une toute petite étoile parmi toutes celles-là." },
  { cat:"Espace", titre:"Jupiter, la planète géante",
    corps:`<p>Jupiter est la plus grande planète de notre système solaire. Elle est vraiment énorme, monumentale, gigantesque ! C'est la reine des planètes.</p>
<p>Si tu veux vraiment comprendre sa taille : on pourrait ranger <strong>toutes les autres planètes</strong> — Mercure, Vénus, la Terre, Mars, Saturne, Uranus et Neptune — à l'intérieur de Jupiter ! Il y aurait encore de la place pour jouer au ballon. Jupiter est faite surtout de gaz, avec une grosse tache rouge célèbre qui est une tempête gigantesque.</p>`,
    why:"Elle a une tempête plus grande que la Terre entière, qui dure depuis des centaines d'années." },
  { cat:"Espace", titre:"Pourquoi la Lune change de forme",
    corps:`<p>La Lune semble changer de forme au cours du mois — parfois c'est un croissant fin, parfois une demi-lune, parfois une belle boule complète. On appelle ça les <strong>phases de la Lune</strong>.</p>
<p>Mais attention : la Lune ne change pas vraiment ! Elle reste ronde tout le temps. C'est juste la façon dont le Soleil l'éclaire qui change. Quand la Lune est entre la Terre et le Soleil, on voit son côté sombre — c'est la nouvelle lune. Quand elle est de l'autre côté, on voit toute sa face illuminée — c'est la pleine lune. Cool, non ?</p>`,
    why:"Elle ne change pas vraiment : c'est juste la partie éclairée qu'on voit qui change." },

  // ---------- LE CORPS ----------
  { cat:"Le corps", titre:"Tes empreintes sont uniques",
    corps:`<p>Personne au monde n'a les mêmes <strong>empreintes de doigts</strong> que toi — pas même de vrais jumeaux ! Sur le bout de chaque doigt, il y a des petites lignes qui forment un dessin. C'est comme ta signature personnelle.</p>
<p>Les policiers utilisent les empreintes pour identifier les gens. Tes empreintes sont déjà gravées depuis avant ta naissance. Elles te rendent unique dans l'univers !</p>`,
    why:"Elles se forment avant ta naissance et ne changent jamais de toute ta vie." },
  { cat:"Le corps", titre:"Tu clignes sans même y penser",
    corps:`<p>Tu clignes des yeux environ 15 à 20 fois par minute, sans t'en rendre compte ! C'est un automatisme : ton corps le fait tout seul, comme respirer.</p>
<p>Cligner protège tes yeux : ça nettoie la surface et ça garde l'humidité. Maintenant que tu sais que tu clignes, tu vas y penser, et c'est bizarre ! Mais généralement, tes yeux clignent sans que tu doives donner d'ordre.</p>`,
    why:"Ça nettoie et humidifie tes yeux, comme de petits essuie-glaces." },
  { cat:"Le corps", titre:"L'acide magique de l'estomac",
    corps:`<p>Ton estomac contient un acide si puissant qu'il peut digérer du métal ! Mais ton estomac est super malin : il fabrique une nouvelle paroi tous les quelques jours pour ne pas se digérer lui-même.</p>
<p>Cet acide magique dissout tout ce que tu manges. C'est comme un petit laboratoire chimique dans ton ventre. Heureusement, ton estomac a des protections spéciales qui le défendent !</p>`,
    why:"C'est cet acide qui découpe la nourriture en tout petits morceaux." },
  { cat:"Le corps", titre:"Des milliards d'amies dans ton ventre",
    corps:`<p>Dans ton ventre vivent des milliards de minuscules <strong>bactéries gentilles</strong> qui t'aident à digérer. Ce ne sont pas les ennemies des vilains virus : ce sont tes copines ! Elles vivent en harmonie dans tes intestins.</p>
<p>Ces bactéries travaillent pour toi : elles cassent la nourriture en petits morceaux et absorbent les bons nutriments. Sans elles, tu ne pourrais pas te nourrir correctement. Elles te rendent un super service !</p>`,
    why:"Manger des fruits et des légumes, c'est leur donner à manger à elles aussi !" },
  { cat:"Le corps", titre:"Le goût passe par le nez",
    corps:`<p>Ta langue reconnaît le sucré, le salé, l'acide et l'amer. Mais c'est surtout ton <strong>nez</strong> qui te fait sentir le vrai goût. Regarde : quand tu as un rhume et le nez bouché, tout goûte pareil !</p>
<p>La langue et le nez travaillent ensemble pour créer le goût. C'est pour ça que les aliments épicés ou parfumés sentent autant qu'ils ne goûtent. Le nez est super important pour savourer ton repas !</p>`,
    why:"Bouche-toi le nez en mangeant un bonbon : il a beaucoup moins de goût !" },
  { cat:"Le corps", titre:"Le cerveau ne sent pas la douleur",
    corps:`<p>Ton cerveau commande tout ton corps et dirige ta pensée. Mais chose étrange : lui-même ne ressent aucune douleur ! On pourrait le toucher sans qu'il fasse mal.</p>
<p>C'est pour ça que les médecins peuvent opérer le cerveau sans faire souffrir le patient. Malgré ce pouvoir énorme, ton cerveau est très fragile et il faut le protéger en mettant un casque quand tu fais du sport !</p>`,
    why:"Il reçoit les messages de « bobo » des autres parties du corps, mais pas pour lui." },

  // ---------- NATURE ----------
  { cat:"Nature", titre:"L'océan fabrique l'air",
    corps:`<p>La plupart de l'oxygène qu'on respire vient de <strong>minuscules plantes de l'océan</strong>, pas seulement des arbres ! Ces petites créatures invisibles travaillent sans relâche pour nous.</p>
<p>Elles s'appellent le phytoplancton et elles sont partout dans l'eau. Chaque fois que tu respires, remercie discrètement ces petits superhéros marins !</p>`,
    why:"On dit parfois que l'océan est le plus grand poumon de la planète." },
  { cat:"Nature", titre:"L'eau voyage en rond",
    corps:`<p>L'eau de ta douche a peut-être déjà été un nuage, une rivière… ou bue par un dinosaure ! Elle voyage en rond, pour toujours, et c'est merveilleux.</p>
<p>L'eau s'évapore, devient nuage, tombe en pluie, coule dans les rivières, puis retour à la mer. C'est un grand voyage sans fin. La même eau depuis des millions d'années !</p>`,
    why:"C'est le cycle de l'eau : elle s'évapore, forme des nuages, retombe en pluie, sans fin." },
  { cat:"Nature", titre:"Le désert gèle la nuit",
    corps:`<p>Dans certains déserts brûlants le jour, il peut faire <strong>très froid la nuit</strong>, parfois bien en dessous de zéro ! C'est incroyable comme changement.</p>
<p>Pendant le jour, le soleil tape très fort et tout devient brûlant. Mais la nuit, sans soleil, la chaleur s'échappe dans l'espace et il gèle ! Les animaux du désert sont vraiment des champions pour survivre.</p>`,
    why:"Sans nuages pour garder la chaleur, elle s'échappe très vite une fois le soleil couché." },
  { cat:"Nature", titre:"La montagne cachée sous la mer",
    corps:`<p>La plus haute montagne du monde, mesurée depuis sa base, est en réalité cachée sous l'océan, à Hawaï ! Elle s'appelle Mauna Kea et elle dépasse même le Mont Everest.</p>
<p>Mais on ne la voit pas parce qu'elle est presque entièrement sous l'eau. C'est comme un trésor caché au fond de la mer, une montagne secrète que peu de gens connaissent !</p>`,
    why:"On ne voit que son sommet qui dépasse un peu de l'eau." },
  { cat:"Nature", titre:"D'où vient le vent",
    corps:`<p>Le vent, c'est simplement de l'<strong>air qui se déplace</strong> d'un endroit à un autre. Quand l'air chaud remonte et que l'air froid descend, ça crée du vent !</p>
<p>Le soleil chauffe la Terre inégalement, et c'est ce qui met l'air en mouvement. Le vent peut être très doux comme une caresse, ou très puissant comme un souffle de dragon !</p>`,
    why:"L'air chaud monte, l'air froid vient prendre sa place : et hop, ça fait du vent !" },
  { cat:"Nature", titre:"Les racines aussi grandes que l'arbre",
    corps:`<p>Sous la terre, les racines d'un arbre peuvent être presque aussi grandes que l'arbre au-dessus ! Elles s'enfoncent profondément pour chercher l'eau et accrocher l'arbre au sol.</p>
<p>C'est un système équilibré : plus l'arbre pousse haut, plus ses racines s'enfoncent bas. Les racines sont comme les jambes invisibles de l'arbre, qui le tiennent bien droit !</p>`,
    why:"Elles cherchent l'eau et tiennent l'arbre bien accroché, même dans les tempêtes." },

  // ---------- SCIENCES RIGOLOTES ----------
  { cat:"Sciences rigolotes", titre:"Le nuage devant ta bouche",
    corps:`<p>Quand il fait très froid dehors, ton souffle chaud se transforme en petit <strong>nuage de vapeur blanche</strong> en sortant de ta bouche. C'est cool, non ? Ton souffle se voit comme un vrai mini-nuage !</p>
<p>Tu peux faire plein de petits nuages avec ta bouche. Plus il fait froid, plus les nuages sont visibles et épais.</p>`,
    why:"C'est exactement ce qui forme les nuages dans le ciel, en beaucoup plus petit." },
  { cat:"Sciences rigolotes", titre:"Le sel qui fait fondre la glace",
    corps:`<p>On met du sel sur les routes gelées en hiver parce que le sel aide la glace à <strong>fondre</strong> beaucoup plus vite. C'est magique : le sel cassé sur la glace la transforme en eau qui s'écoule.</p>
<p>Les voitures glissent moins sur les routes salées. C'est pour ça que tu vois du sel blanc sur les routes l'hiver !</p>`,
    why:"Le sel empêche l'eau de rester bien gelée. Maligne, cette astuce !" },
  { cat:"Sciences rigolotes", titre:"Pourquoi un bateau flotte",
    corps:`<p>Un gros bateau en métal flotte sur l'eau, alors qu'un petit caillou lourd coule tout de suite. Ce qui compte vraiment, ce n'est pas juste le poids : c'est la forme et l'air à l'intérieur du bateau !</p>
<p>Un bateau est creux et plein d'air, alors il pèse moins lourd. C'est pour ça qu'il peut rester sur l'eau au lieu de couler.</p>`,
    why:"Un bateau est plein d'air : ça l'aide à rester à la surface de l'eau." },
  { cat:"Sciences rigolotes", titre:"Fabriquer toutes les couleurs",
    corps:`<p>Avec seulement trois couleurs de peinture – du rouge, du bleu et du jaune – on peut fabriquer presque <strong>toutes</strong> les autres couleurs du monde ! Tu peux en faire du vert, de l'orange, du violet et beaucoup d'autres.</p>
<p>Il suffit de mélanger ces trois couleurs en différentes quantités. C'est comme jouer avec des potions magiques de couleurs !</p>`,
    why:"Bleu + jaune = vert, rouge + bleu = violet. Essaie avec de la peinture !" },
  { cat:"Sciences rigolotes", titre:"Ton ombre, de la lumière bloquée",
    corps:`<p>Ton ombre apparaît quand ton corps se met en travers et empêche la lumière du soleil de passer. C'est comme si ton corps stoppait les rayons du soleil !</p>
<p>Plus le soleil est haut dans le ciel, plus ton ombre est courte. Plus le soleil est bas, plus ton ombre est longue et bizarre.</p>`,
    why:"Le matin et le soir, ton ombre est très longue parce que le soleil est tout bas." },
  { cat:"Sciences rigolotes", titre:"L'éclair avant le tonnerre",
    corps:`<p>Pendant l'orage, tu vois d'abord l'éclair très vite, puis un peu après tu entends le tonnerre qui gronde très fort. L'éclair est la lumière, le tonnerre est le bruit.</p>
<p>La lumière voyage beaucoup plus vite que le bruit. Plus l'orage est loin, plus tu attends longtemps entre l'éclair et le tonnerre !</p>`,
    why:"La lumière va plus vite que le son : compte les secondes pour savoir si l'orage est loin !" },

  // ---------- ÉMOTIONS ----------
  { cat:"Émotions", titre:"Respirer comme un ballon",
    corps:`<p>Quand tout va trop vite dans ta tête et que tu te sens stressé, gonfle ton ventre comme un <strong>ballon</strong> en respirant l'air par le nez, puis dégonfle tout doucement par la bouche. C'est magique ! Ton cerveau se calme tout de suite.</p>
<p>Tu peux faire ça n'importe où, n'importe quand : avant un contrôle, avant de parler devant la classe, ou quand tu as un peu peur.</p>`,
    why:"Ça envoie un message « on se calme » à tout ton corps. Essaie trois fois de suite." },
  { cat:"Émotions", titre:"Les émotions, c'est comme la météo",
    corps:`<p>Joie, colère, tristesse, peur, gêne : toutes les émotions sont normales et utiles, même celles qu'on n'aime pas trop. C'est comme la météo : il y a des jours ensoleillés et des jours de pluie, et c'est normal.</p>
<p>Tes émotions te racontent des choses importantes sur ce que tu aimes et sur ce que tu ressens. Écoute-les, même les moches.</p>`,
    why:"Elles sont comme la météo : elles arrivent, puis elles finissent toujours par repartir." },
  { cat:"Émotions", titre:"Le courage, c'est y aller quand même",
    corps:`<p>Être courageux ne veut pas du tout dire ne pas avoir peur. Les vrais courageux ont peur, mais ils essaient quand même ! C'est ça qui rend quelqu'un vraiment brave.</p>
<p>Que ce soit pour parler en classe, essayer un nouveau sport, ou consoler un ami triste, le courage c'est faire la chose même quand ça te fait un peu peur.</p>`,
    why:"Tout le monde a peur parfois, même les héros de tes histoires préférées." },
  { cat:"Émotions", titre:"Aider rend heureux",
    corps:`<p>Rendre service ou consoler un copain qui est triste, ça fabrique de la bonne humeur… dans TON cerveau aussi ! C'est incroyable mais c'est vrai. Quand tu aides quelqu'un, tu te sens bien dans ton cœur.</p>
<p>Donner un coup de main, c'est un cadeau pour l'autre, mais c'est aussi un cadeau pour toi.</p>`,
    why:"La gentillesse, c'est un cadeau qu'on se fait un peu à soi-même en même temps." },
  { cat:"Émotions", titre:"Se tromper, c'est apprendre",
    corps:`<p>Chaque erreur t'apprend quelque chose d'important. Un mauvais calcul en maths te montre comment mieux compter. Un jeu où tu as perdu te montre comment faire mieux la prochaine fois.</p>
<p>Les gens qui réussissent le mieux se sont trompés plein plein de fois avant ! L'erreur n'est pas l'ennemie, c'est ta meilleure copine pour apprendre.</p>`,
    why:"Le cerveau apprend surtout de ses erreurs, pas des choses faciles réussies du premier coup." },
  { cat:"Émotions", titre:"Attendre avant d'agir fâché",
    corps:`<p>Quand tu es très fâché, une super astuce c'est d'attendre un petit peu avant de parler ou d'agir. Laisse la vague de colère passer, puis décide.</p>
<p>Parfois on dit des choses qu'on regrette si on agit trop vite. Mais si tu attends un peu, tu trouveras les bons mots.</p>`,
    why:"La grosse vague de colère redescend, et ensuite on prend de bien meilleures décisions." },

  // ===== LOT 4 : ENFANTS =====
  { cat:"Animaux", titre:"L'hippopotame transpire rose",
    corps:`<p>L'hippopotame a un super-pouvoir secret : il fabrique une drôle de sueur rouge-rose ! Cette sueur n'est pas normale, c'est une couche spéciale qui protège sa peau épaisse du soleil très chaud d'Afrique.</p>
    <p>C'est un peu comme une <strong>crème solaire naturelle</strong> et magique ! Cette sueur rougeâtre aussi aide l'hippopotame à rester cool quand il fait chaud. Quand tu vois un hippopotame avec la peau rouge-rose, ce n'est pas une maladie, c'est juste sa protection naturelle. C'est sa façon à lui de dire : « Je suis heureux et protégé ! » Elle est très jolie aussi !</p>`,
    why:"Malgré son air tranquille, c'est l'un des animaux les plus costauds d'Afrique." },
  { cat:"Animaux", titre:"Le hibou tourne la tête très loin",
    corps:`<p>Le hibou peut faire quelque chose de vraiment spécial avec sa tête : il peut la tourner presque complètement pour regarder derrière lui, et il peut le faire <strong>sans bouger le corps</strong> du tout ! Sa tête tourne comme sur un tourniquet magique.</p>
    <p>C'est très utile quand le hibou chasse. Ses yeux vers l'avant sont excellents pour voir, mais il peut aussi tourner sa tête pour regarder partout autour sans bouger ses ailes. Il voit les souris qui courent et il peut les attraper sans se déplacer. Les hiboux ont les cous les plus flexibles de tous les oiseaux, c'est impressionnant !</p>`,
    why:"Ses yeux sont si gros qu'ils ne peuvent pas bouger : alors c'est toute la tête qui tourne." },
  { cat:"Espace", titre:"La Terre tourne très vite",
    corps:`<p>En ce moment même, pendant que tu lis cette phrase, la Terre est en train de tourner sur elle-même. Et toi, tu tournes avec elle ! C'est comme être assis sur une énorme toupie.</p>
<p>Tu te demandes peut-être : pourquoi je ne le sens pas ? Pourquoi je n'étourdie pas ? C'est parce que tu tournes à une vitesse régulière et lisse — tu n'accélères ni ne ralentis soudainement. Ton corps s'est habitué à cette vitesse depuis ta naissance. La Terre tourne à toute vitesse, mais tu voyages avec elle depuis toujours, alors tu ne remarques rien !</p>`,
    why:"C'est cette rotation qui fabrique le jour et la nuit." },
  { cat:"Espace", titre:"Les combinaisons blanches",
    corps:`<p>Quand tu vois un astronaute dans l'espace, sa combinaison est toujours blanche. Tu te demandes peut-être : pourquoi pas rouge ou bleu ou vert ? Eh bien, c'est pour une bonne raison scientifique !</p>
<p>Le blanc <strong>renvoie</strong> la lumière du Soleil, un peu comme un miroir. Grâce à ça, le Soleil ne rend pas la combinaison trop chaude. Si elle était noire, elle absorberait la chaleur et l'astronaute aurait beaucoup trop chaud. C'est un détail simple mais très important pour rester à la bonne température dans l'espace !</p>`,
    why:"Dans l'espace, au soleil il fait une chaleur énorme, et à l'ombre un froid glacial." },
  { cat:"Le corps", titre:"Pourquoi tu éternues",
    corps:`<p>Un éternuement, c'est ton nez qui expulse très fort ce qui le chatouille : poussière, poivre, pollen ! C'est une réaction de défense super utile. Ton corps dit « dehors, intrus ! » très bruyamment.</p>
<p>Quand tu éternues, l'air sort à 100 kilomètres à l'heure ! C'est pour ça qu'on te dit de mettre ta main ou ton coude devant ta bouche. Éternuer, c'est ton corps qui prend soin de lui-même.</p>`,
    why:"L'air d'un éternuement sort plus vite qu'une voiture sur l'autoroute !" },
  { cat:"Le corps", titre:"Tes muscles pour sourire",
    corps:`<p>Il faut plein de petits muscles qui travaillent ensemble pour faire un grand <strong>sourire</strong> ! Ces muscles s'appellent les muscles faciaux. Ils sont très fins et très nombreux autour de ta bouche.</p>
<p>Un sourire simple demande environ 10 muscles. Un grand sourire en demande plus ! C'est comme un petit spectacle dans ta face. Plus tu souris, plus ces muscles deviennent forts. Alors, souris souvent !</p>`,
    why:"Sourire, même quand ça ne va pas trop fort, aide un peu ton cerveau à se sentir mieux." },
  { cat:"Nature", titre:"Les nuages sont lourds",
    corps:`<p>Un gros nuage blanc peut peser aussi lourd qu'une <strong>centaine d'éléphants</strong> — et pourtant il flotte dans le ciel ! C'est magique qu'il ne tombe pas sur nos têtes.</p>
<p>Le secret ? L'air chaud le soutient comme une main invisible. Et quand il y a trop d'eau dans le nuage, ça devient trop lourd et la pluie tombe. C'est comme un équilibre délicat !</p>`,
    why:"L'eau y est en toutes petites gouttes légères qui restent en l'air." },
  { cat:"Nature", titre:"L'abeille et la fleur, une équipe",
    corps:`<p>En cherchant à manger du pollen, l'abeille le transporte d'une fleur à l'autre sans le vouloir. Elle aide les plantes à faire des <strong>fruits</strong> et des graines !</p>
<p>C'est un super partenariat : l'abeille trouve du miel et la fleur se reproduit. Sans les abeilles, nous n'aurions pas de beaucoup de fruits et légumes. Merci les abeilles !</p>`,
    why:"Sans les abeilles, on aurait beaucoup moins de fruits à manger." },
  { cat:"Sciences rigolotes", titre:"Le savon chasse le gras",
    corps:`<p>Le savon est très doué pour chasser le gras et la saleté de tes mains. Il les aide à se détacher de ta peau pour qu'ils partent avec l'eau du robinet.</p>

/* ============================================================
   2) MÉMOIRE (localStorage) : goûts, vus, favoris — par mode
   ============================================================ */
const load = (k, def) => { try { return JSON.parse(localStorage.getItem(k)) ?? def; } catch { return def; } };
const save = (k, v) => localStorage.setItem(k, JSON.stringify(v));

// Profils : 'parent' (adulte), 'charlie' et 'emilie' (les filles). Chacun a SA propre mémoire.
const MODES = ['vincent', 'cecile', 'charlie', 'emilie'];
const ADULTES = ['vincent', 'cecile']; // partagent la bibliothèque adulte
const KIDS = ['charlie', 'emilie'];    // partagent la bibliothèque enfants
const isKid = () => KIDS.includes(MODE);

let MODE = load('pdj_mode', 'vincent');
if (!MODES.includes(MODE)) MODE = 'vincent';

let KEY;
function refreshKeys() {
  KEY = {
    weights:  'pdj_' + MODE + '_weights',
    seen:     'pdj_' + MODE + '_seen',
    favs:     'pdj_' + MODE + '_favs',
    dislikes: 'pdj_' + MODE + '_dislikes',
  };
}
refreshKeys();

// Bibliothèque active selon le profil (les 2 filles partagent la même)
function lib() { return isKid() ? ENFANTS : PENSEES; }
function det() { return isKid() ? DETAILS_ENFANT : DETAILS; }

function addSeen(titres) {
  const cap = Math.max(3, Math.floor(lib().length * 0.5)); // on évite de revoir la moitié du pool
  let seen = load(KEY.seen, []);
  seen = [...titres, ...seen.filter(t => !titres.includes(t))].slice(0, cap);
  save(KEY.seen, seen);
}

/* ============================================================
   3) CHOISIR LE CONTENU SUIVANT, pondéré par les goûts
   ============================================================ */
function pickNext() {
  const weights = load(KEY.weights, {});
  const seen = load(KEY.seen, []);
  let cands = lib().filter(p => !seen.includes(p.titre));
  if (!cands.length) cands = lib().slice(); // tout a été vu récemment : on rouvre tout
  const total = cands.reduce((s,c) => s + Math.max(0.15, weights[c.cat] ?? 1), 0);
  let r = Math.random() * total;
  for (const c of cands) {
    r -= Math.max(0.15, weights[c.cat] ?? 1);
    if (r <= 0) return c;
  }
  return cands[cands.length - 1];
}

/* ============================================================
   4) AFFICHAGE (une carte à la fois)
   ============================================================ */
let currentView = 'feed';
let current = null; // le contenu affiché en ce moment

const extraitDe = (corps) => corps.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim().slice(0, 115) + '…';

function renderPrefsHint() {
  const w = load(KEY.weights, {});
  const liked = Object.entries(w).filter(([,v]) => v > 1).sort((a,b) => b[1]-a[1]).map(([c]) => c);
  const el = document.getElementById('prefs-hint');
  el.innerHTML = liked.length
    ? `🎯 D'après tes 👍, on te montre plus de : <b>${liked.slice(0,3).join(', ')}</b>`
    : `🎯 Swipe ou note les contenus : l'app apprendra tes goûts.`;
}

function cardInner(p) {
  const extra = det()[p.titre]
    ? `<button class="more-btn" data-more>🔍 Plus de détails</button><div class="plus">${det()[p.titre]}</div>` : '';
  const whyLabel = isKid() ? '🤩 Le savais-tu&nbsp;?' : 'Pourquoi ça compte';
  return `
    <span class="stamp like">${isKid() ? "J'adore" : "J'aime"}</span>
    <span class="stamp nope">${isKid() ? 'Bof' : 'Passe'}</span>
    <span class="chip">${p.cat}</span>
    <h2>${p.titre}</h2>
    <div class="body">${p.corps}</div>
    <div class="why"><span class="lbl">${whyLabel}</span><p>${p.why}</p></div>
    ${extra}`;
}

function showCurrent() {
  renderPrefsHint();
  const card = document.getElementById('swipe-card');
  card.style.transition = 'none';
  card.style.transform = '';
  card.style.opacity = '1';
  card.classList.remove('hint-like', 'hint-nope');
  card.innerHTML = cardInner(current);
  const more = card.querySelector('[data-more]');
  if (more) more.onclick = (e) => {
    e.stopPropagation();
    const box = card.querySelector('.plus');
    const open = box.classList.toggle('open');
    more.textContent = open ? '🔼 Masquer les détails' : '🔍 Plus de détails';
  };
}

function nextCard() {
  current = pickNext();
  showCurrent();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

   ============================================================ */
function applyRating(kind, titre) {
  const p = lib().find(x => x.titre === titre); if (!p) return;
  const cat = p.cat;
  const weights = load(KEY.weights, {});
  let favs = load(KEY.favs, []), dislikes = load(KEY.dislikes, []);
  weights[cat] = weights[cat] ?? 1;
  if (kind === 'like') {
    weights[cat] = Math.min(4, weights[cat] + 0.6);
    if (!favs.includes(titre)) favs.push(titre);
    dislikes = dislikes.filter(t => t !== titre);
  } else {
    weights[cat] = Math.max(0.2, weights[cat] - 0.6);
    if (!dislikes.includes(titre)) dislikes.push(titre);
    favs = favs.filter(t => t !== titre);
  }
  save(KEY.weights, weights); save(KEY.favs, favs); save(KEY.dislikes, dislikes);
}

// kind : 'like' | 'dislike' | 'skip'
function decide(kind) {
  if (!current) return;
  if (kind === 'like' || kind === 'dislike') applyRating(kind, current.titre);
  addSeen([current.titre]); // on évite de le revoir tout de suite
  nextCard();
}

// La carte s'envole, puis on charge la suivante
function flyOut(dir, kind) {
  const card = document.getElementById('swipe-card');
  card.style.transition = 'transform .28s ease-out, opacity .28s ease-out';
  card.style.transform = `translateX(${dir * 600}px) rotate(${dir * 22}deg)`;
  card.style.opacity = '0';
  setTimeout(() => decide(kind), 260);
}

/* ============================================================
   6) SWIPE (doigt sur tablette / souris)
   ============================================================ */
function setupSwipe() {
  const card = document.getElementById('swipe-card');
  let startX = 0, startY = 0, dx = 0, dragging = false, axis = null;
  const THRESHOLD = 110;

  card.addEventListener('pointerdown', (e) => {
    if (e.target.closest('.more-btn') || e.target.closest('.plus')) return; // ne pas gêner la lecture
    dragging = true; axis = null; startX = e.clientX; startY = e.clientY; dx = 0;
    card.style.transition = 'none';
    try { card.setPointerCapture(e.pointerId); } catch (_) {}
  });
  card.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    dx = e.clientX - startX;
    const dy = e.clientY - startY;
    if (axis === null && (Math.abs(dx) > 8 || Math.abs(dy) > 8)) axis = Math.abs(dx) >= Math.abs(dy) ? 'h' : 'v';
    if (axis !== 'h') return; // mouvement vertical : on laisse la page défiler
    card.style.transform = `translateX(${dx}px) rotate(${dx / 25}deg)`;
    card.classList.toggle('hint-like', dx > 40);
    card.classList.toggle('hint-nope', dx < -40);
  });
  const end = () => {
    if (!dragging) return;
    dragging = false;
    if (axis === 'h' && dx > THRESHOLD) flyOut(1, 'like');
    else if (axis === 'h' && dx < -THRESHOLD) flyOut(-1, 'dislike');
    else {
      card.style.transition = 'transform .2s';
      card.style.transform = '';
      card.classList.remove('hint-like', 'hint-nope');
    }
  };
  card.addEventListener('pointerup', end);
  card.addEventListener('pointercancel', end);
}

/* ============================================================
   7) FAVORIS (liste dépliable)
   ============================================================ */
function renderFavs() {
  const favs = load(KEY.favs, []);
  const list = document.getElementById('favs-list');
  if (!favs.length) { list.innerHTML = `<div class="empty">Aucun favori pour l'instant.<br>Swipe à droite (ou 👍) pour en ajouter ici.</div>`; return; }
  const items = favs.map(t => lib().find(p => p.titre === t)).filter(Boolean);
  const whyLabel = isKid() ? '🤩 Le savais-tu&nbsp;?' : 'Pourquoi ça compte';
  list.innerHTML = items.map(p => `
    <div class="card-item" data-titre="${encodeURIComponent(p.titre)}">
      <div class="card-head">
        <div><span class="chip">${p.cat}</span>
          <h3>${p.titre}</h3>
          <p class="teaser">${extraitDe(p.corps)}</p></div>
        <span class="lire">Lire ▾</span>
      </div>
      <div class="card-body">
        <div class="body">${p.corps}</div>
        <div class="why"><span class="lbl">${whyLabel}</span><p>${p.why}</p></div>
        ${det()[p.titre] ? `<button class="more-btn" data-more>🔍 Plus de détails</button><div class="plus">${det()[p.titre]}</div>` : ''}
        <button class="rate dislike" data-unfav style="margin-top:16px">🗑️ Retirer des favoris</button>
      </div>
    </div>`).join('');
  list.querySelectorAll('.card-item').forEach(cardEl => {
    const titre = decodeURIComponent(cardEl.dataset.titre);
    cardEl.querySelector('.card-head').onclick = () => {
      const open = cardEl.classList.toggle('open');
      cardEl.querySelector('.lire').textContent = open ? 'Réduire ▴' : 'Lire ▾';
    };
    const more = cardEl.querySelector('[data-more]');
    if (more) more.onclick = (e) => { e.stopPropagation(); const b = cardEl.querySelector('.plus'); const o = b.classList.toggle('open'); more.textContent = o ? '🔼 Masquer les détails' : '🔍 Plus de détails'; };
    const unfav = cardEl.querySelector('[data-unfav]');
    if (unfav) unfav.onclick = (e) => { e.stopPropagation(); save(KEY.favs, load(KEY.favs, []).filter(t => t !== titre)); renderFavs(); };
  });
}

/* ============================================================
   8) NAVIGATION + DÉMARRAGE
   ============================================================ */
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));
  document.getElementById('view-feed').classList.toggle('hidden', view !== 'feed');
  document.getElementById('view-favs').classList.toggle('hidden', view !== 'favs');
}
// Met à jour l'habillage selon le mode (titre, sous-titre, thème, bouton actif)
const TITRES = {
  vincent: ['💭 Les pensées de Vincent', 'Fais défiler les idées, une par une. À toi de zapper ou de garder.'],
  cecile:  ['💭 Les pensées de Cécile', 'Fais défiler les idées, une par une. À toi de zapper ou de garder.'],
  charlie: ['🌸 Les découvertes de Charlie', 'Plein de trucs incroyables à découvrir. Swipe pour en voir un autre !'],
  emilie:  ["🦄 Les découvertes d'Émilie", 'Plein de trucs incroyables à découvrir. Swipe pour en voir un autre !'],
};
function applyModeUI() {
  document.body.classList.toggle('kids', isKid());
  document.querySelectorAll('.mode').forEach(b => b.classList.toggle('active', b.dataset.mode === MODE));
  const [titre, sous] = TITRES[MODE] || TITRES.vincent;
  document.querySelector('header.top h1').textContent = titre;
  document.querySelector('header.top p').textContent = sous;
}

function switchMode(mode) {
  if (mode === MODE) return;
  MODE = mode;
  save('pdj_mode', MODE);
  refreshKeys();      // bascule sur la mémoire (goûts, favoris) de ce mode
  applyModeUI();
  switchView('feed');
  nextCard();         // charge un contenu de la nouvelle bibliothèque
}

document.querySelectorAll('.mode').forEach(b => { b.onclick = () => switchMode(b.dataset.mode); });
document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => { switchView(t.dataset.view); if (t.dataset.view === 'favs') renderFavs(); };
});
document.getElementById('act-like').onclick = () => flyOut(1, 'like');
document.getElementById('act-dislike').onclick = () => flyOut(-1, 'dislike');
document.getElementById('act-skip').onclick = () => decide('skip');

setupSwipe();
applyModeUI();
nextCard();
</script>
