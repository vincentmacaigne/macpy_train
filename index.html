const DETAILS = {
  "Le bateau de Thésée": `<p>Ce casse-tête a une portée très concrète. Une entreprise qui change de nom, de dirigeants, de locaux et de métier est-elle la même société ? Juridiquement oui, tant qu'une continuité formelle existe — preuve que l'identité tient souvent à une <strong>convention</strong>, pas à la matière.</p>
    <p>Les philosophes proposent deux réponses. Pour les « endurantistes », l'objet reste le même à travers le temps. Pour les « perdurantistes », un objet est la somme de ses tranches temporelles, comme un film est la somme de ses images : le bateau d'hier et celui d'aujourd'hui sont deux tranches d'un même « ver » étalé dans le temps. Le paradoxe s'évapore alors — il n'y a jamais eu un unique « même » bateau figé, mais un processus.</p>`,

  "L'effet papillon": `<p>Le terme vient du météorologue Edward Lorenz (1963). En arrondissant une donnée de 0,506127 à 0,506 dans sa simulation, il obtint une météo totalement différente : il venait de découvrir la « sensibilité aux conditions initiales », pilier de la théorie du chaos.</p>
    <p>Attention au contresens : chaos ne veut pas dire hasard. Ces systèmes sont parfaitement déterministes — mêmes causes, mêmes effets. Le problème est pratique : on ne mesure jamais le départ avec une précision infinie, et la moindre imprécision explose au fil des calculs. D'où une leçon générale : dans un système chaotique, mieux vaut des prévisions probabilistes à court terme que de fausses certitudes à long terme.</p>`,

  "La caverne de Platon": `<p>Dans le texte (La République, livre VII), Platon précise que le prisonnier libéré <strong>souffre</strong> : la lumière l'aveugle, la remontée est rude. La vérité n'est pas confortable, elle se conquiert.</p>
    <p>La métaphore fonctionne encore : les ombres, ce sont nos écrans, nos fils d'actualité, les récits tout faits. Sortir de la caverne, c'est l'esprit critique — remonter à la source, distinguer l'apparence de la cause. Et le sort du prisonnier qui revient (moqué, voire menacé) rappelle pourquoi il est si dur de faire changer d'avis : on ne se contente pas d'apporter une info, on demande à l'autre d'admettre qu'il vivait dans l'illusion.</p>`,

  "Le paradoxe de l'anniversaire": `<p>Le calcul se fait « à l'envers » : on cherche la probabilité qu'<strong>aucune</strong> paire ne coïncide, puis on soustrait de 100 %. Pour 23 personnes, elle tombe sous 50 %, donc la probabilité d'au moins une coïncidence dépasse 50 %.</p>
    <p>Dès 57 personnes, on dépasse 99 %. En sécurité informatique, ce principe fonde « l'attaque des anniversaires » : pour trouver deux fichiers ayant la même empreinte (hash), il faut bien moins d'essais que l'intuition ne le suggère — environ la racine carrée du nombre total de possibilités. C'est pour ça que les empreintes doivent être très longues.</p>`,

  "L'entropie": `<p>L'entropie mesure le nombre de configurations « microscopiques » qui donnent le même état « macroscopique ». Une pièce en désordre a un nombre gigantesque d'arrangements possibles ; rangée, presque un seul. Le hasard favorise donc le désordre par pur comptage.</p>
    <p>La nuance clé : l'entropie n'augmente forcément que pour un système <strong>isolé</strong> (l'univers entier). Localement, on peut créer de l'ordre — un cristal, un être vivant, une maison rangée — à condition de dépenser de l'énergie et d'exporter du désordre ailleurs (chaleur, déchets). La vie n'échappe pas à la règle : elle « paie » son ordre en augmentant le désordre autour d'elle.</p>`,

  "La règle des 2 minutes": `<p>La première version vient de David Allen (méthode « Getting Things Done ») : elle vide la tête des micro-tâches qui, accumulées, créent une charge mentale démesurée par rapport à leur poids réel.</p>
    <p>La seconde, popularisée par James Clear, sert à démarrer les grosses habitudes : « faire 10 min de sport » devient « mettre mes chaussures ». Le but n'est pas la performance mais la <strong>répétition</strong> : on ancre d'abord le geste de départ. Une fois lancé, on continue souvent bien au-delà — et même les jours sans, on a maintenu la chaîne. C'est la régularité qui construit l'habitude, pas l'intensité.</p>`,

  "1 % meilleur chaque jour": `<p>Le calcul exact : 1,01<sup>365</sup> ≈ 37,8, contre 0,99<sup>365</sup> ≈ 0,03. L'écart entre progresser et régresser de 1 % par jour est d'un facteur ~1000 sur un an. C'est la puissance des intérêts composés appliquée à soi-même.</p>
    <p>Mais il y a un piège rarement dit : les résultats sont d'abord <strong>invisibles</strong>. Un glaçon ne fond pas à -5, -4, -3, -2, -1… puis fond d'un coup à 0 °C. Beaucoup abandonnent dans la « vallée de la déception », juste avant que les gains composés ne deviennent visibles. La leçon : juge-toi sur la constance du processus, pas sur les résultats à court terme.</p>`,

  "La zone d'apprentissage": `<p>Ce modèle recoupe la notion de « flow » (Csikszentmihalyi) : on est absorbé et performant quand le défi dépasse légèrement nos compétences. Trop facile = ennui ; trop dur = anxiété.</p>
    <p>Application : pour progresser vite, découpe une compétence et attaque la sous-partie juste hors de portée. Un joueur d'échecs n'enchaîne pas des parties faciles, il analyse ses défaites ; un musicien travaille les 4 mesures difficiles, pas le morceau entier. C'est la « pratique délibérée » : inconfortable, ciblée, avec un retour immédiat sur l'erreur.</p>`,

  "Se parler comme à un ami": `<p>Kristin Neff, la chercheuse de référence, distingue trois piliers : la <strong>bienveillance</strong> envers soi (vs jugement), l'<strong>humanité commune</strong> (l'échec est universel, pas une tare personnelle), et la <strong>pleine conscience</strong> (observer sa douleur sans la dramatiser ni la fuir).</p>
    <p>Contre-intuitif mais démontré : l'auto-compassion ne rend pas complaisant. Ceux qui la pratiquent prennent <em>mieux</em> leurs responsabilités, car reconnaître une erreur est moins menaçant quand on ne s'auto-détruit pas pour autant. La dureté envers soi, elle, pousse souvent à nier ses erreurs pour se protéger.</p>`,

  "Mettre des mots sur ses émotions": `<p>L'imagerie cérébrale montre que nommer une émotion (« je ressens de la colère ») active le cortex préfrontal et calme l'amygdale, le centre de l'alarme. Mettre un mot, c'est littéralement reprendre la main sur le cerveau émotionnel.</p>
    <p>En pratique : l'écriture expressive (10 min, plusieurs jours de suite) est associée à moins de stress et un meilleur sommeil. Élargir son vocabulaire aide aussi : distinguer « déçu », « frustré », « anxieux » plutôt qu'un vague « mal » permet des réponses plus adaptées. <strong>On ne régule pas ce qu'on ne sait pas nommer.</strong></p>`,

  "La matrice d'Eisenhower": `<p>L'idée est attribuée à Eisenhower : « Ce qui est important est rarement urgent, et ce qui est urgent est rarement important. » Le piège moderne est de vivre en pompier, dans l'urgent, en sacrifiant l'important non urgent — qui est justement ce qui, à terme, réduit les urgences.</p>
    <p>Astuce : bloque chaque semaine un créneau pour le quadrant « important / non urgent » <strong>avant</strong> que l'agenda ne se remplisse. Et méfie-toi de « l'urgent des autres » (mails, sollicitations) : c'est souvent important pour eux, pas pour tes objectifs. Déléguer ou dire non n'est pas de la paresse, c'est de la stratégie.</p>`,

  "La loi de Parkinson": `<p>Énoncée par Cyril Parkinson en 1955 à propos des bureaucraties, elle a une explication psychologique : sans contrainte, on ajoute perfectionnisme, détours et procrastination pour « remplir » le temps offert.</p>
    <p>Deux leviers. 1) Des délais courts et <strong>publics</strong> (un engagement pris devant quelqu'un). 2) Le « time-boxing » : au lieu de « je finis quand c'est parfait », décide « j'y consacre 90 minutes, point ». Paradoxalement, la contrainte de temps améliore souvent la qualité, car elle force à se concentrer sur l'essentiel plutôt qu'à polir l'accessoire.</p>`,

  "Le principe de Pareto (80/20)": `<p>Vilfredo Pareto avait remarqué que 20 % des Italiens possédaient 80 % des terres. On a ensuite retrouvé ce déséquilibre partout : 20 % des bugs causent 80 % des plantages, 20 % des clients génèrent 80 % des réclamations…</p>
    <p>Deux usages complémentaires. <strong>Positif</strong> : repère les 20 % d'actions à fort rendement et double la mise dessus. <strong>Négatif</strong> : traque les 20 % de causes qui créent 80 % de tes problèmes et élimine-les d'abord. À ne pas prendre comme un dogme : ce n'est pas toujours 80/20 exactement, c'est un rappel que efforts et effets ne sont presque jamais répartis également.</p>`,

  "Assertif, ni passif ni agressif": `<p>L'assertivité s'apprend avec des formules. Le « DESC » : <strong>D</strong>écrire les faits, <strong>E</strong>xprimer son ressenti, <strong>S</strong>pécifier ce qu'on souhaite, <strong>C</strong>onclure sur les bénéfices. Ex. : « Quand la réunion déborde (D), je suis gêné car je dois partir (E) ; peut-on caler une fin ferme à 18h (S) ? On y gagnera en efficacité (C). »</p>
    <p>Autre outil : le « disque rayé » — répéter calmement sa position sans se justifier à l'infini ni monter dans l'agressivité. L'assertivité, ce n'est pas gagner contre l'autre : c'est défendre son besoin tout en respectant le sien. La posture qui préserve à la fois l'estime de soi et la relation.</p>`,

  "Donner un feedback qui passe (SBI)": `<p>Le modèle SBI vient du Center for Creative Leadership. Sa force : séparer le fait observable du jugement. « Tu es désorganisé » est une étiquette qui braque ; « le rapport est arrivé 2 jours après la date (fait), du coup le client a relancé (impact) » est factuel et actionnable.</p>
    <p>Deux compléments. Demande l'<strong>intention</strong> (« quel était ton objectif ? ») : souvent l'autre n'avait pas conscience de l'impact. Et soigne le feedback <em>positif</em> avec la même méthode : dire précisément quel comportement a eu quel bon effet renforce ce comportement bien mieux qu'un « bravo » vague.</p>`,

  "On progresse pendant le repos": `<p>Le mécanisme s'appelle la surcompensation : après l'effort, la capacité baisse (fatigue), puis remonte <strong>au-dessus</strong> du niveau initial pendant la récupération. Se réentraîner au bon moment (au pic) fait monter la courbe ; trop tôt ou trop tard, on stagne.</p>
    <p>D'où la « périodisation » : alterner semaines dures et semaines légères (« deload »). Le surentraînement est réel — sommeil dégradé, irritabilité, blessures, performances en baisse malgré plus d'efforts. Écouter ces signaux n'est pas de la faiblesse : c'est ce qui permet de progresser sur la durée.</p>`,

  "Le cardio « zone 2 »": `<p>La zone 2, c'est environ 60-70 % de ta fréquence cardiaque max : un rythme où tu peux parler en phrases complètes. À cette intensité, le corps brûle surtout des graisses et développe les mitochondries (les « usines à énergie » des cellules) et les capillaires.</p>
    <p>Les athlètes appliquent souvent la règle 80/20 : ~80 % du volume en facile, ~20 % en intensité élevée. L'erreur de l'amateur est de tout faire à intensité « moyenne-dure » : trop dur pour bien récupérer, pas assez pour créer un vrai stimulus. Le facile construit la base ; l'intense ajoute le sommet.</p>`,

  "La surcharge progressive": `<p>C'est le principe n°1 de toute progression (principe SAID : adaptation spécifique aux demandes imposées). Le corps s'adapte exactement au niveau de contrainte habituel ; sans augmentation, aucune raison de changer.</p>
    <p>On peut surcharger autrement qu'en ajoutant du poids : plus de répétitions, de séries, moins de repos, une plus grande amplitude, une meilleure exécution. La progression doit rester graduelle pour laisser tendons et articulations s'adapter (plus lents que les muscles). Trop vite = blessure ; trop lentement = plateau. Un carnet d'entraînement aide à voir la progression réelle.</p>`,

  "La force part du centre": `<p>Le « core » n'est pas que les abdos visibles, mais tout un corset : transverse profond, obliques, lombaires, plancher pelvien, diaphragme. Son rôle premier n'est pas de bouger, mais de <strong>stabiliser</strong> le tronc pendant que bras et jambes agissent.</p>
    <p>Conséquence : les meilleurs exercices sont souvent « anti-mouvement » (la planche = résister à l'effondrement ; les exercices anti-rotation). Un core solide transfère mieux la force du bas vers le haut — un boxeur frappe avec les jambes et le tronc, pas juste le bras — et protège la colonne au quotidien.</p>`,

  "Le sommeil, meilleur « supplément »": `<p>En sommeil profond, le corps libère l'hormone de croissance qui répare les tissus ; en sommeil paradoxal (REM), le cerveau consolide les apprentissages moteurs du jour. Mal dormir, c'est s'entraîner sans encaisser les bénéfices.</p>
    <p>Les chiffres parlent : sous ~7-8 h, on observe plus de blessures, un temps de réaction dégradé et une perception de l'effort accrue (tout paraît plus dur). Le manque de sommeil augmente aussi le cortisol et dérègle les hormones de l'appétit. Avant tout complément « magique », la première optimisation, gratuite, reste le sommeil.</p>`,

  "L'index glycémique": `<p>L'IG classe les glucides de 0 à 100 selon leur vitesse d'absorption. Mais un indicateur plus utile est la <strong>charge glycémique</strong>, qui tient compte de la quantité réellement mangée : la pastèque a un IG élevé mais si peu de sucre par portion que son impact reste faible.</p>
    <p>Astuces : la cuisson, la maturité et la transformation augmentent l'IG (purée > pomme de terre entière ; banane mûre > verte). À l'inverse, associer un glucide à des fibres, protéines ou gras ralentit l'absorption et aplatit le pic. L'objectif n'est pas de bannir le sucre, mais d'éviter les montagnes russes glycémiques qui provoquent fringales et coups de barre.</p>`,

  "Les protéines rassasient": `<p>Les protéines ont l'effet de satiété le plus fort des trois macronutriments, et l'effet thermique le plus élevé : le corps dépense ~20-30 % de leurs calories rien que pour les digérer (contre ~5-10 % pour les glucides). Elles préservent aussi le muscle, qui soutient le métabolisme.</p>
    <p>Repère souvent cité : viser ~1,6 g de protéines par kg de poids si l'on est actif, <strong>réparti</strong> sur la journée (le corps ne les stocke pas, un apport régulier vaut mieux qu'un gros repas unique). Sources variées : œufs, poisson, volaille, laitages, mais aussi légumineuses, tofu et céréales complètes côté végétal.</p>`,

  "Soif ou faim ?": `<p>Les centres de la faim et de la soif sont voisins dans l'hypothalamus, d'où la confusion. Le « petit creux » de l'après-midi est souvent un début de déshydratation.</p>
    <p>Plus fiable que la soif (qui arrive tard) : la couleur des urines — jaune pâle = bien hydraté, foncé = à boire. Les besoins varient (~1,5 à 2,5 L/jour selon l'activité et la chaleur), et une part vient des aliments riches en eau. Le test : boire un grand verre d'eau et attendre 10 minutes avant de grignoter — si la faim disparaît, c'était de la soif.</p>`,

  "Les fibres nourrissent ton microbiote": `<p>Deux familles de fibres. Les <strong>solubles</strong> (avoine, légumineuses, pommes) forment un gel qui ralentit la digestion et nourrit les bactéries ; les <strong>insolubles</strong> (peaux, son, légumes) font office de « balai » pour le transit. Les deux sont utiles.</p>
    <p>En fermentant les fibres, les bonnes bactéries produisent des acides gras à chaîne courte (comme le butyrate) qui nourrissent la paroi de l'intestin et réduisent l'inflammation. Ce microbiote dialogue avec le cerveau (l'axe intestin-cerveau) et influence immunité et humeur. La plupart des gens en mangent moitié moins que recommandé : varier les végétaux crée un microbiote plus riche.</p>`,

  "Le déficit calorique": `<p>Le principe : le bilan d'énergie, entrées (ce qu'on mange) vs sorties (métabolisme de repos + activité + digestion). Un déficit modéré (~300-500 kcal/j) fait perdre du gras sans trop toucher au muscle ni ruiner le moral.</p>
    <p>Nuances : toutes les calories comptent pareil pour le poids, mais pas pour la satiété ni la santé — 500 kcal de sucreries et 500 kcal de légumes + protéines n'ont pas le même effet sur la faim. Et le corps s'adapte : en déficit prolongé, le métabolisme baisse un peu. D'où l'intérêt de préserver le muscle (protéines + musculation) et d'éviter les déficits extrêmes, qui finissent presque toujours en effet yo-yo.</p>`,

  "Les points d'étranglement maritimes": `<p>Quelques chiffres : ~20 % du pétrole mondial transite par le détroit d'Ormuz, une part énorme du commerce par le canal de Suez. Le blocage du Suez par le porte-conteneurs <em>Ever Given</em> en 2021, six jours durant, a coûté des milliards et désorganisé la logistique mondiale.</p>
    <p>D'où des enjeux militaires majeurs : flottes, bases, tensions récurrentes. La leçon plus large : la mondialisation a rendu le commerce ultra-efficace mais <strong>fragile</strong>, dépendant de quelques nœuds. Diversifier les routes (nouveaux canaux, route arctique, corridors terrestres) est devenu stratégique pour les grandes puissances.</p>`,

  "La malédiction des ressources": `<p>Un mécanisme s'appelle le « syndrome hollandais » : quand un pays exporte massivement une ressource, sa monnaie s'apprécie, ce qui rend son industrie et son agriculture non compétitives. L'économie se réduit à la rente.</p>
    <p>S'ajoutent des effets politiques : une rente facile à capter attise la corruption, et permet à un régime de se financer sans taxer la population — donc sans lui rendre de comptes. Mais ce n'est pas une fatalité : la Norvège, avec son fonds souverain et des institutions solides, a transformé son pétrole en prospérité durable. <strong>La différence tient aux institutions, pas à la ressource.</strong></p>`,

  "Le soft power": `<p>Le concept a été formalisé par Joseph Nye : le pouvoir « dur » contraint par la force ou l'argent ; le pouvoir « doux » attire par la culture, les valeurs, l'image. Les deux se combinent en « smart power ».</p>
    <p>Exemples : Hollywood et la musique ont diffusé un mode de vie américain ; les mangas et la cuisine ont porté l'image du Japon ; la Corée du Sud a bâti une stratégie explicite autour de la K-pop et des séries (le « hallyu »). Plus lent et moins contrôlable que les armes, le soft power façonne les préférences des populations — et donc, à terme, les alliances.</p>`,

  "Les terres rares": `<p>Malgré leur nom, ces 17 métaux ne sont pas si rares dans la croûte terrestre. Ce qui est rare, ce sont les gisements assez concentrés pour être exploitables — et surtout le <strong>raffinage</strong>, très polluant et techniquement complexe.</p>
    <p>La Chine domine largement le raffinage mondial, ce qui lui donne un levier : elle a déjà utilisé des restrictions d'exportation comme moyen de pression. D'où une course occidentale pour rouvrir des mines, recycler et trouver des substituts. Exemple parfait : la transition énergétique (batteries, éoliennes) crée de nouvelles dépendances géopolitiques.</p>`,

  "Le dilemme de sécurité": `<p>Central en relations internationales, il vient du fait qu'un pays ne peut jamais être sûr des intentions réelles des autres. Des armes « défensives » pour l'un paraissent « offensives » pour le voisin, qui réagit — enclenchant une spirale.</p>
    <p>C'est une tragédie de la méfiance : chacun agit rationnellement pour sa sécurité, mais le résultat collectif est une insécurité accrue et des ressources gaspillées. Remèdes connus : transparence (inspections, traités), communication (lignes directes), confiance construite par étapes. C'est le cousin géopolitique du « dilemme du prisonnier » : coopérer serait meilleur pour tous, mais la peur de se faire avoir pousse à la défiance.</p>`,

  "La technique Pomodoro": `<p>Inventée par Francesco Cirillo dans les années 1980 (du nom de son minuteur en forme de tomate), elle exploite deux ressorts : la peur de commencer est vaincue par un engagement minuscule (« juste 25 minutes »), et les pauses régulières évitent l'épuisement de l'attention.</p>
    <p>Les règles qui font la différence : pendant le « pomodoro », une seule tâche, zéro distraction (téléphone loin) ; une pensée parasite ? on la note et on y revient après. Les pauses doivent être vraies (se lever, bouger), pas un scroll qui fatigue autant. Bonus : compter ses pomodoros donne une mesure réaliste du temps que prennent les choses.</p>`,

  "La répétition espacée": `<p>Le fondement est la « courbe de l'oubli » d'Ebbinghaus : on oublie très vite ce qu'on vient d'apprendre, mais chaque révision bien placée aplatit la courbe. Réviser <strong>juste avant d'oublier</strong> est le moment optimal.</p>
    <p>En pratique, des logiciels de « flashcards » (comme Anki) calculent les intervalles : une carte réussie revient plus tard, une carte ratée revient plus tôt. Combinée à « l'effet de test » (se forcer à retrouver la réponse plutôt que relire), c'est la méthode d'apprentissage la plus efficace prouvée par la recherche — étudiants en médecine et apprenants de langues du monde entier l'utilisent.</p>`,

  "La méthode Feynman": `<p>Richard Feynman, prix Nobel de physique, était célèbre pour expliquer des idées complexes avec une simplicité désarmante. Sa méthode : 1) choisir un concept ; 2) l'expliquer comme à un enfant, à voix haute ou par écrit ; 3) repérer où l'on bloque ou emploie du jargon — ce sont tes trous ; 4) retourner à la source, combler, recommencer.</p>
    <p>Pourquoi ça marche : reformuler avec ses propres mots force une compréhension <strong>active</strong>. « Ça me dit quelque chose » n'est pas « je sais l'expliquer ». Le jargon est un piège : il donne l'illusion de comprendre en masquant le flou. Si tu ne peux pas l'expliquer simplement, tu ne l'as pas encore compris.</p>`,

  "Expliquer à voix haute (rubber duck)": `<p>Le nom vient de programmeurs qui gardaient un canard en plastique sur leur bureau et lui expliquaient leur code ligne par ligne quand ils bloquaient. Souvent, l'erreur leur sautait aux yeux avant la fin de l'explication.</p>
    <p>Le mécanisme est général : passer d'une pensée floue et rapide à une explication linéaire et explicite oblige le cerveau à combler les non-dits — et c'est là que se révèle l'incohérence ou l'oubli. Ça marche pour déboguer un code, mais aussi pour clarifier une décision, un e-mail ou un raisonnement. L'écrire produit le même effet. Verbaliser, c'est penser deux fois.</p>`,

  "Le time-blocking": `<p>La méthode transforme la to-do list en <strong>rendez-vous avec soi-même</strong> dans l'agenda. Cal Newport, qui la popularise, insiste : une tâche non planifiée dans le temps entre en compétition permanente avec toutes les autres et tend à être repoussée.</p>
    <p>Trois raffinements. 1) Regrouper les tâches similaires (« batching ») : traiter tous les mails dans un bloc plutôt que 30 fois par jour, car chaque changement de contexte coûte de l'attention. 2) Protéger un bloc de « deep work » sans interruption pour les tâches à forte valeur. 3) Prévoir des blocs tampons : la journée ne se passe jamais comme prévu, un agenda rempli à 100 % explose au premier imprévu.</p>`,

  // ===== DÉTAILS — SECTION PERSO VINCENT =====
  "Le positionnement RTK": `<p>Le RTK exige une liaison constante (radio ou 4G) entre la base et le mobile ; si elle tombe, on passe en « float » (précision décimétrique) et il faut réinitialiser. Quand le temps réel n'est pas fiable, le PPK (post-traitement) prend le relais.</p>`,
  "Le sondeur multifaisceaux": `<p>La largeur de bande couverte vaut typiquement 3 à 5 fois la hauteur d'eau : une seule ligne balaie large au grand fond, mais par petits fonds il faut multiplier les lignes parallèles — d'où des levés côtiers bien plus longs.</p>`,
  "La vitesse du son dans l'eau": `<p>On mesure le profil de célérité (sonde CTD) plusieurs fois par jour, car il bouge avec la marée, un fleuve ou le réchauffement. En estuaire, la couche eau douce / eau salée courbe fortement le son et déforme la mesure si on l'ignore.</p>`,
  "Le cycle de la dette": `<p>Dalio distingue désendettement « déflationniste » (défauts, austérité, douloureux) et « inflationniste » (la banque centrale monétise). Le pilotage entre les deux vise un « beau désendettement » où la croissance nominale dépasse les taux.</p>`,
  "La J-curve du private equity": `<p>On amortit le creux du J par la diversification des millésimes (étaler ses engagements dans le temps) et par le marché secondaire, qui permet de vendre ses parts avant terme. Le TRI des premières années est presque dénué de sens.</p>`,
  "Les taux, gravité des actifs": `<p>On actualise les flux futurs : plus le taux monte, moins un euro lointain vaut aujourd'hui. C'est pourquoi une hausse des taux frappe plus durement la tech (cash-flows lointains) que les « value » qui paient tout de suite.</p>`,
  "Le brevet : divulguer pour protéger": `<p>Un brevet est territorial (pays par pays, ou via PCT) et coûteux à maintenir. Beaucoup de PME déposent surtout pour la valeur défensive et de négociation : un brevet ne vaut que si l'on a les moyens de le faire respecter en justice.</p>`,
  "Les douves économiques (moat)": `<p>Buffett juge le moat à sa largeur ET sa durabilité : une avance techno s'érode vite, une marque ou un effet de réseau bien moins. Son test : « avec un milliard, un concurrent pourrait-il me déloger ? »</p>`,
  "Le seuil lactique": `<p>On l'estime en labo (lactate) ou sur le terrain (FTP en vélo, allure tenue 60 min en course). Le travail au seuil (« tempo ») et le gros volume en zone 2 le repoussent tous deux, par des voies différentes.</p>`,
  "VO2max contre économie": `<p>La VO2max plafonne en quelques années ; l'économie progresse bien plus longtemps. D'où des marathoniens d'élite trentenaires : leur moteur n'est pas plus gros, il est mieux réglé.</p>`,
  "Le contre-braquage": `<p>Plus la vitesse est haute, plus l'effet domine : au-delà de ~20 km/h, c'est le contre-braquage qui pilote vraiment. Le maîtriser consciemment permet des évitements d'urgence bien plus rapides.</p>`,
  "La stratégie indirecte": `<p>Liddell Hart en tire des maximes, dont « choisis la ligne de moindre attente ». La percée de 1940 par les Ardennes « infranchissables », contournant la ligne Maginot, en est l'illustration parfaite.</p>`,
  "La boucle OODA (Boyd)": `<p>Le cœur n'est pas la vitesse brute mais l'« Orientation » : recadrer la situation plus vite que l'adversaire, en cassant ses repères. Une organisation qui décide vite mais s'oriente mal se trompe juste plus vite.</p>`,
  "Marge n'est pas trésorerie": `<p>Le tueur silencieux est le BFR : plus tu vends vite et grand, plus tu avances du cash (stocks, créances) avant d'être payé. D'où un plan de trésorerie distinct du compte de résultat, à surveiller au mois près.</p>`,

  // ===== DÉTAILS — SUJETS INTÉRESSANTS =====
  "Le paradoxe de Fermi": `<p>Le « Grand Filtre » est l'hypothèse la plus glaçante : un obstacle que presque aucune civilisation ne franchit. S'il est derrière nous (l'apparition de la vie), tant mieux ; s'il est devant (l'autodestruction), notre silence cosmique est un mauvais présage.</p>`,
  "Le rasoir de Hanlon": `<p>Précieux en management : avant d'imaginer un sabotage, cherche la cause banale — consigne floue, surcharge, outil défaillant. Mais ce n'est qu'une première hypothèse : la malveillance existe, ne la nie pas non plus.</p>`,
  "L'effet Streisand": `<p>Le mécanisme : la censure signale que l'info a de la valeur et mobilise ses défenseurs. En gestion de crise, on pèse « répondre et amplifier » contre « ignorer et laisser mourir » — souvent la seconde option gagne.</p>`,
  "Le paradoxe de Simpson": `<p>Cas d'école : Berkeley semblait discriminer les femmes à l'admission ; en réalité, filière par filière, elles étaient admises autant ou plus — elles postulaient juste aux plus sélectives. La variable cachée inversait tout.</p>`,
  "La loi de Goodhart": `<p>Exemples : hôpitaux qui trient pour flatter leurs stats de mortalité, écoles qui « enseignent le test ». La parade : croiser plusieurs indicateurs et garder du jugement humain, jamais un seul chiffre-roi.</p>`,
  "Le dilemme agent-principal": `<p>On l'aligne par les incitations (variable, actions), le contrôle (reporting, audit) et la réputation. Aucun n'est parfait : trop d'incitation crée du court-termisme, trop de contrôle tue l'initiative.</p>`,

  // ===== DÉTAILS — DÉVELOPPEMENT PERSONNEL =====
  "Procrastiner n'est pas de la paresse": `<p>La recherche montre une mauvaise régulation émotionnelle, pas de gestion du temps. Paradoxe utile : se pardonner une procrastination passée réduit la procrastination future, car on lève la charge émotionnelle.</p>`,
  "Le biais du présent": `<p>On le combat par l'engagement : virement automatique d'épargne, séance de sport payée d'avance. L'idée : laisser ton « toi » motivé d'aujourd'hui contraindre ton « toi » tenté de demain.</p>`,
  "La fatigue décisionnelle": `<p>Illustration célèbre : des juges accordent plus de libertés en début de séance qu'avant la pause déjeuner. Leçon : garde les décisions importantes pour le matin, et supprime les micro-choix qui t'usent.</p>`,
  "Habitudes : viser l'identité": `<p>Chaque action est un « vote » pour la personne que tu deviens. L'identité ne se décrète pas : elle se construit par preuves accumulées — d'où l'importance de commencer petit sans rompre la série.</p>`,
  "Jamais deux fois de suite": `<p>Cette règle tue le piège du tout-ou-rien (« j'ai raté un jour, autant tout arrêter »), qui détruit plus d'habitudes que les mauvais jours eux-mêmes. On tolère l'imperfection, jamais l'abandon.</p>`,
  "L'attention se dresse": `<p>Le cerveau a un « biais de négativité » hérité de l'évolution : les menaces marquent plus que le positif. Noter le positif ne nie pas les problèmes — il rééquilibre une balance biologiquement faussée.</p>`,

  // ===== DÉTAILS — PRO =====
  "La loi de Brooks": `<p>Tirée du « Mythe du mois-homme ». Cause : les canaux de communication croissent en n², et les nouveaux venus doivent être formés par les anciens, qu'ils ralentissent. Corollaire : découpe le travail plutôt que de gonfler l'équipe.</p>`,
  "Le coût irrécupérable": `<p>Le Concorde en est l'archétype (« on a déjà tant investi »). Antidote : raisonner en coût futur et se demander « repartirais-je de zéro dans ce projet aujourd'hui ? ». Sinon, c'est l'ego qui décide.</p>`,
  "Déléguer, c'est fixer un niveau": `<p>On choisit le niveau selon l'enjeu et la maturité de la personne. L'erreur classique : déléguer sans préciser le niveau, puis reprocher soit l'excès de zèle, soit le manque d'initiative.</p>`,
  "Le principe de Peter": `<p>Parades : créer des filières d'expertise (rester expert bien payé sans devenir manager), et évaluer sur les compétences du poste visé, pas du poste actuel. Promouvoir n'est pas récompenser.</p>`,
  "Le vrai coût d'une réunion": `<p>Amazon impose un ordre du jour écrit lu en silence et la règle des « deux pizzas ». Toute réunion devrait avoir un décideur, une décision attendue, et le moins de participants possible.</p>`,
  "Urgent contre important": `<p>Le piège est le « quadrant 3 » : urgent mais pas important — les sollicitations des autres qu'on prend pour du travail. Dire non, déléguer ou différer libère le temps du quadrant 2, le seul qui construit.</p>`,

  // ===== DÉTAILS — SPORT =====
  "Le point de côté": `<p>Facteurs aggravants : manger trop près de la séance, se déshydrater, un tronc faible. Parade immédiate : ralentir, expirer à fond, appuyer sur la zone douloureuse.</p>`,
  "Le HIIT, à petite dose": `<p>2 à 3 séances par semaine suffisent ; au-delà, le système nerveux ne récupère plus et la performance chute. Le HIIT ne remplace pas le volume facile : base large, sommet pointu.</p>`,
  "Les courbatures ne notent rien": `<p>Les DOMS apparaissent surtout après un exercice nouveau ou très excentrique, et s'atténuent avec l'habitude. S'entraîner légèrement courbaturé est sans risque ; forcer sur une douleur articulaire, non.</p>`,
  "Mobilité n'est pas souplesse": `<p>Un grand écart passif ne protège pas sans force dans l'amplitude. Les squats profonds, rotations contrôlées et amplitudes chargées construisent une mobilité utilisable — celle qui prévient vraiment les blessures.</p>`,
  "Échauffe-toi en mouvement": `<p>Le dynamique élève la température et « répète » les gestes à venir. Les étirements statiques longs se gardent pour après : avant une perf, ils peuvent réduire la force de 5 à 10 %.</p>`,

  // ===== DÉTAILS — NUTRITION =====
  "Le petit-déjeuner n'est pas sacré": `<p>Le jeûne intermittent marche surtout parce qu'il réduit la fenêtre où l'on mange, donc le total — pas par magie métabolique. Ce qui compte reste l'apport global et la satiété sur 24 h.</p>`,
  "Les calories liquides": `<p>Le corps compense mal ce qu'on boit : un jus fait grimper la glycémie sans le rassasiement des fibres du fruit entier. Remplacer les boissons sucrées par de l'eau est souvent le changement le plus rentable.</p>`,
  "Se rassasier par le volume": `<p>Concept de densité calorique : à volume égal, une assiette de légumes et protéines rassasie pour bien moins de calories qu'un plat gras. On mange à sa faim tout en étant en déficit — la clé de la tenue.</p>`,
  "L'alcool vole ton sommeil": `<p>L'alcool fragmente le sommeil paradoxal et provoque des micro-réveils en 2e moitié de nuit, quand il est métabolisé. On s'endort plus vite mais on récupère moins : fatigue malgré une nuit « complète ».</p>`,
  "« Zéro calorie » ≠ zéro effet": `<p>Les données sont contrastées : certains édulcorants modifient le microbiote et la réponse au sucre chez une partie des gens. Utiles pour réduire le sucre, mais l'idéal est de rééduquer le goût vers moins sucré.</p>`,

  // ===== DÉTAILS — GÉOPOLITIQUE =====
  "Le piège de Thucydide": `<p>Graham Allison a recensé 16 cas de puissance montante contre établie : 12 ont fini en guerre. Les 4 exceptions (dont la Guerre froide) montrent que l'éviter est possible, mais demande une gestion active et lucide.</p>`,
  "Le heartland de Mackinder": `<p>Spykman lui a répliqué avec le « rimland » (les côtes). Ensemble, elles éclairent pourquoi les puissances continentales cherchent des accès aux mers chaudes, et pourquoi l'Eurasie obsède les stratèges.</p>`,
  "Le dollar comme arme": `<p>Le levier passe par la compensation en dollars et les messageries interbancaires : être coupé du dollar isole du commerce mondial. Effet secondaire : ces sanctions poussent certains à chercher des alternatives (dédollarisation).</p>`,
  "La démographie, destin lent": `<p>Une population qui vieillit voit sa croissance ralentir et ses retraites exploser — quasi impossible à inverser vite (une politique nataliste met 20 ans à produire des actifs). D'où le poids de l'immigration et de la productivité.</p>`,
  "Mer contre terre": `<p>Distinction de Carl Schmitt : la puissance maritime valorise commerce, liberté des mers et alliances souples ; la terrestre, territoire, profondeur et contrôle. Beaucoup de conflits opposent ces deux logiques.</p>`,
  "Résilience contre efficacité": `<p>Le juste-à-temps minimise les stocks : génial en temps calme, catastrophique lors d'un choc (pandémie, blocage d'un détroit). Le balancier repart vers relocalisation, stocks stratégiques et diversification des fournisseurs.</p>`,

  // ===== DÉTAILS — TECHNIQUES =====
  "Limiter le travail en cours": `<p>Cœur de la méthode Kanban : plafonner le nombre de tâches « en cours ». Résultat contre-intuitif : en démarrant moins de choses, on en finit plus, car on cesse de payer le coût des changements de contexte.</p>`,
  "Le pré-mortem": `<p>Technique de Gary Klein : annoncer « le projet a échoué, imaginez pourquoi » libère la parole que l'optimisme ambiant étouffe. On repère des risques qu'un « des objections ? » n'aurait jamais fait sortir.</p>`,
  "Réversible ou pas ?": `<p>Bezos parle de portes « à sens unique » (irréversibles, à instruire lourdement) et « à double sens » (réversibles, à décider vite). L'erreur des grandes structures : traiter les secondes comme les premières, et se scléroser.</p>`,
  "La règle 10/10/10": `<p>Le « 10 minutes » calme la panique, le « 10 mois » teste la vraie importance, le « 10 ans » recentre sur les valeurs. Trois horizons pour dégonfler l'émotion du moment — simple, portable, redoutable.</p>`,
  "Grouper les interruptions": `<p>Le coût caché est le « switching cost » : jusqu'à 20 min pour retrouver la concentration profonde après une interruption. Traiter les mails en 2-3 plages fixes, notifications coupées, protège les heures de vraie valeur.</p>`,
  "La to-do en calendrier": `<p>Le time-blocking (Cal Newport) transforme les intentions en rendez-vous. Complété de blocs tampons pour l'imprévu, il révèle une vérité utile : on a bien moins d'heures productives par jour qu'on ne le croit.</p>`,

  // ===== DÉTAILS — INGÉNIERIE & MER =====
  "Le zéro hydrographique": `<p>Le zéro des cartes est le plus bas niveau de marée astronomique, pour la sécurité : on est sûr d'avoir au moins la profondeur indiquée. Relier ce zéro au système terrestre (géoïde) via le GNSS est un enjeu majeur des levés modernes.</p>`,
  "La centrale inertielle (IMU)": `<p>Couplée au GNSS, elle forme un système INS/GNSS : le GNSS recale la dérive lente de l'inertiel, l'inertiel comble les trous du GNSS (sous un pont). Ce mariage donne une trajectoire continue malgré la houle.</p>`,
  "La fusion de capteurs": `<p>Le filtre de Kalman est l'outil roi : il pondère chaque capteur selon son incertitude et produit une estimation optimale. Le même principe guide un drone, une voiture autonome ou un sondeur.</p>`,
  "La marée est prévisible": `<p>On extrait du marégramme les « constantes harmoniques » (amplitude et phase de chaque onde) pour prédire la marée des années à l'avance. Mais la météo ajoute une « surcote » imprévisible, cruciale pour les alertes submersion.</p>`,
  "Le LiDAR bathymétrique": `<p>Deux lasers : un infrarouge sur la surface, un vert qui pénètre l'eau ; l'écart de temps donne la profondeur. Limité par la turbidité, il est imbattable pour cartographier vite de grands linéaires côtiers peu profonds.</p>`,
  "La couche SIG": `<p>Sa force est l'analyse spatiale : croiser bathymétrie, nature des fonds, courants et réglementation pour choisir un tracé de câble ou une zone de dragage. La donnée devient un outil de décision, pas juste une belle carte.</p>`,

  // ===== DÉTAILS — INVESTISSEMENT =====
  "Les intérêts composés": `<p>La « règle de 72 » : 72 ÷ rendement annuel donne le nombre d'années pour doubler (à 8 %, ~9 ans). Le vrai levier n'est pas le taux mais la durée — d'où l'avantage écrasant de commencer tôt et de ne pas interrompre.</p>`,
  "Le risque n'est pas la volatilité": `<p>Pour un investisseur long terme, la volatilité est même une amie : elle offre des points d'entrée bon marché. Le risque réel est la perte définitive (faillite, dilution, achat trop cher). Les confondre fait vendre en panique.</p>`,
  "La marge de sécurité": `<p>Cœur du « value investing » (Graham, maître de Buffett). Payer 60 centimes ce qu'on estime valoir 1 € protège de l'erreur d'analyse et de la malchance. Plus l'incertitude est grande, plus la marge exigée doit l'être.</p>`,
  "Le lissage (DCA)": `<p>Le DCA n'optimise pas le rendement (tout investir d'un coup bat statistiquement l'étalement), mais le comportement : il retire la peur de « mal timer ». Le meilleur plan est celui que l'on tiendra dans la durée.</p>`,
  "La diversification": `<p>La vraie diversification joue sur des actifs qui réagissent différemment aux mêmes chocs. Attention : en crise majeure, les corrélations tendent vers 1 (tout baisse ensemble) — elle protège du risque ordinaire, moins du cataclysme.</p>`,
  "Le biais de survie des palmarès": `<p>Les indices « nettoient » les faillites : une action à −100 % sort de l'indice, embellissant l'historique. Idem pour les fonds : ceux qui ferment disparaissent des classements, gonflant la moyenne des survivants.</p>`,
  "Value ou growth ?": `<p>La value achète des actifs décotés, la growth paie cher une croissance future. Taux bas → avantage growth (les flux lointains valent plus) ; taux hauts → avantage value. D'où l'utilité d'un cadre macro pour savoir quel régime domine.</p>`,

  // ===== DÉTAILS — STRATÉGIE & PI =====
  "Les 5 forces de Porter": `<p>L'analyse révèle où va le profit : un marché à fournisseurs puissants (terres rares) ou clients dominants (grande distribution) laisse peu de marge, même bien géré. On choisit son secteur autant qu'on y joue.</p>`,
  "L'océan bleu": `<p>Kim & Mauborgne : redéfinir le marché plutôt que d'y livrer bataille (le Cirque du Soleil, ni cirque ni théâtre). Le risque : un océan bleu qui marche rougit vite avec les imitateurs — d'où l'importance d'un moat derrière.</p>`,
  "La liberté d'exploitation (FTO)": `<p>Avant un lancement, l'analyse FTO vérifie qu'on n'enfreint pas de brevets tiers en vigueur — distinct de la brevetabilité de sa propre invention. La négliger expose à des injonctions après avoir tout investi.</p>`,
  "Le secret d'affaires": `<p>Sa protection dépend de mesures concrètes (accès restreint, NDA, marquage) : sans elles, aucune défense juridique. Idéal pour ce qui est dur à rétro-concevoir (procédés) ; risqué pour ce qui se lit dans le produit fini.</p>`,
  "La licence croisée": `<p>Fréquente en électronique, où un produit touche des milliers de brevets concurrents : plutôt que de se paralyser en procès, on échange des droits. Les « patent pools » mutualisent des portefeuilles autour d'un standard.</p>`,

  // ===== DÉTAILS — ENDURANCE =====
  "Le mur du marathon": `<p>Le corps stocke ~90 min à 2 h de glycogène à l'allure course. On repousse le mur en s'entraînant à « courir sur les graisses » (sorties longues lentes) et en s'alimentant pendant l'effort (~60-90 g de glucides/h).</p>`,
  "L'affûtage (tapering)": `<p>On réduit le volume de 40 à 60 % sur 1 à 3 semaines, en gardant un peu d'intensité pour ne pas « s'endormir ». La fatigue se dissipe plus vite que la condition acquise — d'où le gain paradoxal en s'entraînant moins.</p>`,
  "Le pacing négatif": `<p>Partir 5-10 s/km trop vite au marathon peut coûter plusieurs minutes en fin de course. Discipline mentale : les premiers kilomètres qui semblent trop lents sont souvent la bonne allure.</p>`,
  "Les transitions comptent": `<p>Sur un triathlon, mal préparé on perd 1 à 2 min en T1/T2 — parfois plus que l'écart final. On les répète à l'entraînement (« brick sessions ») pour habituer le corps au changement de sollicitation.</p>`,
  "La périodisation": `<p>Modèle classique : base (volume, zone 2), phase spécifique (seuil, allure course), affûtage, récupération. La surcompensation guide le tout : alterner charge et repos pour monter par paliers plutôt que plafonner ou casser.</p>`,

  // ===== DÉTAILS — MOTO =====
  "Le regard porte la moto": `<p>On entraîne le regard qui anticipe : viser le point de corde, puis déjà la sortie. En urgence, forcer les yeux vers l'échappatoire (jamais vers l'obstacle) est ce qui sauve — le corps suit littéralement le regard.</p>`,
  "Le point de corde": `<p>La trajectoire de sécurité diffère de celle de vitesse : on retarde le point de corde pour ouvrir la visibilité et garder une marge si le virage se referme ou si un véhicule arrive en face. Voir loin prime sur passer vite.</p>`,
  "L'adhérence est un budget": `<p>C'est le « cercle d'adhérence » : freinage + virage + accélération ne peuvent dépasser le grip disponible. D'où le « trail braking » : relâcher progressivement le frein en entrant dans l'angle, pour ne jamais tout demander d'un coup.</p>`,
  "Le frein moteur": `<p>Rétrograder ralentit sans user les plaquettes et garde le moteur dans sa plage de puissance pour ré-accélérer. Sur route glissante, un frein moteur brutal peut faire déraper l'arrière — d'où l'utilité de l'embrayage anti-dribble.</p>`,

  // ===== DÉTAILS — HISTOIRE MILITAIRE =====
  "La logistique gagne les guerres": `<p>Napoléon en Russie, Rommel privé de carburant : de brillantes manœuvres brisées par l'intendance. Dans une armée moderne, le ratio soutien/combattants est énorme : pour un soldat au front, plusieurs le ravitaillent à l'arrière.</p>`,
  "Le brouillard de la guerre": `<p>Clausewitz y ajoute la « friction » : mille imprévus (météo, ordres mal transmis, fatigue) qui compliquent même le plan simple. D'où l'intérêt d'une intention claire (« Auftragstaktik ») plutôt que d'ordres rigides.</p>`,
  "La concentration des forces": `<p>Le « Schwerpunkt » allemand : masser l'effort sur un point de rupture plutôt que défendre partout également. En entreprise comme à la guerre, vouloir être fort partout, c'est être faible partout.</p>`,
  "La dissuasion": `<p>Elle repose sur la crédibilité : l'adversaire doit croire à ta capacité ET à ta volonté de répondre. La « destruction mutuelle assurée » en est la forme extrême ; la même logique vaut pour une réputation prête à défendre ses brevets.</p>`,
  "Le renseignement renverse tout": `<p>Enigma aurait raccourci la guerre de deux ans. Mais l'exploiter trop visiblement révèle qu'on « lit » l'ennemi. Savoir est puissant ; savoir sans le montrer est décisif.</p>`,
  "Usure ou mouvement": `<p>Verdun (usure, saigner l'ennemi) contre la Blitzkrieg (mouvement, paralyser par la vitesse). Le faible en nombre cherche la manœuvre ; le fort en ressources peut se permettre l'usure. Le choix dépend du rapport de force.</p>`,

  // ===== DÉTAILS — ENTREPRENEURIAT =====
  "Le product-market fit": `<p>Signaux : les clients reviennent, en parlent spontanément, et tu peines à suivre la demande. Test de Sean Ellis : si plus de 40 % des utilisateurs seraient « très déçus » de le perdre, tu tiens probablement ton fit.</p>`,
  "CAC contre LTV": `<p>Règle de pouce (SaaS) : un ratio LTV/CAC d'environ 3, un CAC remboursé en moins de 12 mois. En dessous, on brûle du cash à chaque client. Le CAC doit inclure TOUT le marketing et les ventes, pas juste la pub.</p>`,
  "Le runway": `<p>Runway = trésorerie ÷ burn mensuel. On lève quand il reste 6 à 12 mois, car une levée prend des mois et un cash faible affaiblit la négociation. Le connaître au mois près est un réflexe de survie.</p>`,
  "Parler aux clients d'abord": `<p>Méthode « customer development » (Steve Blank) : sortir tester le problème avant la solution. Beaucoup d'échecs ne sont pas des ratés d'exécution, mais des produits parfaits pour un besoin qui n'existait pas.</p>`,
  "Qui tranche ?": `<p>La gouvernance floue (co-fondateurs 50/50 sans départage) est une cause classique de blocage mortel. Mieux vaut un décideur clair par domaine et un pacte d'associés prévoyant les cas de conflit dès le départ.</p>`,
  "La dilution": `<p>À chaque tour, les fondateurs cèdent souvent 15-25 %. Ce qui compte est la valeur absolue de sa part, pas le pourcentage : 10 % d'une licorne battent 80 % d'une PME atone. La dilution est saine tant que le capital crée plus de valeur qu'il n'en dilue.</p>`,
};

    why:"En ce moment, des petits robots s'y promènent pour l'explorer à notre place." },
  { cat:"Espace", titre:"Saturne pourrait flotter",
    corps:`<p>Saturne est si légère pour sa taille énorme que, s'il existait une baignoire géante, elle <strong>flotterait</strong> sur l'eau !</p>`,
    why:"Ses magnifiques anneaux sont faits de milliards de morceaux de glace." },
  { cat:"Espace", titre:"On peut écouter l'espace",
    corps:`<p>Dans l'espace, tout est silencieux. Mais des instruments captent des ondes invisibles qu'on transforme en sons rigolos.</p>`,
    why:"Chaque planète a un peu sa « chanson » quand on écoute ses ondes." },

  // ---------- LE CORPS ----------
  { cat:"Le corps", titre:"Ton cœur ne s'arrête jamais",
    corps:`<p>Ton cœur bat environ <strong>100 000 fois par jour</strong>, sans jamais faire de pause pour se reposer !</p>`,
    why:"C'est un muscle qui pompe le sang dans tout ton corps, le jour comme la nuit." },
  { cat:"Le corps", titre:"Tu perds ta peau tout le temps",
    corps:`<p>Ta peau se renouvelle sans arrêt : tu perds des millions de minuscules cellules chaque jour, et une neuve pousse en dessous.</p>`,
    why:"Une bonne partie de la poussière de la maison, c'est de la vieille peau ! Un peu dégoûtant, non ?" },
  { cat:"Le corps", titre:"Le ventre qui gargouille",
    corps:`<p>Quand ton ventre fait du bruit, c'est de l'air et du jus qui se promènent dans tes intestins. Ça arrive même sans avoir faim.</p>`,
    why:"Ce petit concert porte un nom rigolo : les « borborygmes » ! Essaie de le dire vite." },
  { cat:"Le corps", titre:"Plus grand le matin",
    corps:`<p>En dormant allongé, ton dos se détend : tu es quelques millimètres <strong>plus grand</strong> au réveil qu'au coucher !</p>`,
    why:"Dans la journée, ton corps se tasse tout doucement à cause de ton poids." },
  { cat:"Le corps", titre:"Le rire te fait du bien",
    corps:`<p>Rire fait travailler plein de muscles et envoie des messages « je suis heureux » dans ton cerveau.</p>`,
    why:"Les enfants rient beaucoup plus souvent dans une journée que les grandes personnes !" },

  // ---------- NATURE ----------
  { cat:"Nature", titre:"Le volcan, cheminée de la Terre",
    corps:`<p>Sous nos pieds, la Terre est brûlante. Un volcan, c'est comme une <strong>cheminée</strong> qui laisse sortir la roche fondue.</p>`,
    why:"Certaines îles, comme La Réunion, sont nées d'un volcan !" },
  { cat:"Nature", titre:"La foudre plus chaude que le Soleil",
    corps:`<p>Un éclair est si puissant que l'air qu'il traverse devient, un instant, <strong>plus chaud</strong> que la surface du Soleil !</p>`,
    why:"Le tonnerre, c'est le bruit de l'air qui explose sur le passage de l'éclair." },
  { cat:"Nature", titre:"Chaque flocon est unique",
    corps:`<p>Chaque flocon de neige a six branches, et il n'y en a jamais deux exactement pareils au monde.</p>`,
    why:"Il se forme tout là-haut dans les nuages, en gelant autour d'un grain de poussière." },
  { cat:"Nature", titre:"Le sable, ce sont des mini-cailloux",
    corps:`<p>Le sable des plages, ce sont des roches et des coquillages cassés en tout petits morceaux par la mer.</p>`,
    why:"Il faut parfois des milliers d'années à la mer pour fabriquer une seule plage !" },
  { cat:"Nature", titre:"Les plantes mangent la lumière",
    corps:`<p>Les plantes fabriquent leur nourriture avec la lumière du soleil, l'eau et l'air. Ça s'appelle la photosynthèse.</p>`,
    why:"En même temps, elles fabriquent l'oxygène qu'on respire. Merci les plantes !" },

  // ---------- SCIENCES RIGOLOTES ----------
  { cat:"Sciences rigolotes", titre:"Pourquoi la glace flotte",
    corps:`<p>Quand l'eau gèle, elle prend plus de place et devient plus légère : c'est pour ça que les glaçons <strong>flottent</strong> dans ton verre.</p>`,
    why:"Grâce à ça, les poissons peuvent continuer à vivre sous la glace des lacs en hiver." },
  { cat:"Sciences rigolotes", titre:"L'écho qui revient",
    corps:`<p>Quand tu cries face à une montagne, le son rebondit dessus et te revient : c'est l'écho !</p>`,
    why:"Les chauves-souris s'en servent pour « voir » dans le noir avec leurs oreilles." },
  { cat:"Sciences rigolotes", titre:"Les aimants magiques",
    corps:`<p>Deux aimants peuvent se coller très fort… ou se repousser, sans même se toucher, comme une force invisible.</p>`,
    why:"La Terre est un immense aimant : c'est pour ça que l'aiguille de la boussole trouve le nord." },
  { cat:"Sciences rigolotes", titre:"Les bulles sont toujours rondes",
    corps:`<p>Une bulle de savon est toujours une <strong>boule</strong>, jamais un carré : c'est la forme la plus simple pour enfermer de l'air.</p>`,
    why:"La nature adore les formes économiques, celles qui demandent le moins d'effort." },
  { cat:"Sciences rigolotes", titre:"L'eau est bleue en grand",
    corps:`<p>Un verre d'eau est transparent, mais l'océan est bleu : quand il y a beaucoup d'eau, elle garde surtout la couleur bleue.</p>`,
    why:"Plus on descend profond dans la mer, plus il fait sombre : le rouge disparaît en premier." },

  // ---------- ÉMOTIONS ----------
  { cat:"Émotions", titre:"La peur est une alarme",
    corps:`<p>La peur n'est pas ton ennemie : c'est une <strong>alarme</strong> qui veut te protéger des dangers. Parfois elle se trompe, mais elle veut t'aider.</p>`,
    why:"Respirer lentement dit à ton corps : « le danger est passé, on se calme »." },
  { cat:"Émotions", titre:"La jalousie, ça se parle",
    corps:`<p>Se sentir jaloux, ça arrive à tout le monde. Ce n'est pas être méchant : c'est juste le signe qu'on aimerait quelque chose.</p>`,
    why:"En parler à quelqu'un de confiance fait presque toujours du bien." },
  { cat:"Émotions", titre:"Dire ce qu'on ressent",
    corps:`<p>Dire « je suis triste » ou « je suis content », c'est comme ouvrir une fenêtre : ça aère l'intérieur de toi.</p>`,
    why:"Et les câlins font fabriquer une vraie « potion du bonheur » dans le cerveau !" },
  { cat:"Émotions", titre:"L'ennui sert à inventer",
    corps:`<p>S'ennuyer n'est pas grave du tout : c'est souvent quand on s'ennuie qu'on a les <strong>meilleures idées</strong> de jeux !</p>`,
    why:"Ton cerveau adore inventer quand on lui laisse un peu de vide." },

  // ===== LOT 3 : ENFANTS =====
  // ---------- ANIMAUX ----------
  { cat:"Animaux", titre:"Le crocodile et sa langue collée",
    corps:`<p>Le crocodile ne peut pas <strong>tirer la langue</strong> : elle est collée au fond de sa bouche !</p>`,
    why:"Et ses dents repoussent toute sa vie : il en use jusqu'à 3000 en tout !" },
  { cat:"Animaux", titre:"L'étoile de mer sans cerveau",
    corps:`<p>L'étoile de mer n'a ni cerveau ni sang ! Elle se déplace grâce à de l'eau de mer qui circule dans son corps.</p>`,
    why:"Si elle perd un bras, il repousse — et parfois le bras coupé fabrique une nouvelle étoile !" },
  { cat:"Animaux", titre:"Le kangourou ne recule pas",
    corps:`<p>Le kangourou ne sait pas marcher en <strong>arrière</strong> : ses grandes pattes et sa grosse queue l'en empêchent.</p>`,
    why:"Il se sert de sa queue comme d'une troisième patte pour tenir en équilibre." },
  { cat:"Animaux", titre:"L'escargot aux milliers de dents",
    corps:`<p>L'escargot a une petite langue râpeuse couverte de <strong>milliers de minuscules dents</strong> pour grignoter les feuilles !</p>`,
    why:"Il avance en glissant sur sa bave, qui l'empêche de se blesser sur le sol." },
  { cat:"Animaux", titre:"Le chat qui ronronne",
    corps:`<p>Quand un chat ronronne, il fait de toutes petites vibrations qui l'aident à se sentir bien, et même à guérir plus vite.</p>`,
    why:"Un chat dort environ 15 heures par jour : presque toute la journée !" },
  { cat:"Animaux", titre:"La grenouille boit par la peau",
    corps:`<p>La grenouille ne boit pas avec sa bouche : elle absorbe l'eau directement <strong>par sa peau</strong> !</p>`,
    why:"Elle peut aussi respirer un peu par la peau, en plus de ses poumons." },

  // ---------- ESPACE ----------
  { cat:"Espace", titre:"Il pleut des diamants",
    corps:`<p>Sur les planètes Neptune et Uranus, les scientifiques pensent qu'il pleut… de minuscules <strong>diamants</strong> !</p>`,
    why:"C'est l'énorme pression qui transforme le carbone en diamant, comme une machine géante." },
  { cat:"Espace", titre:"Sauter comme un super-héros",
    corps:`<p>Sur la Lune, tu pèses 6 fois moins que sur Terre : tu pourrais sauter super haut, comme un super-héros !</p>`,
    why:"C'est parce que la Lune est plus petite et t'attire moins fort que la Terre." },
  { cat:"Espace", titre:"Le Soleil que tu vois est en retard",
    corps:`<p>La lumière du Soleil met environ <strong>8 minutes</strong> à arriver jusqu'à toi.</p>`,
    why:"Donc tu vois toujours le Soleil tel qu'il était il y a 8 minutes !" },
  { cat:"Espace", titre:"Plus d'étoiles que de sable",
    corps:`<p>Dans le ciel, il y a plus d'étoiles que de grains de sable sur toutes les plages de la Terre réunies.</p>`,
    why:"Et notre Soleil n'est qu'une toute petite étoile parmi toutes celles-là." },
  { cat:"Espace", titre:"Jupiter, la planète géante",
    corps:`<p>Jupiter est si grande qu'on pourrait ranger <strong>toutes les autres planètes</strong> à l'intérieur !</p>`,
    why:"Elle a une tempête plus grande que la Terre entière, qui dure depuis des centaines d'années." },
  { cat:"Espace", titre:"Pourquoi la Lune change de forme",
    corps:`<p>La Lune semble changer de forme — croissant, demi, toute ronde — selon la façon dont le Soleil l'éclaire.</p>`,
    why:"Elle ne change pas vraiment : c'est juste la partie éclairée qu'on voit qui change." },

  // ---------- LE CORPS ----------
  { cat:"Le corps", titre:"Tes empreintes sont uniques",
    corps:`<p>Personne au monde n'a les mêmes <strong>empreintes de doigts</strong> que toi — pas même de vrais jumeaux !</p>`,
    why:"Elles se forment avant ta naissance et ne changent jamais de toute ta vie." },
  { cat:"Le corps", titre:"Tu clignes sans même y penser",
    corps:`<p>Tu clignes des yeux environ 15 à 20 fois par minute, sans t'en rendre compte !</p>`,
    why:"Ça nettoie et humidifie tes yeux, comme de petits essuie-glaces." },
  { cat:"Le corps", titre:"L'acide magique de l'estomac",
    corps:`<p>Ton estomac contient un acide si puissant qu'il fabrique une nouvelle paroi tous les quelques jours pour ne pas se digérer lui-même !</p>`,
    why:"C'est cet acide qui découpe la nourriture en tout petits morceaux." },
  { cat:"Le corps", titre:"Des milliards d'amies dans ton ventre",
    corps:`<p>Dans ton ventre vivent des milliards de minuscules <strong>bactéries gentilles</strong> qui t'aident à digérer.</p>`,
    why:"Manger des fruits et des légumes, c'est leur donner à manger à elles aussi !" },
  { cat:"Le corps", titre:"Le goût passe par le nez",
    corps:`<p>Ta langue reconnaît le sucré, le salé, l'acide et l'amer. Mais c'est surtout ton <strong>nez</strong> qui te fait sentir le vrai goût.</p>`,
    why:"Bouche-toi le nez en mangeant un bonbon : il a beaucoup moins de goût !" },
  { cat:"Le corps", titre:"Le cerveau ne sent pas la douleur",
    corps:`<p>Ton cerveau commande tout ton corps… mais lui-même ne ressent aucune douleur !</p>`,
    why:"Il reçoit les messages de « bobo » des autres parties du corps, mais pas pour lui." },

  // ---------- NATURE ----------
  { cat:"Nature", titre:"L'océan fabrique l'air",
    corps:`<p>La plupart de l'oxygène qu'on respire vient de <strong>minuscules plantes de l'océan</strong>, pas seulement des arbres !</p>`,
    why:"On dit parfois que l'océan est le plus grand poumon de la planète." },
  { cat:"Nature", titre:"L'eau voyage en rond",
    corps:`<p>L'eau de ta douche a peut-être déjà été un nuage, une rivière… ou bue par un dinosaure ! Elle voyage en rond, pour toujours.</p>`,
    why:"C'est le cycle de l'eau : elle s'évapore, forme des nuages, retombe en pluie, sans fin." },
  { cat:"Nature", titre:"Le désert gèle la nuit",
    corps:`<p>Dans certains déserts brûlants le jour, il peut faire <strong>très froid la nuit</strong>, parfois en dessous de zéro !</p>`,
    why:"Sans nuages pour garder la chaleur, elle s'échappe très vite une fois le soleil couché." },
  { cat:"Nature", titre:"La montagne cachée sous la mer",
    corps:`<p>La plus haute montagne du monde, mesurée depuis sa base, est en réalité cachée sous l'océan, à Hawaï !</p>`,
    why:"On ne voit que son sommet qui dépasse un peu de l'eau." },
  { cat:"Nature", titre:"D'où vient le vent",
    corps:`<p>Le vent, c'est simplement de l'<strong>air qui se déplace</strong> d'un endroit à un autre.</p>`,
    why:"L'air chaud monte, l'air froid vient prendre sa place : et hop, ça fait du vent !" },
  { cat:"Nature", titre:"Les racines aussi grandes que l'arbre",
    corps:`<p>Sous la terre, les racines d'un arbre peuvent être presque aussi grandes que l'arbre au-dessus !</p>`,
    why:"Elles cherchent l'eau et tiennent l'arbre bien accroché, même dans les tempêtes." },

  // ---------- SCIENCES RIGOLOTES ----------
  { cat:"Sciences rigolotes", titre:"Le nuage devant ta bouche",
    corps:`<p>Quand il fait froid, ton souffle chaud se transforme en petit <strong>nuage de vapeur</strong> en sortant de ta bouche.</p>`,
    why:"C'est exactement ce qui forme les nuages dans le ciel, en beaucoup plus petit." },
  { cat:"Sciences rigolotes", titre:"Le sel qui fait fondre la glace",
    corps:`<p>On met du sel sur les routes gelées parce que le sel aide la glace à <strong>fondre</strong> plus vite.</p>`,
    why:"Le sel empêche l'eau de rester bien gelée. Maligne, cette astuce !" },
  { cat:"Sciences rigolotes", titre:"Pourquoi un bateau flotte",
    corps:`<p>Un gros bateau en métal flotte, alors qu'un petit caillou coule. Ce qui compte, c'est la forme et l'air à l'intérieur !</p>`,
    why:"Un bateau est plein d'air : ça l'aide à rester à la surface de l'eau." },
  { cat:"Sciences rigolotes", titre:"Fabriquer toutes les couleurs",
    corps:`<p>Avec seulement du rouge, du bleu et du jaune, on peut fabriquer presque <strong>toutes</strong> les autres couleurs !</p>`,
    why:"Bleu + jaune = vert, rouge + bleu = violet. Essaie avec de la peinture !" },
  { cat:"Sciences rigolotes", titre:"Ton ombre, de la lumière bloquée",
    corps:`<p>Ton ombre apparaît quand ton corps empêche la lumière de passer.</p>`,
    why:"Le matin et le soir, ton ombre est très longue parce que le soleil est tout bas." },
  { cat:"Sciences rigolotes", titre:"L'éclair avant le tonnerre",
    corps:`<p>Pendant l'orage, tu vois l'éclair, puis tu entends le tonnerre un peu après.</p>`,
    why:"La lumière va plus vite que le son : compte les secondes pour savoir si l'orage est loin !" },

  // ---------- ÉMOTIONS ----------
  { cat:"Émotions", titre:"Respirer comme un ballon",
    corps:`<p>Quand tout va trop vite dans ta tête, gonfle ton ventre comme un <strong>ballon</strong> en respirant, puis dégonfle tout doucement.</p>`,
    why:"Ça envoie un message « on se calme » à tout ton corps. Essaie trois fois de suite." },
  { cat:"Émotions", titre:"Les émotions, c'est comme la météo",
    corps:`<p>Joie, colère, tristesse, peur : toutes les émotions sont normales et utiles, même celles qu'on n'aime pas.</p>`,
    why:"Elles sont comme la météo : elles arrivent, puis elles finissent toujours par repartir." },
  { cat:"Émotions", titre:"Le courage, c'est y aller quand même",
    corps:`<p>Être courageux ne veut pas dire ne pas avoir peur : c'est avoir peur… et <strong>essayer quand même</strong>.</p>`,
    why:"Tout le monde a peur parfois, même les héros de tes histoires préférées." },
  { cat:"Émotions", titre:"Aider rend heureux",
    corps:`<p>Rendre service ou consoler un copain, ça fabrique de la bonne humeur… dans TON cerveau aussi !</p>`,
    why:"La gentillesse, c'est un cadeau qu'on se fait un peu à soi-même en même temps." },
  { cat:"Émotions", titre:"Se tromper, c'est apprendre",
    corps:`<p>Chaque erreur t'apprend quelque chose. Les gens qui réussissent se sont trompés plein de fois avant !</p>`,
    why:"Le cerveau apprend surtout de ses erreurs, pas des choses faciles réussies du premier coup." },
  { cat:"Émotions", titre:"Attendre avant d'agir fâché",
    corps:`<p>Quand tu es très fâché, attends un petit peu avant de parler ou d'agir.</p>`,
    why:"La grosse vague de colère redescend, et ensuite on prend de bien meilleures décisions." },

  // ===== LOT 4 : ENFANTS =====
  { cat:"Animaux", titre:"L'hippopotame transpire rose",
    corps:`<p>L'hippopotame fabrique une drôle de sueur rouge-rose qui le protège du soleil, comme une <strong>crème solaire</strong> naturelle !</p>`,
    why:"Malgré son air tranquille, c'est l'un des animaux les plus costauds d'Afrique." },
  { cat:"Animaux", titre:"Le hibou tourne la tête très loin",
    corps:`<p>Le hibou peut tourner sa tête presque complètement pour regarder derrière lui, <strong>sans bouger le corps</strong> !</p>`,
    why:"Ses yeux sont si gros qu'ils ne peuvent pas bouger : alors c'est toute la tête qui tourne." },
  { cat:"Espace", titre:"La Terre tourne très vite",
    corps:`<p>En ce moment, la Terre tourne sur elle-même — et toi avec — à toute vitesse, mais tu ne le sens pas du tout !</p>`,
    why:"C'est cette rotation qui fabrique le jour et la nuit." },
  { cat:"Espace", titre:"Les combinaisons blanches",
    corps:`<p>Les combinaisons des astronautes sont <strong>blanches</strong> pour renvoyer la lumière du Soleil et ne pas avoir trop chaud.</p>`,
    why:"Dans l'espace, au soleil il fait une chaleur énorme, et à l'ombre un froid glacial." },
  { cat:"Le corps", titre:"Pourquoi tu éternues",
    corps:`<p>Un éternuement, c'est ton nez qui expulse très fort ce qui le chatouille : poussière, poivre, pollen !</p>`,
    why:"L'air d'un éternuement sort plus vite qu'une voiture sur l'autoroute !" },
  { cat:"Le corps", titre:"Tes muscles pour sourire",
    corps:`<p>Il faut plein de petits muscles qui travaillent ensemble pour faire un grand <strong>sourire</strong> !</p>`,
    why:"Sourire, même quand ça ne va pas trop fort, aide un peu ton cerveau à se sentir mieux." },
  { cat:"Nature", titre:"Les nuages sont lourds",
    corps:`<p>Un gros nuage blanc peut peser aussi lourd qu'une <strong>centaine d'éléphants</strong> — et pourtant il flotte !</p>`,
    why:"L'eau y est en toutes petites gouttes légères qui restent en l'air." },
  { cat:"Nature", titre:"L'abeille et la fleur, une équipe",
    corps:`<p>En cherchant à manger, l'abeille transporte du pollen d'une fleur à l'autre et aide les plantes à faire des <strong>fruits</strong> !</p>`,
    why:"Sans les abeilles, on aurait beaucoup moins de fruits à manger." },
  { cat:"Sciences rigolotes", titre:"Le savon chasse le gras",
    corps:`<p>Le savon aide à décoller la saleté et le gras de tes mains pour qu'ils partent avec l'eau.</p>`,
    why:"C'est pour ça qu'on se lave bien mieux avec du savon qu'avec de l'eau toute seule." },
  { cat:"Sciences rigolotes", titre:"Pourquoi la Lune nous suit",
    corps:`<p>En voiture, on a l'impression que la Lune nous <strong>suit</strong>… mais elle est juste très, très loin !</p>`,
    why:"Les choses lointaines semblent bouger avec nous, alors que les arbres proches défilent vite." },
  { cat:"Émotions", titre:"Un câlin, ça soigne un peu",
    corps:`<p>Faire un câlin à quelqu'un qu'on aime envoie une petite <strong>potion de réconfort</strong> dans le corps.</p>`,
    why:"C'est pour ça qu'un câlin fait tellement de bien quand on a un chagrin." },
  { cat:"Émotions", titre:"Dire merci rend joyeux",
    corps:`<p>Penser à ce qui est chouette dans ta journée et dire <strong>merci</strong> te rend un peu plus heureux.</p>`,
    why:"Le soir, essaie de retrouver 3 choses agréables de ta journée." },
];
const DETAILS_ENFANT = {
  "Le poulpe a trois cœurs": `<p>Le poulpe est un vrai petit génie ! Il sait ouvrir des bocaux, sortir de labyrinthes, et même reconnaître les personnes qui s'occupent de lui.</p>
    <p>Ses huit bras sont couverts de ventouses qui goûtent ce qu'elles touchent. Un peu comme si tu avais la langue au bout des doigts !</p>`,

  "Les manchots offrent des cailloux": `<p>Pour ne pas avoir froid, des centaines de manchots se serrent en un énorme câlin géant. Chacun va à son tour au milieu, bien au chaud, puis laisse la place à un autre.</p>
    <p>Et ils se reconnaissent rien qu'au son de leur voix, même au milieu de milliers d'amis !</p>`,

  "La fourmi super forte": `<p>Les fourmis se parlent avec des odeurs ! Elles laissent une trace parfumée sur le sol pour dire aux autres : « par ici, il y a à manger ! »</p>
    <p>Certaines fourmis élèvent même de tout petits pucerons, comme nous élevons des vaches, pour récolter leur jus sucré.</p>`,

  "On ne peut pas crier dans l'espace": `<p>Dans l'espace, il fait super froid et il n'y a pas d'air à respirer. C'est pour ça que les astronautes portent une combinaison spéciale, comme une petite maison autour d'eux.</p>
    <p>Leur casque leur donne de l'air et les protège du Soleil, qui brille très fort là-haut.</p>`,

  "La Lune s'en va tout doucement": `<p>C'est la Lune qui fait bouger la mer ! Elle attire l'eau des océans, et ça fait monter puis descendre la mer chaque jour : les marées.</p>
    <p>Douze personnes ont déjà marché sur la Lune. Leurs traces de pas y sont encore, parce qu'il n'y a pas de vent pour les effacer !</p>`,

  "Un jour très très long sur Vénus": `<p>Vénus est la planète la plus chaude de toutes, encore plus que Mercure qui est pourtant plus proche du Soleil !</p>
    <p>C'est à cause de ses gros nuages épais qui gardent toute la chaleur, comme une énorme couverture posée sur la planète.</p>`,

  "Tes os plus solides que l'acier": `<p>Le plus grand os de ton corps est dans ta cuisse, et le plus petit est caché dans ton oreille !</p>

/* ============================================================
   2) MÉMOIRE (localStorage) : goûts, vus, favoris — par mode
   ============================================================ */
const load = (k, def) => { try { return JSON.parse(localStorage.getItem(k)) ?? def; } catch { return def; } };
const save = (k, v) => localStorage.setItem(k, JSON.stringify(v));

// Profils : 'parent' (adulte), 'charlie' et 'emilie' (les filles). Chacun a SA propre mémoire.
const MODES = ['vincent', 'cecile', 'charlie', 'emilie'];
const ADULTES = ['vincent', 'cecile']; // partagent la bibliothèque adulte
const KIDS = ['charlie', 'emilie'];    // partagent la bibliothèque enfants
const isKid = () => KIDS.includes(MODE);

let MODE = load('pdj_mode', 'vincent');
if (!MODES.includes(MODE)) MODE = 'vincent';

let KEY;
function refreshKeys() {
  KEY = {
    weights:  'pdj_' + MODE + '_weights',
    seen:     'pdj_' + MODE + '_seen',
    favs:     'pdj_' + MODE + '_favs',
    dislikes: 'pdj_' + MODE + '_dislikes',
  };
}
refreshKeys();

// Bibliothèque active selon le profil (les 2 filles partagent la même)
function lib() { return isKid() ? ENFANTS : PENSEES; }
function det() { return isKid() ? DETAILS_ENFANT : DETAILS; }

function addSeen(titres) {
  const cap = Math.max(3, Math.floor(lib().length * 0.5)); // on évite de revoir la moitié du pool
  let seen = load(KEY.seen, []);
  seen = [...titres, ...seen.filter(t => !titres.includes(t))].slice(0, cap);
  save(KEY.seen, seen);
}

/* ============================================================
   3) CHOISIR LE CONTENU SUIVANT, pondéré par les goûts
   ============================================================ */
function pickNext() {
  const weights = load(KEY.weights, {});
  const seen = load(KEY.seen, []);
  let cands = lib().filter(p => !seen.includes(p.titre));
  if (!cands.length) cands = lib().slice(); // tout a été vu récemment : on rouvre tout
  const total = cands.reduce((s,c) => s + Math.max(0.15, weights[c.cat] ?? 1), 0);
  let r = Math.random() * total;
  for (const c of cands) {
    r -= Math.max(0.15, weights[c.cat] ?? 1);
    if (r <= 0) return c;
  }
  return cands[cands.length - 1];
}

   4) AFFICHAGE (une carte à la fois)

const extraitDe = (corps) => corps.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim().slice(0, 115) + '…';

function renderPrefsHint() {

  if (more) more.onclick = (e) => {
    e.stopPropagation();
    const box = card.querySelector('.plus');
    const open = box.classList.toggle('open');

function nextCard() {
  current = pickNext();
  showCurrent();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ============================================================
   5) NOTER + ZAPPER
   ============================================================ */
function applyRating(kind, titre) {
  const p = lib().find(x => x.titre === titre); if (!p) return;
  const cat = p.cat;
  const weights = load(KEY.weights, {});
  let favs = load(KEY.favs, []), dislikes = load(KEY.dislikes, []);
  weights[cat] = weights[cat] ?? 1;
  if (kind === 'like') {
    weights[cat] = Math.min(4, weights[cat] + 0.6);
    if (!favs.includes(titre)) favs.push(titre);
    dislikes = dislikes.filter(t => t !== titre);
  } else {
    weights[cat] = Math.max(0.2, weights[cat] - 0.6);
    if (!dislikes.includes(titre)) dislikes.push(titre);
    favs = favs.filter(t => t !== titre);
  }
  save(KEY.weights, weights); save(KEY.favs, favs); save(KEY.dislikes, dislikes);
}

// kind : 'like' | 'dislike' | 'skip'
function decide(kind) {
  if (!current) return;
  if (kind === 'like' || kind === 'dislike') applyRating(kind, current.titre);
  addSeen([current.titre]); // on évite de le revoir tout de suite
  nextCard();
}

// La carte s'envole, puis on charge la suivante
function flyOut(dir, kind) {
  const card = document.getElementById('swipe-card');
  card.style.transition = 'transform .28s ease-out, opacity .28s ease-out';
  card.style.transform = `translateX(${dir * 600}px) rotate(${dir * 22}deg)`;
  card.style.opacity = '0';
  setTimeout(() => decide(kind), 260);
}

/* ============================================================
   6) SWIPE (doigt sur tablette / souris)
   ============================================================ */
function setupSwipe() {
  const card = document.getElementById('swipe-card');
  let startX = 0, startY = 0, dx = 0, dragging = false, axis = null;
  const THRESHOLD = 110;

  card.addEventListener('pointerdown', (e) => {
    if (e.target.closest('.more-btn') || e.target.closest('.plus')) return; // ne pas gêner la lecture
    dragging = true; axis = null; startX = e.clientX; startY = e.clientY; dx = 0;
    card.style.transition = 'none';
    try { card.setPointerCapture(e.pointerId); } catch (_) {}
  });
  card.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    dx = e.clientX - startX;
    const dy = e.clientY - startY;
    if (axis === null && (Math.abs(dx) > 8 || Math.abs(dy) > 8)) axis = Math.abs(dx) >= Math.abs(dy) ? 'h' : 'v';
    if (axis !== 'h') return; // mouvement vertical : on laisse la page défiler
    card.style.transform = `translateX(${dx}px) rotate(${dx / 25}deg)`;
    card.classList.toggle('hint-like', dx > 40);
    card.classList.toggle('hint-nope', dx < -40);
  });
  const end = () => {
    if (!dragging) return;
    dragging = false;
    if (axis === 'h' && dx > THRESHOLD) flyOut(1, 'like');
    else if (axis === 'h' && dx < -THRESHOLD) flyOut(-1, 'dislike');
    else {
      card.style.transition = 'transform .2s';
      card.style.transform = '';
      card.classList.remove('hint-like', 'hint-nope');
    }
  };
  card.addEventListener('pointerup', end);
  card.addEventListener('pointercancel', end);
}

      <div class="card-body">
        <div class="body">${p.corps}</div>
        <div class="why"><span class="lbl">${whyLabel}</span><p>${p.why}</p></div>
        ${det()[p.titre] ? `<button class="more-btn" data-more>🔍 Plus de détails</button><div class="plus">${det()[p.titre]}</div>` : ''}
        <button class="rate dislike" data-unfav style="margin-top:16px">🗑️ Retirer des favoris</button>
      </div>
    </div>`).join('');
  list.querySelectorAll('.card-item').forEach(cardEl => {
    const titre = decodeURIComponent(cardEl.dataset.titre);
    cardEl.querySelector('.card-head').onclick = () => {
      const open = cardEl.classList.toggle('open');
      cardEl.querySelector('.lire').textContent = open ? 'Réduire ▴' : 'Lire ▾';
    };
    const more = cardEl.querySelector('[data-more]');
    if (more) more.onclick = (e) => { e.stopPropagation(); const b = cardEl.querySelector('.plus'); const o = b.classList.toggle('open'); more.textContent = o ? '🔼 Masquer les détails' : '🔍 Plus de détails'; };
    const unfav = cardEl.querySelector('[data-unfav]');
    if (unfav) unfav.onclick = (e) => { e.stopPropagation(); save(KEY.favs, load(KEY.favs, []).filter(t => t !== titre)); renderFavs(); };
  });
}

/* ============================================================
   8) NAVIGATION + DÉMARRAGE
   ============================================================ */
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));
  document.getElementById('view-feed').classList.toggle('hidden', view !== 'feed');
  document.getElementById('view-favs').classList.toggle('hidden', view !== 'favs');
}
// Met à jour l'habillage selon le mode (titre, sous-titre, thème, bouton actif)
const TITRES = {
  vincent: ['💭 Les pensées de Vincent', 'Fais défiler les idées, une par une. À toi de zapper ou de garder.'],
  cecile:  ['💭 Les pensées de Cécile', 'Fais défiler les idées, une par une. À toi de zapper ou de garder.'],
  charlie: ['🌸 Les découvertes de Charlie', 'Plein de trucs incroyables à découvrir. Swipe pour en voir un autre !'],
  emilie:  ["🦄 Les découvertes d'Émilie", 'Plein de trucs incroyables à découvrir. Swipe pour en voir un autre !'],
};
function applyModeUI() {
  document.body.classList.toggle('kids', isKid());
  document.querySelectorAll('.mode').forEach(b => b.classList.toggle('active', b.dataset.mode === MODE));
  const [titre, sous] = TITRES[MODE] || TITRES.vincent;
  document.querySelector('header.top h1').textContent = titre;
  document.querySelector('header.top p').textContent = sous;
}

function switchMode(mode) {
  if (mode === MODE) return;
  MODE = mode;
  save('pdj_mode', MODE);
  refreshKeys();      // bascule sur la mémoire (goûts, favoris) de ce mode
  applyModeUI();
  switchView('feed');
  nextCard();         // charge un contenu de la nouvelle bibliothèque
}

document.querySelectorAll('.mode').forEach(b => { b.onclick = () => switchMode(b.dataset.mode); });
document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => { switchView(t.dataset.view); if (t.dataset.view === 'favs') renderFavs(); };
});
document.getElementById('act-like').onclick = () => flyOut(1, 'like');
document.getElementById('act-dislike').onclick = () => flyOut(-1, 'dislike');
document.getElementById('act-skip').onclick = () => decide('skip');

setupSwipe();
applyModeUI();
nextCard();
</script>
</body>
